<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transmission preview — Consent Architecture</title>
<style>
  body {
    margin: 0;
    background: #0a0a0a;
    color: #9a8d76;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    padding: 3rem 1.5rem 5rem;
  }
  h1 {
    color: #e8dcc4;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-size: 1rem;
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .label {
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 0.7rem;
    color: #6a604c;
    text-align: center;
    margin: 2.5rem 0 0.75rem;
  }
  .frame {
    max-width: 1100px;
    margin: 0 auto;
    border: 1px solid #2a2620;
    border-radius: 4px;
    overflow: hidden;
    background: #050402;
  }
  .frame img, .frame object {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>
  <h1>Consent Architecture — Transmission Artifacts</h1>

  <p class="label">Recognition pattern</p>
  <div class="frame">
    <object data="pattern.svg" type="image/svg+xml" width="1600" height="900"></object>
  </div>

  <p class="label">Atmospheric header</p>
  <div class="frame">
    <object data="header.svg" type="image/svg+xml" width="1600" height="900"></object>
  </div>
</body>
</html>
