<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="800" y="120" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="52" font-weight="400" letter-spacing="7"
        fill="#e8dcc4">CONSENT ARCHITECTURE</text>

  <!-- ============================================ -->
  <!-- The crossing axes (the two generating principles) -->
  <!-- center at (800, 470) -->
  <!-- ============================================ -->

  <!-- Horizontal axis: who is doing -->
  <line x1="430" y1="470" x2="1170" y2="470" stroke="#3a3a3a" stroke-width="1" stroke-opacity="0.7"/>
  <!-- Vertical axis: for whose benefit -->
  <line x1="800" y1="240" x2="800" y2="700" stroke="#3a3a3a" stroke-width="1" stroke-opacity="0.7"/>

  <!-- Axis labels -->
  <text x="800" y="218" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" letter-spacing="3" fill="#9a8d76">FOR YOUR BENEFIT</text>
  <text x="800" y="726" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" letter-spacing="3" fill="#9a8d76">FOR MY BENEFIT</text>
  <text x="392" y="475" text-anchor="end" font-family="Inter, sans-serif" font-size="15" letter-spacing="3" fill="#9a8d76">I AM DOING</text>
  <text x="1208" y="475" text-anchor="start" font-family="Inter, sans-serif" font-size="15" letter-spacing="3" fill="#9a8d76">YOU ARE DOING</text>

  <!-- Connecting diagonals to vertices (faint, gold) -->
  <line x1="800" y1="470" x2="560" y2="350" stroke="#d4af6a" stroke-width="1" stroke-opacity="0.45"/>
  <line x1="800" y1="470" x2="1040" y2="350" stroke="#d4af6a" stroke-width="1" stroke-opacity="0.45"/>
  <line x1="800" y1="470" x2="560" y2="590" stroke="#d4af6a" stroke-width="1" stroke-opacity="0.45"/>
  <line x1="800" y1="470" x2="1040" y2="590" stroke="#d4af6a" stroke-width="1" stroke-opacity="0.45"/>

  <!-- Center node (consent itself, the crossing point) -->
  <circle cx="800" cy="470" r="34" fill="url(#point_bright)"/>
  <circle cx="800" cy="470" r="4" fill="#fff4d6"/>

  <!-- ============================================ -->
  <!-- Four quadrant vertices -->
  <!-- ============================================ -->

  <!-- Top-left: Serving (I am doing / for your benefit) -->
  <circle cx="560" cy="350" r="44" fill="url(#glow)"/>
  <circle cx="560" cy="350" r="6" fill="#f0c674"/>
  <text x="560" y="318" text-anchor="middle" font-family="Cormorant Garamond, Garamond, serif" font-size="30" letter-spacing="4" fill="#e8dcc4">SERVING</text>

  <!-- Top-right: Allowing (you are doing / for your benefit) -->
  <circle cx="1040" cy="350" r="44" fill="url(#glow)"/>
  <circle cx="1040" cy="350" r="6" fill="#f0c674"/>
  <text x="1040" y="318" text-anchor="middle" font-family="Cormorant Garamond, Garamond, serif" font-size="30" letter-spacing="4" fill="#e8dcc4">ALLOWING</text>

  <!-- Bottom-left: Taking (I am doing / for my benefit) -->
  <circle cx="560" cy="590" r="44" fill="url(#glow)"/>
  <circle cx="560" cy="590" r="6" fill="#f0c674"/>
  <text x="560" y="650" text-anchor="middle" font-family="Cormorant Garamond, Garamond, serif" font-size="30" letter-spacing="4" fill="#e8dcc4">TAKING</text>

  <!-- Bottom-right: Accepting (you are doing / for my benefit) -->
  <circle cx="1040" cy="590" r="44" fill="url(#glow)"/>
  <circle cx="1040" cy="590" r="6" fill="#f0c674"/>
  <text x="1040" y="650" text-anchor="middle" font-family="Cormorant Garamond, Garamond, serif" font-size="30" letter-spacing="4" fill="#e8dcc4">ACCEPTING</text>

  <!-- Subtitle -->
  <text x="800" y="822" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="23" font-style="italic" font-weight="300"
        fill="#9a8d76">Two axes. Four positions. Consent holds each one.</text>
</svg>
