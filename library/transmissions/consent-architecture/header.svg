<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="field" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="halo_wide" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.55"/>
      <stop offset="25%" stop-color="#d4af6a" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#8a6f3f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow_dim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line_boundary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0"/>
      <stop offset="15%" stop-color="#d4af6a" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#f0c674" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="55%" stop-color="#f0c674" stop-opacity="0.95"/>
      <stop offset="85%" stop-color="#d4af6a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line_boundary_v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0"/>
      <stop offset="15%" stop-color="#d4af6a" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#f0c674" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="55%" stop-color="#f0c674" stop-opacity="0.95"/>
      <stop offset="85%" stop-color="#d4af6a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Deep field -->
  <rect width="1600" height="900" fill="url(#field)"/>

  <!-- Wide halo at the crossing -->
  <circle cx="800" cy="450" r="380" fill="url(#halo_wide)"/>

  <!-- Crossing axes — luminous boundaries meeting -->
  <line x1="120" y1="450" x2="1480" y2="450" stroke="url(#line_boundary)" stroke-width="2"/>
  <line x1="800" y1="120" x2="800" y2="780" stroke="url(#line_boundary_v)" stroke-width="2"/>

  <!-- Four quiet vertices in the quadrants -->
  <circle cx="585" cy="290" r="60" fill="url(#glow_dim)" opacity="0.6"/>
  <circle cx="1015" cy="290" r="60" fill="url(#glow_dim)" opacity="0.6"/>
  <circle cx="585" cy="610" r="60" fill="url(#glow_dim)" opacity="0.6"/>
  <circle cx="1015" cy="610" r="60" fill="url(#glow_dim)" opacity="0.6"/>

  <!-- Bright crossing point -->
  <circle cx="800" cy="450" r="100" fill="url(#halo_wide)"/>
  <circle cx="800" cy="450" r="5" fill="#fff4d6"/>
</svg>
