<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transmission Preview — Naming Bridge</title>
<style>
  html, body { margin: 0; padding: 0; background: #050402; color: #9a8d76; }
  body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; padding: 48px 24px 96px; }
  h1 { color: #e8dcc4; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase;
       font-size: 1rem; text-align: center; margin: 0 0 8px; }
  p.sub { text-align: center; font-style: italic; font-size: 0.9rem; margin: 0 0 48px; color: #7a6d56; }
  .frame { max-width: 1200px; margin: 0 auto 56px; }
  .label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.18em;
           color: #7a6d56; margin: 0 0 12px; }
  .art { width: 100%; height: auto; display: block; border: 1px solid #2a2218;
         box-shadow: 0 0 60px rgba(0,0,0,0.6); background: #0a0a0a; }
</style>
</head>
<body>
  <h1>Naming Bridge — Transmission Set</h1>
  <p class="sub">pattern.svg and header.svg, stacked.</p>

  <div class="frame">
    <p class="label">Recognition Pattern</p>
    <img class="art" src="pattern.svg" alt="Naming Bridge recognition pattern">
  </div>

  <div class="frame">
    <p class="label">Atmospheric Header</p>
    <img class="art" src="header.svg" alt="Naming Bridge atmospheric header">
  </div>

<!-- Ko-fi floating support button -->
<script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
<script>
  kofiWidgetOverlay.draw('oursharedgifts', {
    'type': 'floating-chat',
    'floating-chat.donateButton.text': 'Support me',
    'floating-chat.donateButton.background-color': '#5cb85c',
    'floating-chat.donateButton.text-color': '#fff'
  });
</script>
</body>
</html>
