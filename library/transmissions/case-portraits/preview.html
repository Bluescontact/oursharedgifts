<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transmission Preview — Seven Case Portraits</title>
<style>
  body {
    margin: 0;
    background: #0a0a0a;
    color: #9a8d76;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: 3rem 1.5rem 5rem;
  }
  h1 {
    font-family: Cormorant Garamond, Garamond, serif;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: #e8dcc4;
    text-align: center;
    font-size: 1.5rem;
    margin: 0 0 0.4rem;
  }
  .sub {
    text-align: center;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 0 0 3rem;
    color: #7a6d56;
  }
  .label {
    text-align: center;
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #7a6d56;
    margin: 2.5rem 0 0.9rem;
  }
  figure {
    margin: 0 auto;
    max-width: 1100px;
  }
  img {
    display: block;
    width: 100%;
    height: auto;
    border: 1px solid #2a241c;
  }
</style>
</head>
<body>
  <h1>Seven Case Portraits</h1>
  <p class="sub">Transmission artifacts — preview</p>

  <p class="label">Recognition pattern</p>
  <figure><img src="pattern.svg" alt="Recognition pattern: seven angles on one form"></figure>

  <p class="label">Atmospheric header</p>
  <figure><img src="header.svg" alt="Atmospheric header: a single luminous source emanating into seven faint points"></figure>
</body>
</html>
