<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- inlined from assets/defs.svg -->
    <radialGradient id="field" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="source" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="35%" stop-color="#f0c674" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#d4af6a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#field)"/>

  <!-- Title (pattern figure: clean luminous vector, no vignette per register) -->
  <text x="800" y="92" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="48" font-weight="400" letter-spacing="7"
        fill="#e8dcc4">SEVEN ANGLES ON ONE FORM</text>

  <!-- ============ Emanation lines (source to each case) ============ -->
  <!-- center (800, 500); seven nodes on a ring radius ~310 -->
  <g stroke="#3a3a3a" stroke-width="0.9" stroke-opacity="0.65">
    <line x1="800" y1="500" x2="800"  y2="200"/>
    <line x1="800" y1="500" x2="1043" y2="316"/>
    <line x1="800" y1="500" x2="1102" y2="603"/>
    <line x1="800" y1="500" x2="950"  y2="772"/>
    <line x1="800" y1="500" x2="650"  y2="772"/>
    <line x1="800" y1="500" x2="498"  y2="603"/>
    <line x1="800" y1="500" x2="557"  y2="316"/>
  </g>

  <!-- ============ Central source = the form ============ -->
  <circle cx="800" cy="500" r="150" fill="url(#source)"/>
  <circle cx="800" cy="500" r="11" fill="#fff4d6"/>
  <text x="800" y="494" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="26" font-weight="400" letter-spacing="5"
        fill="#e8dcc4">THE FORM</text>
  <text x="800" y="524" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="13" font-style="italic" letter-spacing="2"
        fill="#9a8d76">read from each case</text>

  <!-- ============ Seven case nodes ============ -->
  <!-- top -->
  <circle cx="800" cy="200" r="34" fill="url(#glow)"/>
  <circle cx="800" cy="200" r="5" fill="#f0c674"/>
  <text x="800" y="168" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" letter-spacing="2" fill="#e8dcc4">LAS GAVIOTAS</text>

  <!-- upper right -->
  <circle cx="1043" cy="316" r="34" fill="url(#glow)"/>
  <circle cx="1043" cy="316" r="5" fill="#f0c674"/>
  <text x="1078" y="300" text-anchor="start" font-family="Inter, sans-serif" font-size="15" letter-spacing="2" fill="#e8dcc4">OPEN SOURCE</text>
  <text x="1078" y="322" text-anchor="start" font-family="Inter, sans-serif" font-size="15" letter-spacing="2" fill="#e8dcc4">ECOLOGY</text>

  <!-- right -->
  <circle cx="1102" cy="603" r="34" fill="url(#glow)"/>
  <circle cx="1102" cy="603" r="5" fill="#f0c674"/>
  <text x="1140" y="608" text-anchor="start" font-family="Inter, sans-serif" font-size="15" letter-spacing="2" fill="#e8dcc4">WIKIPEDIA</text>

  <!-- lower right -->
  <circle cx="950" cy="772" r="34" fill="url(#glow)"/>
  <circle cx="950" cy="772" r="5" fill="#f0c674"/>
  <text x="950" y="828" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" letter-spacing="2" fill="#e8dcc4">THE FARM + MONDRAGON</text>

  <!-- lower left -->
  <circle cx="650" cy="772" r="34" fill="url(#glow)"/>
  <circle cx="650" cy="772" r="5" fill="#f0c674"/>
  <text x="650" y="828" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" letter-spacing="2" fill="#e8dcc4">SOLAR BIOCHAR</text>

  <!-- left -->
  <circle cx="498" cy="603" r="34" fill="url(#glow)"/>
  <circle cx="498" cy="603" r="5" fill="#f0c674"/>
  <text x="460" y="608" text-anchor="end" font-family="Inter, sans-serif" font-size="15" letter-spacing="2" fill="#e8dcc4">PARTNER DANCE</text>

  <!-- upper left — the failure case: open / unfilled node -->
  <circle cx="557" cy="316" r="34" fill="none" stroke="#9a8d76" stroke-width="1.1" stroke-opacity="0.55" stroke-dasharray="4,5"/>
  <circle cx="557" cy="316" r="5" fill="none" stroke="#9a8d76" stroke-width="1.2"/>
  <text x="522" y="300" text-anchor="end" font-family="Inter, sans-serif" font-size="15" letter-spacing="2" fill="#9a8d76">COUCHSURFING</text>
  <text x="522" y="322" text-anchor="end" font-family="Inter, sans-serif" font-size="11" font-style="italic" letter-spacing="1" fill="#7a6d56">substrate dropped</text>

  <!-- Subtitle -->
  <text x="800" y="876" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="22" font-style="italic" font-weight="300"
        fill="#9a8d76">one form, across substrates and scales — including where it breaks</text>

</svg>
