<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- inlined from assets/defs.svg -->
    <radialGradient id="field" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line_threshold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#field)"/>

  <!-- Title -->
  <text x="800" y="200" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="56" font-weight="400" letter-spacing="8"
        fill="#e8dcc4">THE THRESHOLD IS SOMATIC</text>

  <!-- The threshold line -->
  <line x1="220" y1="450" x2="1380" y2="450"
        stroke="url(#line_threshold)" stroke-width="1.6"/>

  <!-- Luminous threshold point — the single bright crossing vertex -->
  <circle cx="800" cy="450" r="95" fill="url(#point_bright)"/>
  <circle cx="800" cy="450" r="7" fill="#fff4d6"/>

  <!-- Subtitle -->
  <text x="800" y="720" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="24" font-style="italic" font-weight="300" letter-spacing="1"
        fill="#9a8d76">The body crosses it by building, not before.</text>
</svg>
