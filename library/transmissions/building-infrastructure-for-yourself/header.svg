<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- inlined from assets/defs.svg -->
    <radialGradient id="field" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="halo_wide" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.55"/>
      <stop offset="25%" stop-color="#d4af6a" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#8a6f3f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line_boundary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0"/>
      <stop offset="15%" stop-color="#d4af6a" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#f0c674" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="55%" stop-color="#f0c674" stop-opacity="0.95"/>
      <stop offset="85%" stop-color="#d4af6a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </linearGradient>
    <filter id="mist" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="3" result="mist"/>
      <feColorMatrix in="mist" type="matrix"
        values="0 0 0 0 0.55
                0 0 0 0 0.45
                0 0 0 0 0.3
                0 0 0 0.18 0"/>
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.05
                0 0 0 0 0.045
                0 0 0 0 0.035
                0 0 0 0.08 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <!-- Deep field -->
  <rect width="1600" height="900" fill="url(#field)"/>

  <!-- Soft mist drift -->
  <rect width="1600" height="900" filter="url(#mist)" opacity="0.5"/>

  <!-- Wide halo bloom centered on the boundary -->
  <ellipse cx="800" cy="450" rx="640" ry="260" fill="url(#halo_wide)"/>

  <!-- Bloom under the line -->
  <rect x="180" y="438" width="1240" height="24" fill="url(#line_boundary)" filter="url(#softblur)" opacity="0.8"/>

  <!-- The luminous boundary — the threshold -->
  <line x1="180" y1="450" x2="1420" y2="450" stroke="url(#line_boundary)" stroke-width="1.6"/>

  <!-- Bright crossing point -->
  <circle cx="800" cy="450" r="5" fill="#fff4d6"/>

  <!-- Atmosphere -->
  <rect width="1600" height="900" fill="url(#vignette)"/>
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.55"/>
</svg>
