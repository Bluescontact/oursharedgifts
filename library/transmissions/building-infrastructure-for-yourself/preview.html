<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transmission Preview — Building Infrastructure for Yourself</title>
<style>
  body {
    margin: 0;
    background: #0a0a0a;
    color: #9a8d76;
    font-family: -apple-system, "Helvetica Neue", Inter, sans-serif;
    padding: 3rem 0 5rem;
  }
  h1 {
    color: #e8dcc4;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-align: center;
    font-size: 1.1rem;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .sub {
    text-align: center;
    font-style: italic;
    color: #6f6450;
    margin-bottom: 3rem;
    font-size: 0.95rem;
  }
  .stack {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem;
  }
  figure {
    margin: 0 0 4rem;
  }
  figcaption {
    text-align: center;
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #6f6450;
    margin-bottom: 1rem;
  }
  img {
    width: 100%;
    height: auto;
    display: block;
    border: 1px solid #1f1b16;
  }
</style>
</head>
<body>
  <h1>Building Infrastructure for Yourself</h1>
  <p class="sub">Transmission artifacts — geometry: threshold</p>
  <div class="stack">
    <figure>
      <figcaption>Recognition Pattern</figcaption>
      <img src="pattern.svg" alt="Recognition pattern — the threshold is somatic">
    </figure>
    <figure>
      <figcaption>Atmospheric Header</figcaption>
      <img src="header.svg" alt="Atmospheric header — luminous boundary on deep field">
    </figure>
  </div>
</body>
</html>
