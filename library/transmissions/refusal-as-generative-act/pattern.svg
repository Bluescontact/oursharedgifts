<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- inlined from assets/defs.svg : field_flat -->
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <!-- inlined : glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <!-- inlined : point_bright (central node) -->
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <!-- inlined : vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="800" y="120" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="50" font-weight="400" letter-spacing="6"
        fill="#e8dcc4">REFUSAL AS A GENERATIVE ACT</text>

  <!-- Tetrahedron: apex top, three base points (one rear for depth) -->
  <!-- Apex (800,250) Differentiation; base-left (520,710) Connection;
       base-right (1080,710) Architecture; rear (800,600) Boundaries -->
  <line x1="800" y1="250" x2="520" y2="710" stroke="#d4af6a" stroke-width="1.5"/>
  <line x1="800" y1="250" x2="1080" y2="710" stroke="#d4af6a" stroke-width="1.5"/>
  <line x1="800" y1="250" x2="800" y2="600" stroke="#d4af6a" stroke-width="1.2" stroke-opacity="0.6" stroke-dasharray="3,3"/>
  <line x1="520" y1="710" x2="1080" y2="710" stroke="#d4af6a" stroke-width="1.5"/>
  <line x1="520" y1="710" x2="800" y2="600" stroke="#d4af6a" stroke-width="1.2" stroke-opacity="0.6" stroke-dasharray="3,3"/>
  <line x1="1080" y1="710" x2="800" y2="600" stroke="#d4af6a" stroke-width="1.2" stroke-opacity="0.6" stroke-dasharray="3,3"/>

  <!-- Central generating node: refusal at the core (optically centered on triangle centroid) -->
  <circle cx="800" cy="540" r="120" fill="url(#point_bright)"/>
  <circle cx="800" cy="540" r="7" fill="#fff4d6"/>

  <!-- Vertex 1 — apex -->
  <circle cx="800" cy="250" r="42" fill="url(#glow)"/>
  <circle cx="800" cy="250" r="6" fill="#f0c674"/>

  <!-- Vertex 2 — base-left -->
  <circle cx="520" cy="710" r="42" fill="url(#glow)"/>
  <circle cx="520" cy="710" r="6" fill="#f0c674"/>

  <!-- Vertex 3 — base-right -->
  <circle cx="1080" cy="710" r="42" fill="url(#glow)"/>
  <circle cx="1080" cy="710" r="6" fill="#f0c674"/>

  <!-- Vertex 4 — rear -->
  <circle cx="800" cy="600" r="34" fill="url(#glow)"/>
  <circle cx="800" cy="600" r="5" fill="#f0c674"/>

  <!-- Subtitle -->
  <text x="800" y="838" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="23" font-style="italic" font-weight="300"
        fill="#9a8d76">Refusal is not negation. Each refusal generates what now operates.</text>

  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
