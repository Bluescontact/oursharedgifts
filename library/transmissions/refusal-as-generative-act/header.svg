<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- inlined from assets/defs.svg : field -->
    <radialGradient id="field" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <!-- inlined : halo_wide -->
    <radialGradient id="halo_wide" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.55"/>
      <stop offset="25%" stop-color="#d4af6a" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#8a6f3f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- inlined : glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <!-- inlined : glow_dim -->
    <radialGradient id="glow_dim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <!-- inlined : mist -->
    <filter id="mist" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="3" result="mist"/>
      <feColorMatrix in="mist" type="matrix"
        values="0 0 0 0 0.55
                0 0 0 0 0.45
                0 0 0 0 0.3
                0 0 0 0.18 0"/>
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <!-- inlined : grain -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.05
                0 0 0 0 0.045
                0 0 0 0 0.035
                0 0 0 0.08 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <!-- inlined : vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <!-- Deep field -->
  <rect width="1600" height="900" fill="url(#field)"/>

  <!-- Mist drift -->
  <rect width="1600" height="900" filter="url(#mist)" opacity="0.5"/>

  <!-- Wide atmospheric halo behind the figure -->
  <rect x="350" y="100" width="900" height="800" fill="url(#halo_wide)"/>

  <!-- Suspended tetrahedron, slightly off-center, drifting upward -->
  <g stroke="#d4af6a" fill="none" stroke-opacity="0.85">
    <line x1="800" y1="300" x2="560" y2="680" stroke-width="1.4"/>
    <line x1="800" y1="300" x2="1040" y2="680" stroke-width="1.4"/>
    <line x1="560" y1="680" x2="1040" y2="680" stroke-width="1.4"/>
    <line x1="800" y1="300" x2="800" y2="580" stroke-width="1" stroke-opacity="0.45" stroke-dasharray="4,4"/>
    <line x1="560" y1="680" x2="800" y2="580" stroke-width="1" stroke-opacity="0.45" stroke-dasharray="4,4"/>
    <line x1="1040" y1="680" x2="800" y2="580" stroke-width="1" stroke-opacity="0.45" stroke-dasharray="4,4"/>
  </g>

  <!-- Luminous vertices -->
  <circle cx="800" cy="300" r="50" fill="url(#glow)"/>
  <circle cx="800" cy="300" r="5" fill="#fff4d6"/>
  <circle cx="560" cy="680" r="44" fill="url(#glow)"/>
  <circle cx="560" cy="680" r="5" fill="#f0c674"/>
  <circle cx="1040" cy="680" r="44" fill="url(#glow)"/>
  <circle cx="1040" cy="680" r="5" fill="#f0c674"/>
  <circle cx="800" cy="580" r="34" fill="url(#glow_dim)"/>
  <circle cx="800" cy="580" r="4" fill="#d4af6a"/>

  <!-- Grain overlay -->
  <rect width="1600" height="900" filter="url(#grain)"/>

  <!-- Vignette -->
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
