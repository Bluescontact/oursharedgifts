<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transmission Preview — Refusal As A Generative Act</title>
<style>
  body {
    margin: 0;
    background: #0a0a0a;
    color: #9a8d76;
    font-family: "Inter", Helvetica, sans-serif;
    padding: 3rem 2rem;
  }
  h1 {
    font-family: "Cormorant Garamond", Garamond, serif;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: #e8dcc4;
    text-align: center;
    font-size: 1.6rem;
    margin: 0 0 0.5rem;
  }
  .sub {
    text-align: center;
    font-style: italic;
    margin: 0 0 3rem;
    color: #7a6d56;
  }
  .frame {
    max-width: 1600px;
    margin: 0 auto 3rem;
    border: 1px solid #2a241c;
    background: #050402;
    box-shadow: 0 0 60px rgba(212,175,106,0.05);
  }
  .frame img { display: block; width: 100%; height: auto; }
  .label {
    text-align: center;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6a5f4c;
    margin: 0 0 0.75rem;
  }
</style>
</head>
<body>
  <h1>REFUSAL AS A GENERATIVE ACT</h1>
  <p class="sub">Transmission artifacts — pattern and header</p>

  <p class="label">Recognition Pattern</p>
  <div class="frame"><img src="pattern.svg" alt="Recognition pattern: tetrahedron of four refusal vertices"></div>

  <p class="label">Atmospheric Header</p>
  <div class="frame"><img src="header.svg" alt="Atmospheric header: luminous tetrahedron on a deep field"></div>
</body>
</html>
