<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transmission preview — Glossary</title>
<style>
  body {
    margin: 0;
    background: #0a0a0a;
    color: #9a8d76;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    padding: 3rem 0 5rem;
  }
  h1 {
    color: #e8dcc4;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 0.95rem;
    text-align: center;
    margin: 0 0 0.4rem;
  }
  p.sub {
    text-align: center;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    margin: 0 0 3rem;
    color: #6b6051;
  }
  .frame {
    max-width: 1040px;
    margin: 0 auto 3rem;
    padding: 0 2rem;
  }
  .label {
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #6b6051;
    margin: 0 0 0.75rem;
  }
  .art {
    width: 100%;
    border: 1px solid #2a2620;
    display: block;
    box-sizing: border-box;
    background: #000;
  }
</style>
</head>
<body>
  <h1>Transmission — Glossary</h1>
  <p class="sub">The 4·6·4·1 Form · tetrahedron</p>

  <div class="frame">
    <p class="label">Recognition pattern</p>
    <img class="art" src="pattern.svg" alt="Recognition pattern — the 4·6·4·1 form">
  </div>

  <div class="frame">
    <p class="label">Atmospheric header</p>
    <img class="art" src="header.svg" alt="Atmospheric header — luminous tetrahedron">
  </div>
</body>
</html>
