<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="field" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="halo_wide" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.55"/>
      <stop offset="25%" stop-color="#d4af6a" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#8a6f3f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <filter id="mist" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="3" result="mist"/>
      <feColorMatrix in="mist" type="matrix"
        values="0 0 0 0 0.55
                0 0 0 0 0.45
                0 0 0 0 0.3
                0 0 0 0.18 0"/>
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="softblur"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.05
                0 0 0 0 0.045
                0 0 0 0 0.035
                0 0 0 0.08 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.72"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#field)"/>
  <rect width="1600" height="900" filter="url(#mist)" opacity="0.5"/>

  <!-- Wide atmospheric halo behind the figure -->
  <circle cx="800" cy="470" r="430" fill="url(#halo_wide)"/>

  <!-- Tetrahedron, suspended, no labels -->
  <g opacity="0.92">
    <!-- bloom under edges -->
    <g filter="url(#softblur)" opacity="0.5">
      <line x1="800" y1="250" x2="540" y2="660" stroke="#d4af6a" stroke-width="3"/>
      <line x1="800" y1="250" x2="1060" y2="660" stroke="#d4af6a" stroke-width="3"/>
      <line x1="540" y1="660" x2="1060" y2="660" stroke="#d4af6a" stroke-width="3"/>
    </g>
    <line x1="800" y1="250" x2="540" y2="660" stroke="#f0c674" stroke-width="1.5" stroke-opacity="0.9"/>
    <line x1="800" y1="250" x2="1060" y2="660" stroke="#f0c674" stroke-width="1.5" stroke-opacity="0.9"/>
    <line x1="540" y1="660" x2="1060" y2="660" stroke="#f0c674" stroke-width="1.5" stroke-opacity="0.9"/>
    <line x1="800" y1="250" x2="800" y2="530" stroke="#d4af6a" stroke-width="1.1" stroke-opacity="0.45" stroke-dasharray="5,5"/>
    <line x1="540" y1="660" x2="800" y2="530" stroke="#d4af6a" stroke-width="1.1" stroke-opacity="0.45" stroke-dasharray="5,5"/>
    <line x1="1060" y1="660" x2="800" y2="530" stroke="#d4af6a" stroke-width="1.1" stroke-opacity="0.45" stroke-dasharray="5,5"/>
  </g>

  <!-- Luminous vertices -->
  <circle cx="800" cy="250" r="60" fill="url(#point_bright)"/>
  <circle cx="800" cy="250" r="5" fill="#fff4d6"/>
  <circle cx="540" cy="660" r="55" fill="url(#point_bright)"/>
  <circle cx="540" cy="660" r="5" fill="#fff4d6"/>
  <circle cx="1060" cy="660" r="55" fill="url(#point_bright)"/>
  <circle cx="1060" cy="660" r="5" fill="#fff4d6"/>
  <circle cx="800" cy="530" r="40" fill="url(#glow)"/>
  <circle cx="800" cy="530" r="4" fill="#f0c674"/>

  <rect width="1600" height="900" fill="url(#vignette)"/>
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.5"/>
</svg>
