<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- inlined from assets/defs.svg -->
    <radialGradient id="field" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <!-- surface stratum: brightest, peaks at center -->
    <linearGradient id="line_surface" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0.18"/>
    </linearGradient>
    <!-- strata: warm gold, peaks at center -->
    <linearGradient id="line_strata" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0.12"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#field)"/>

  <!-- Title -->
  <text x="800" y="118" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="52" font-weight="400" letter-spacing="8"
        fill="#e8dcc4">LINEAGE AS SUBSTRATE</text>

  <!-- ============ SURFACE: the synthesis ============ -->
  <text x="800" y="222" text-anchor="middle" font-family="Inter, Helvetica, sans-serif"
        font-size="23" letter-spacing="6" fill="#e8dcc4">THE FRAMEWORK</text>
  <line x1="240" y1="252" x2="1360" y2="252" stroke="url(#line_surface)" stroke-width="2"/>
  <circle cx="800" cy="252" r="46" fill="url(#glow)"/>
  <circle cx="800" cy="252" r="5" fill="#fff4d6"/>
  <text x="800" y="282" text-anchor="middle" font-family="Cormorant Garamond, Garamond, serif"
        font-style="italic" font-size="18" letter-spacing="2" fill="#9a8d76">the visible synthesis</text>

  <!-- ============ STRATA: what it metabolized ============ -->
  <!-- each line dimmer as it descends; one luminous vertex per strand -->
  <g>
    <line x1="270" y1="370" x2="1330" y2="370" stroke="url(#line_strata)" stroke-width="1.5" stroke-opacity="0.95"/>
    <circle cx="800" cy="370" r="22" fill="url(#glow)"/>
    <circle cx="800" cy="370" r="3.5" fill="#f0c674"/>
    <text x="800" y="357" text-anchor="middle" font-family="Inter, Helvetica, sans-serif" font-size="17" letter-spacing="4" fill="#cdbf9f">SOMATIC GROUND</text>
  </g>
  <g>
    <line x1="270" y1="448" x2="1330" y2="448" stroke="url(#line_strata)" stroke-width="1.5" stroke-opacity="0.85"/>
    <circle cx="800" cy="448" r="22" fill="url(#glow)"/>
    <circle cx="800" cy="448" r="3.5" fill="#f0c674"/>
    <text x="800" y="435" text-anchor="middle" font-family="Inter, Helvetica, sans-serif" font-size="17" letter-spacing="4" fill="#c2b495">SYSTEMS &amp; COGNITION</text>
  </g>
  <g>
    <line x1="270" y1="526" x2="1330" y2="526" stroke="url(#line_strata)" stroke-width="1.5" stroke-opacity="0.72"/>
    <circle cx="800" cy="526" r="22" fill="url(#glow)"/>
    <circle cx="800" cy="526" r="3.5" fill="#f0c674"/>
    <text x="800" y="513" text-anchor="middle" font-family="Inter, Helvetica, sans-serif" font-size="17" letter-spacing="4" fill="#b3a587">GIFT &amp; COMMONS</text>
  </g>
  <g>
    <line x1="270" y1="604" x2="1330" y2="604" stroke="url(#line_strata)" stroke-width="1.5" stroke-opacity="0.58"/>
    <circle cx="800" cy="604" r="22" fill="url(#glow)"/>
    <circle cx="800" cy="604" r="3.5" fill="#f0c674"/>
    <text x="800" y="591" text-anchor="middle" font-family="Inter, Helvetica, sans-serif" font-size="17" letter-spacing="4" fill="#a4977b">REFUSAL &amp; DEVELOPMENT</text>
  </g>

  <!-- ============ DEEPEST GROUND: ancestral, predates the discourse ============ -->
  <line x1="240" y1="700" x2="1360" y2="700" stroke="url(#line_strata)" stroke-width="2.2" stroke-opacity="0.9"/>
  <circle cx="800" cy="700" r="34" fill="url(#glow)"/>
  <circle cx="800" cy="700" r="4.5" fill="#f0c674"/>
  <text x="800" y="687" text-anchor="middle" font-family="Inter, Helvetica, sans-serif" font-size="19" letter-spacing="5" fill="#cdbf9f">ANCESTRAL &amp; INDIGENOUS GROUND</text>
  <text x="800" y="734" text-anchor="middle" font-family="Cormorant Garamond, Garamond, serif"
        font-style="italic" font-size="18" letter-spacing="2" fill="#9a8d76">older than the synthesis that names it</text>

  <!-- Subtitle -->
  <text x="800" y="830" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="23" font-style="italic" font-weight="300"
        fill="#9a8d76">The synthesis rests on ground older than itself.</text>

  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
