<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- inlined from assets/defs.svg -->
    <radialGradient id="field" cx="50%" cy="42%" r="85%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <linearGradient id="line_boundary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0"/>
      <stop offset="15%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="45%" stop-color="#f0c674" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="55%" stop-color="#f0c674" stop-opacity="0.9"/>
      <stop offset="85%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo_wide" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.55"/>
      <stop offset="25%" stop-color="#d4af6a" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#8a6f3f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#f0c674" stop-opacity="0.6"/>
      <stop offset="65%" stop-color="#d4af6a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.05
                0 0 0 0 0.045
                0 0 0 0 0.035
                0 0 0 0.08 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#field)"/>

  <!-- broad halo behind the central stratum -->
  <ellipse cx="800" cy="500" rx="620" ry="300" fill="url(#halo_wide)" opacity="0.7"/>

  <!-- descending strata, brightest at surface, fading into depth -->
  <line x1="180" y1="300" x2="1420" y2="300" stroke="url(#line_boundary)" stroke-width="2.2" opacity="1"/>
  <line x1="200" y1="400" x2="1400" y2="400" stroke="url(#line_boundary)" stroke-width="1.6" opacity="0.78"/>
  <line x1="220" y1="500" x2="1380" y2="500" stroke="url(#line_boundary)" stroke-width="1.6" opacity="0.62"/>
  <line x1="240" y1="600" x2="1360" y2="600" stroke="url(#line_boundary)" stroke-width="1.6" opacity="0.46"/>
  <line x1="260" y1="700" x2="1340" y2="700" stroke="url(#line_boundary)" stroke-width="1.4" opacity="0.32"/>

  <!-- faint deepest ground -->
  <line x1="300" y1="788" x2="1300" y2="788" stroke="url(#line_boundary)" stroke-width="1.2" opacity="0.2"/>

  <!-- luminous gold vertices at stratum midpoints -->
  <circle cx="800" cy="300" r="46" fill="url(#glow)" opacity="1"/>
  <circle cx="800" cy="400" r="40" fill="url(#glow)" opacity="0.78"/>
  <circle cx="800" cy="500" r="36" fill="url(#glow)" opacity="0.62"/>
  <circle cx="800" cy="600" r="32" fill="url(#glow)" opacity="0.46"/>
  <circle cx="800" cy="700" r="28" fill="url(#glow)" opacity="0.32"/>

  <rect width="1600" height="900" fill="url(#vignette)"/>
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.04"/>

  <!-- named concept -->
  <text x="800" y="140" text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif" font-size="58"
    letter-spacing="8" fill="#e8dcc4">LINEAGE AS SUBSTRATE</text>
  <text x="800" y="178" text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif" font-size="24"
    font-style="italic" letter-spacing="2" fill="#9a8d76">what the present inherits and stands on</text>
</svg>
