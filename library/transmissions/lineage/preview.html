<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lineage — Transmission Preview</title>
<style>
  body {
    margin: 0;
    background: #0a0a0a;
    color: #9a8d76;
    font-family: -apple-system, "Helvetica Neue", Inter, sans-serif;
    padding: 48px 24px;
  }
  .wrap { max-width: 1640px; margin: 0 auto; }
  h1 {
    font-family: "Cormorant Garamond", Garamond, serif;
    font-weight: 400;
    letter-spacing: 6px;
    color: #e8dcc4;
    font-size: 28px;
    text-align: center;
    margin: 0 0 8px;
  }
  .sub { text-align: center; font-style: italic; margin: 0 0 48px; color: #9a8d76; }
  .label {
    text-transform: uppercase;
    letter-spacing: 4px;
    font-size: 12px;
    color: #7a6d56;
    margin: 40px 0 12px;
  }
  figure {
    margin: 0 0 56px;
    border: 1px solid #2a241c;
    background: #050402;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
  }
  img, object { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>LINEAGE AS SUBSTRATE</h1>
    <p class="sub">Transmission artifacts — pattern and header</p>

    <div class="label">Recognition pattern</div>
    <figure><object type="image/svg+xml" data="pattern.svg"></object></figure>

    <div class="label">Atmospheric header</div>
    <figure><object type="image/svg+xml" data="header.svg"></object></figure>
  </div>
</body>
</html>
