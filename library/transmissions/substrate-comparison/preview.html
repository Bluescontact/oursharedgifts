<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transmission Preview — The Four Substrates</title>
<style>
  html, body { margin: 0; background: #0a0a0a; color: #9a8d76; font-family: -apple-system, "Helvetica Neue", sans-serif; }
  .wrap { max-width: 1640px; margin: 0 auto; padding: 48px 20px 80px; }
  h1 { color: #e8dcc4; font-weight: 300; letter-spacing: 0.12em; text-transform: uppercase; font-size: 18px; }
  .label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #6a6253; margin: 40px 0 12px; }
  .frame { border: 1px solid #2a2620; background: #050402; line-height: 0; }
  .frame img, .frame object { width: 100%; height: auto; display: block; }
  .note { font-size: 13px; color: #6a6253; margin-top: 8px; font-style: italic; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Transmission &middot; The Four Substrates</h1>
  <p class="note">Same form. Different ground.</p>

  <div class="label">Recognition pattern &mdash; pattern.svg</div>
  <div class="frame"><object data="pattern.svg" type="image/svg+xml" width="1600" height="900">pattern.svg</object></div>

  <div class="label">Atmospheric header &mdash; header.svg</div>
  <div class="frame"><object data="header.svg" type="image/svg+xml" width="1600" height="900">header.svg</object></div>

  <p class="note">Right-click either figure to export PNG if no rasterizer is run.</p>
</div>

<!-- Ko-fi floating support button -->
<script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
<script>
  kofiWidgetOverlay.draw('oursharedgifts', {
    'type': 'floating-chat',
    'floating-chat.donateButton.text': 'Support me',
    'floating-chat.donateButton.background-color': '#5cb85c',
    'floating-chat.donateButton.text-color': '#fff'
  });
</script>
</body>
</html>
