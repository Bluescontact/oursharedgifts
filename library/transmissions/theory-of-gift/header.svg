<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="field" cx="50%" cy="48%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="halo_wide" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.55"/>
      <stop offset="25%" stop-color="#d4af6a" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#8a6f3f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <filter id="mist" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="3" result="mist"/>
      <feColorMatrix in="mist" type="matrix"
        values="0 0 0 0 0.55
                0 0 0 0 0.45
                0 0 0 0 0.3
                0 0 0 0.18 0"/>
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.05
                0 0 0 0 0.045
                0 0 0 0 0.035
                0 0 0 0.08 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <filter id="softblur"><feGaussianBlur stdDeviation="14"/></filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#field)"/>

  <!-- Soft atmospheric mist drift -->
  <rect width="1600" height="900" filter="url(#mist)" opacity="0.5"/>

  <!-- Wide central halo behind the form -->
  <circle cx="800" cy="450" r="430" fill="url(#halo_wide)"/>

  <!-- Suspended tetrahedron, faint and luminous (no labels) -->
  <g stroke-linecap="round">
    <!-- bloom pass -->
    <g filter="url(#softblur)" opacity="0.5">
      <line x1="800" y1="250" x2="500" y2="640" stroke="#d4af6a" stroke-width="2"/>
      <line x1="800" y1="250" x2="1100" y2="640" stroke="#d4af6a" stroke-width="2"/>
      <line x1="500" y1="640" x2="1100" y2="640" stroke="#d4af6a" stroke-width="2"/>
    </g>
    <!-- crisp edges -->
    <line x1="800" y1="250" x2="500" y2="640" stroke="#e6c585" stroke-width="1.4" stroke-opacity="0.9"/>
    <line x1="800" y1="250" x2="1100" y2="640" stroke="#e6c585" stroke-width="1.4" stroke-opacity="0.9"/>
    <line x1="500" y1="640" x2="1100" y2="640" stroke="#e6c585" stroke-width="1.4" stroke-opacity="0.9"/>
    <!-- depth edges to rear vertex -->
    <line x1="800" y1="250" x2="800" y2="540" stroke="#d4af6a" stroke-width="1" stroke-opacity="0.45" stroke-dasharray="4,5"/>
    <line x1="500" y1="640" x2="800" y2="540" stroke="#d4af6a" stroke-width="1" stroke-opacity="0.45" stroke-dasharray="4,5"/>
    <line x1="1100" y1="640" x2="800" y2="540" stroke="#d4af6a" stroke-width="1" stroke-opacity="0.45" stroke-dasharray="4,5"/>
  </g>

  <!-- Luminous vertices -->
  <circle cx="800" cy="250" r="50" fill="url(#point_bright)"/>
  <circle cx="800" cy="250" r="5" fill="#fff4d6"/>
  <circle cx="500" cy="640" r="44" fill="url(#glow)"/>
  <circle cx="500" cy="640" r="4" fill="#fff4d6"/>
  <circle cx="1100" cy="640" r="44" fill="url(#glow)"/>
  <circle cx="1100" cy="640" r="4" fill="#fff4d6"/>
  <circle cx="800" cy="540" r="34" fill="url(#glow)"/>
  <circle cx="800" cy="540" r="3.5" fill="#f0c674"/>

  <!-- Vignette + grain -->
  <rect width="1600" height="900" fill="url(#vignette)"/>
  <rect width="1600" height="900" filter="url(#grain)"/>
</svg>
