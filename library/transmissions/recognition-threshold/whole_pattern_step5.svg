<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="field" cx="50%" cy="50%" r="85%">
      <stop offset="0%" stop-color="#1c1611"/><stop offset="45%" stop-color="#100c08"/><stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <linearGradient id="threshold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0"/><stop offset="10%" stop-color="#d4af6a" stop-opacity="0.25"/><stop offset="50%" stop-color="#f0c674" stop-opacity="0.85"/><stop offset="90%" stop-color="#d4af6a" stop-opacity="0.25"/><stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a3a3a" stop-opacity="0"/><stop offset="50%" stop-color="#8a7d66" stop-opacity="0.85"/><stop offset="100%" stop-color="#3a3a3a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="source" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.95"/><stop offset="35%" stop-color="#d4af6a" stop-opacity="0.45"/><stop offset="75%" stop-color="#8a6f3f" stop-opacity="0.12"/><stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="reception" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/><stop offset="15%" stop-color="#f0c674" stop-opacity="0.85"/><stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/><stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="crossing" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="0.95"/><stop offset="30%" stop-color="#f0c674" stop-opacity="0.5"/><stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="5" result="n"/><feColorMatrix in="n" type="matrix" values="0 0 0 0 0.06 0 0 0 0 0.052 0 0 0 0 0.04 0 0 0 0.07 0"/><feComposite operator="in" in2="SourceGraphic"/></filter>
  </defs>

  <rect width="1600" height="900" fill="url(#field)"/>

  <text x="800" y="90" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="38" font-weight="400" letter-spacing="8"
        fill="#e8dcc4">PROPAGATION</text>
  <text x="800" y="125" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="18" font-style="italic" letter-spacing="3"
        fill="#7a6d56">the gift completing its circuit</text>

  <line x1="80" y1="720" x2="640" y2="720" stroke="url(#ground)" stroke-width="1.2"/>
  <text x="92" y="710" font-family="Cormorant Garamond, serif" font-size="14" font-style="italic" letter-spacing="4" fill="#8a7d66">YOUR GROUND</text>

  <line x1="960" y1="220" x2="1520" y2="220" stroke="url(#ground)" stroke-width="1.2"/>
  <text x="1508" y="210" text-anchor="end" font-family="Cormorant Garamond, serif" font-size="14" font-style="italic" letter-spacing="4" fill="#8a7d66">ANOTHER GROUND</text>

  <line x1="80" y1="470" x2="1520" y2="470" stroke="url(#threshold)" stroke-width="1.2"/>
  <text x="80" y="455" font-family="Cormorant Garamond, serif" font-size="13" font-style="italic" letter-spacing="4" fill="#7a6d56">— the threshold —</text>

  <circle cx="360" cy="720" r="180" fill="url(#source)"/>
  <circle cx="360" cy="720" r="9" fill="#fff4d6"/>
  <text x="360" y="635" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="24" font-weight="400" letter-spacing="5" fill="#e8dcc4">THE APPARATUS</text>
  <text x="360" y="660" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="16" font-style="italic" letter-spacing="2" fill="#9a8d76">stays where it was built</text>

  <!-- Ghost arcs — propagation -->
  <path d="M 360 720 C 800 720, 800 220, 1240 220" fill="none" stroke="#d4af6a" stroke-opacity="0.18" stroke-width="0.9" stroke-dasharray="3,5" transform="translate(-45,25)"/>
  <path d="M 360 720 C 800 720, 800 220, 1240 220" fill="none" stroke="#d4af6a" stroke-opacity="0.18" stroke-width="0.9" stroke-dasharray="3,5" transform="translate(30,-15)"/>
  <path d="M 360 720 C 800 720, 800 220, 1240 220" fill="none" stroke="#d4af6a" stroke-opacity="0.13" stroke-width="0.8" stroke-dasharray="2,6" transform="translate(60,-35)"/>

  <!-- Primary arc -->
  <path d="M 360 720 C 800 720, 800 220, 1240 220" fill="none" stroke="#d4af6a" stroke-opacity="0.55" stroke-width="1.3"/>
  <circle cx="800" cy="470" r="65" fill="url(#crossing)"/>
  <circle cx="800" cy="470" r="4" fill="#fff4d6"/>

  <circle cx="1240" cy="220" r="110" fill="url(#reception)"/>
  <circle cx="1240" cy="220" r="7" fill="#fff4d6"/>
  <text x="1240" y="320" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="24" font-weight="400" letter-spacing="5" fill="#e8dcc4">RECOGNITION</text>
  <text x="1240" y="345" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="16" font-style="italic" letter-spacing="2" fill="#9a8d76">the form, used</text>

  <!-- Closing line -->
  <text x="800" y="800" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="22" font-style="italic" font-weight="300"
        fill="#e8dcc4">the form is portable; the ground is yours</text>

  <text x="800" y="855" text-anchor="middle"
        font-family="Cormorant Garamond, serif" font-size="14" font-style="italic" letter-spacing="6"
        fill="#6a5d46">STEP 5 OF 5</text>

  <rect width="1600" height="900" filter="url(#grain)" opacity="0.55"/>
</svg>
