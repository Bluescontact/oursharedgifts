<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="30%" stop-color="#f0c674" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>

  <line x1="420" y1="280" x2="660" y2="280" stroke="url(#accent)" stroke-width="1.5"/>
  <circle cx="540" cy="280" r="30" fill="url(#dot)"/>
  <circle cx="540" cy="280" r="3" fill="#fff4d6"/>

  <text x="540" y="510" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="74" font-weight="400" letter-spacing="2"
        fill="#e8dcc4">The form is portable.</text>

  <text x="540" y="620" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="74" font-weight="400" letter-spacing="2"
        fill="#e8dcc4">The ground is yours.</text>

  <text x="540" y="850" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="22" font-style="italic" font-weight="300" letter-spacing="3"
        fill="#7a6d56">THE RECOGNITION THRESHOLD</text>
</svg>
