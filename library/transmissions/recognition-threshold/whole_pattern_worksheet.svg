<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1600" width="1240" height="1600">
  <defs>
    <radialGradient id="field" cx="50%" cy="50%" r="85%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="45%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <linearGradient id="threshold_faint" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ground_faint" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a3a3a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6a5d46" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3a3a3a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ghost_bloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#d4af6a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1240" height="1600" fill="url(#field)"/>

  <!-- Header -->
  <text x="620" y="70" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="32" font-weight="400" letter-spacing="6"
        fill="#e8dcc4">THE RECOGNITION THRESHOLD — worksheet</text>
  <text x="620" y="105" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="16" font-style="italic" letter-spacing="3"
        fill="#7a6d56">map your own apparatus, form, and grounds</text>

  <!-- ============================================ -->
  <!-- THE FIGURE (faded, with empty slots)         -->
  <!-- ============================================ -->
  <g transform="translate(0,80)">

    <!-- Grounds -->
    <line x1="80" y1="640" x2="540" y2="640" stroke="url(#ground_faint)" stroke-width="1"/>
    <text x="92" y="630" font-family="Cormorant Garamond, serif" font-size="12" font-style="italic" letter-spacing="4" fill="#6a5d46">YOUR GROUND</text>

    <line x1="700" y1="220" x2="1160" y2="220" stroke="url(#ground_faint)" stroke-width="1"/>
    <text x="1148" y="210" text-anchor="end" font-family="Cormorant Garamond, serif" font-size="12" font-style="italic" letter-spacing="4" fill="#6a5d46">ANOTHER GROUND</text>

    <!-- Threshold -->
    <line x1="80" y1="430" x2="1160" y2="430" stroke="url(#threshold_faint)" stroke-width="1"/>
    <text x="80" y="418" font-family="Cormorant Garamond, serif" font-size="11" font-style="italic" letter-spacing="4" fill="#6a5d46">— the threshold —</text>

    <!-- Source slot (faint outline) -->
    <circle cx="290" cy="640" r="130" fill="url(#ghost_bloom)" stroke="#d4af6a" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3,4"/>
    <text x="290" y="638" text-anchor="middle"
          font-family="Cormorant Garamond, serif" font-size="18" letter-spacing="3"
          fill="#9a8d76">[ your apparatus ]</text>
    <text x="290" y="665" text-anchor="middle"
          font-family="Cormorant Garamond, serif" font-size="13" font-style="italic"
          fill="#7a6d56">the capacity you've built</text>

    <!-- Arc (faint, dashed) -->
    <path d="M 290 640 C 670 640, 670 220, 950 220"
          fill="none" stroke="#d4af6a" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="4,5"/>

    <!-- Crossing point slot -->
    <circle cx="630" cy="430" r="50" fill="url(#ghost_bloom)" stroke="#d4af6a" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3,4"/>
    <text x="630" y="510" text-anchor="middle"
          font-family="Cormorant Garamond, serif" font-size="13" font-style="italic"
          fill="#7a6d56">[ what is the form ]</text>

    <!-- Reception slot -->
    <circle cx="950" cy="220" r="90" fill="url(#ghost_bloom)" stroke="#d4af6a" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3,4"/>
    <text x="950" y="335" text-anchor="middle"
          font-family="Cormorant Garamond, serif" font-size="18" letter-spacing="3"
          fill="#9a8d76">[ recognition ]</text>
    <text x="950" y="358" text-anchor="middle"
          font-family="Cormorant Garamond, serif" font-size="13" font-style="italic"
          fill="#7a6d56">whose ground might receive it</text>
  </g>

  <!-- ============================================ -->
  <!-- FILLABLE PROMPTS                             -->
  <!-- ============================================ -->
  <g transform="translate(0,940)">

    <text x="620" y="0" text-anchor="middle"
          font-family="Cormorant Garamond, serif" font-size="14" letter-spacing="6"
          fill="#9a8d76">FILL IN YOUR OWN</text>
    <line x1="100" y1="20" x2="1140" y2="20" stroke="#3a3a3a" stroke-width="1"/>

    <!-- Prompt 1 -->
    <text x="100" y="70" font-family="Cormorant Garamond, serif" font-size="20" fill="#e8dcc4">
      <tspan fill="#f0c674" letter-spacing="3">1.</tspan>
      <tspan dx="12">YOUR GROUND</tspan>
      <tspan fill="#9a8d76" font-style="italic" dx="14" font-size="16">— the substrate you build on (your field, role, lineage, lens)</tspan>
    </text>
    <line x1="100" y1="100" x2="1140" y2="100" stroke="#3a3a3a" stroke-width="0.6"/>
    <line x1="100" y1="135" x2="1140" y2="135" stroke="#3a3a3a" stroke-width="0.6"/>

    <!-- Prompt 2 -->
    <text x="100" y="195" font-family="Cormorant Garamond, serif" font-size="20" fill="#e8dcc4">
      <tspan fill="#f0c674" letter-spacing="3">2.</tspan>
      <tspan dx="12">YOUR APPARATUS</tspan>
      <tspan fill="#9a8d76" font-style="italic" dx="14" font-size="16">— the capacity that generates the work (what stays)</tspan>
    </text>
    <line x1="100" y1="225" x2="1140" y2="225" stroke="#3a3a3a" stroke-width="0.6"/>
    <line x1="100" y1="260" x2="1140" y2="260" stroke="#3a3a3a" stroke-width="0.6"/>

    <!-- Prompt 3 -->
    <text x="100" y="320" font-family="Cormorant Garamond, serif" font-size="20" fill="#e8dcc4">
      <tspan fill="#f0c674" letter-spacing="3">3.</tspan>
      <tspan dx="12">THE FORM</tspan>
      <tspan fill="#9a8d76" font-style="italic" dx="14" font-size="16">— what travels (a framework, a method, an artifact, a lens)</tspan>
    </text>
    <line x1="100" y1="350" x2="1140" y2="350" stroke="#3a3a3a" stroke-width="0.6"/>
    <line x1="100" y1="385" x2="1140" y2="385" stroke="#3a3a3a" stroke-width="0.6"/>

    <!-- Prompt 4 -->
    <text x="100" y="445" font-family="Cormorant Garamond, serif" font-size="20" fill="#e8dcc4">
      <tspan fill="#f0c674" letter-spacing="3">4.</tspan>
      <tspan dx="12">ANOTHER GROUND</tspan>
      <tspan fill="#9a8d76" font-style="italic" dx="14" font-size="16">— whose substrate might recognize the form (be specific)</tspan>
    </text>
    <line x1="100" y1="475" x2="1140" y2="475" stroke="#3a3a3a" stroke-width="0.6"/>
    <line x1="100" y1="510" x2="1140" y2="510" stroke="#3a3a3a" stroke-width="0.6"/>

    <!-- Prompt 5 -->
    <text x="100" y="570" font-family="Cormorant Garamond, serif" font-size="20" fill="#e8dcc4">
      <tspan fill="#f0c674" letter-spacing="3">5.</tspan>
      <tspan dx="12">YOUR RECOGNITION TEST</tspan>
      <tspan fill="#9a8d76" font-style="italic" dx="14" font-size="16">— what would tell you the form was used, not just judged?</tspan>
    </text>
    <line x1="100" y1="600" x2="1140" y2="600" stroke="#3a3a3a" stroke-width="0.6"/>
    <line x1="100" y1="635" x2="1140" y2="635" stroke="#3a3a3a" stroke-width="0.6"/>
  </g>

  <!-- Closing line -->
  <text x="620" y="1560" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="18" font-style="italic" font-weight="300"
        fill="#7a6d56">the form is portable; the ground is yours</text>
</svg>
