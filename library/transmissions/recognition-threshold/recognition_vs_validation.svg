<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="800" y="140" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="46" font-weight="400" letter-spacing="6"
        fill="#e8dcc4">RECOGNITION IS NOT VALIDATION</text>

  <!-- Vertical separator -->
  <line x1="800" y1="240" x2="800" y2="720" stroke="#3a3a3a" stroke-width="1"/>

  <!-- LEFT: VALIDATION -->
  <text x="450" y="340" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="40" font-weight="400" letter-spacing="6"
        fill="#e8dcc4">VALIDATION</text>

  <circle cx="450" cy="490" r="135" fill="url(#glow)"/>
  <circle cx="450" cy="490" r="7" fill="#f0c674"/>

  <text x="450" y="650" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-style="italic" font-size="22" font-weight="300" letter-spacing="1"
        fill="#9a8d76">judgment of the artifact</text>
  <text x="450" y="685" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-style="italic" font-size="22" font-weight="300" letter-spacing="1"
        fill="#9a8d76">closes a transaction</text>

  <!-- RIGHT: RECOGNITION -->
  <text x="1150" y="340" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="40" font-weight="400" letter-spacing="6"
        fill="#e8dcc4">RECOGNITION</text>

  <circle cx="1150" cy="490" r="135" fill="url(#glow)"/>
  <circle cx="1150" cy="490" r="7" fill="#f0c674"/>

  <text x="1150" y="650" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-style="italic" font-size="22" font-weight="300" letter-spacing="1"
        fill="#9a8d76">use of the operation</text>
  <text x="1150" y="685" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-style="italic" font-size="22" font-weight="300" letter-spacing="1"
        fill="#9a8d76">opens a use</text>

  <!-- Subtitle -->
  <text x="800" y="820" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="22" font-style="italic" font-weight="300"
        fill="#7a6d56">the work stays / the work moves</text>
</svg>
