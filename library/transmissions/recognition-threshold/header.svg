<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- Deep field background with warm shadow -->
    <radialGradient id="field" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>

    <!-- Horizontal luminous boundary -->
    <linearGradient id="boundary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0"/>
      <stop offset="15%" stop-color="#d4af6a" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#f0c674" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="55%" stop-color="#f0c674" stop-opacity="0.95"/>
      <stop offset="85%" stop-color="#d4af6a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft halo around the boundary -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.55"/>
      <stop offset="25%" stop-color="#d4af6a" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#8a6f3f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Central luminous point -->
    <radialGradient id="point" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle atmospheric grain -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.05
                0 0 0 0 0.045
                0 0 0 0 0.035
                0 0 0 0.08 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>

    <!-- Soft mist drift layer -->
    <filter id="mist" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="3" result="mist"/>
      <feColorMatrix in="mist" type="matrix"
        values="0 0 0 0 0.55
                0 0 0 0 0.45
                0 0 0 0 0.3
                0 0 0 0.18 0"/>
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <!-- Gaussian blur for halo softness -->
    <filter id="softblur">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Base field -->
  <rect width="1600" height="900" fill="url(#field)"/>

  <!-- Atmospheric mist over the field -->
  <rect width="1600" height="900" filter="url(#mist)" opacity="0.5"/>

  <!-- Wide soft halo around the threshold -->
  <ellipse cx="800" cy="450" rx="900" ry="220" fill="url(#halo)"/>

  <!-- Secondary inner halo for warmth -->
  <ellipse cx="800" cy="450" rx="500" ry="80" fill="url(#halo)" opacity="0.8"/>

  <!-- The threshold itself: ultra-thin luminous boundary -->
  <line x1="0" y1="450" x2="1600" y2="450" stroke="url(#boundary)" stroke-width="1.5"/>

  <!-- Soft glow beneath the boundary (replicating bloom) -->
  <line x1="0" y1="450" x2="1600" y2="450" stroke="url(#boundary)" stroke-width="6" opacity="0.4" filter="url(#softblur)"/>

  <!-- The luminous threshold point at center -->
  <circle cx="800" cy="450" r="120" fill="url(#point)"/>
  <circle cx="800" cy="450" r="3" fill="#fff4d6"/>

  <!-- Subtle vertical light pillar suggesting threshold-crossing -->
  <line x1="800" y1="80" x2="800" y2="820" stroke="#f0c674" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Atmospheric film grain on top -->
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.6"/>

  <!-- Deep vignette to settle the edges -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
