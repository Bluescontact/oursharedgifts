<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1100" width="1800" height="1100">
  <defs>
    <radialGradient id="field" cx="50%" cy="50%" r="85%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="45%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <linearGradient id="threshold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0"/>
      <stop offset="10%" stop-color="#d4af6a" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#f0c674" stop-opacity="0.85"/>
      <stop offset="90%" stop-color="#d4af6a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a3a3a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8a7d66" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3a3a3a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="source" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#d4af6a" stop-opacity="0.45"/>
      <stop offset="75%" stop-color="#8a6f3f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="reception" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="15%" stop-color="#f0c674" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="crossing" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#f0c674" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <filter id="mist" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="11" result="m"/>
      <feColorMatrix in="m" type="matrix"
        values="0 0 0 0 0.5
                0 0 0 0 0.42
                0 0 0 0 0.28
                0 0 0 0.14 0"/>
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="5" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.06
                0 0 0 0 0.052
                0 0 0 0 0.04
                0 0 0 0.07 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Base field -->
  <rect width="1800" height="1100" fill="url(#field)"/>
  <rect width="1800" height="1100" filter="url(#mist)" opacity="0.45"/>

  <!-- Title -->
  <text x="900" y="80" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="42" font-weight="400" letter-spacing="8"
        fill="#e8dcc4">THE RECOGNITION THRESHOLD — annotated</text>

  <!-- ==== LEFT PANEL: the figure (slightly compressed) ==== -->
  <!-- Subgroup translated/scaled to fit in left ~1200px -->
  <g transform="translate(0,40)">

    <!-- Two grounds -->
    <line x1="80" y1="720" x2="640" y2="720" stroke="url(#ground)" stroke-width="1.2"/>
    <line x1="650" y1="220" x2="1180" y2="220" stroke="url(#ground)" stroke-width="1.2"/>

    <!-- Threshold -->
    <line x1="80" y1="470" x2="1180" y2="470" stroke="url(#threshold)" stroke-width="1.2"/>

    <!-- Source -->
    <circle cx="320" cy="720" r="160" fill="url(#source)"/>
    <circle cx="320" cy="720" r="8" fill="#fff4d6"/>

    <!-- Arc -->
    <path d="M 320 720 C 700 720, 700 220, 950 220"
          fill="none" stroke="#d4af6a" stroke-opacity="0.55" stroke-width="1.3"/>

    <!-- Crossing point -->
    <circle cx="635" cy="470" r="55" fill="url(#crossing)"/>
    <circle cx="635" cy="470" r="4" fill="#fff4d6"/>

    <!-- Reception flash -->
    <circle cx="950" cy="220" r="95" fill="url(#reception)"/>
    <circle cx="950" cy="220" r="7" fill="#fff4d6"/>

    <!-- ==== Numbered callout circles ==== -->
    <!-- 1: Your ground -->
    <circle cx="100" cy="720" r="20" fill="#0a0a0a" stroke="#f0c674" stroke-width="1.5"/>
    <text x="100" y="727" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="20" fill="#f0c674">1</text>

    <!-- 2: Threshold -->
    <circle cx="100" cy="470" r="20" fill="#0a0a0a" stroke="#f0c674" stroke-width="1.5"/>
    <text x="100" y="477" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="20" fill="#f0c674">2</text>

    <!-- 3: Another ground -->
    <circle cx="1160" cy="220" r="20" fill="#0a0a0a" stroke="#f0c674" stroke-width="1.5"/>
    <text x="1160" y="227" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="20" fill="#f0c674">3</text>

    <!-- 4: Apparatus -->
    <circle cx="320" cy="850" r="20" fill="#0a0a0a" stroke="#f0c674" stroke-width="1.5"/>
    <text x="320" y="857" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="20" fill="#f0c674">4</text>

    <!-- 5: Crossing -->
    <circle cx="635" cy="555" r="20" fill="#0a0a0a" stroke="#f0c674" stroke-width="1.5"/>
    <text x="635" y="562" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="20" fill="#f0c674">5</text>

    <!-- 6: Recognition -->
    <circle cx="950" cy="345" r="20" fill="#0a0a0a" stroke="#f0c674" stroke-width="1.5"/>
    <text x="950" y="352" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="20" fill="#f0c674">6</text>
  </g>

  <!-- ==== RIGHT PANEL: legend ==== -->
  <g transform="translate(1240,140)">

    <!-- Section header -->
    <text x="0" y="0" font-family="Cormorant Garamond, serif" font-size="18"
          letter-spacing="5" fill="#9a8d76">READING THE FIGURE</text>
    <line x1="0" y1="20" x2="500" y2="20" stroke="#3a3a3a" stroke-width="1"/>

    <!-- 1 -->
    <circle cx="20" cy="80" r="18" fill="#0a0a0a" stroke="#f0c674" stroke-width="1.2"/>
    <text x="20" y="87" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="18" fill="#f0c674">1</text>
    <text x="60" y="75" font-family="Cormorant Garamond, serif" font-size="22" fill="#e8dcc4" letter-spacing="2">YOUR GROUND</text>
    <text x="60" y="105" font-family="Cormorant Garamond, serif" font-size="16" font-style="italic" fill="#9a8d76">The substrate you build on.</text>

    <!-- 2 -->
    <circle cx="20" cy="180" r="18" fill="#0a0a0a" stroke="#f0c674" stroke-width="1.2"/>
    <text x="20" y="187" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="18" fill="#f0c674">2</text>
    <text x="60" y="175" font-family="Cormorant Garamond, serif" font-size="22" fill="#e8dcc4" letter-spacing="2">THE THRESHOLD</text>
    <text x="60" y="205" font-family="Cormorant Garamond, serif" font-size="16" font-style="italic" fill="#9a8d76">The boundary the form must cross to land.</text>

    <!-- 3 -->
    <circle cx="20" cy="280" r="18" fill="#0a0a0a" stroke="#f0c674" stroke-width="1.2"/>
    <text x="20" y="287" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="18" fill="#f0c674">3</text>
    <text x="60" y="275" font-family="Cormorant Garamond, serif" font-size="22" fill="#e8dcc4" letter-spacing="2">ANOTHER GROUND</text>
    <text x="60" y="305" font-family="Cormorant Garamond, serif" font-size="16" font-style="italic" fill="#9a8d76">Someone else's substrate — different terrain.</text>

    <!-- 4 -->
    <circle cx="20" cy="380" r="18" fill="#0a0a0a" stroke="#f0c674" stroke-width="1.2"/>
    <text x="20" y="387" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="18" fill="#f0c674">4</text>
    <text x="60" y="375" font-family="Cormorant Garamond, serif" font-size="22" fill="#e8dcc4" letter-spacing="2">THE APPARATUS</text>
    <text x="60" y="405" font-family="Cormorant Garamond, serif" font-size="16" font-style="italic" fill="#9a8d76">The capacity that built the lens. Stays.</text>

    <!-- 5 -->
    <circle cx="20" cy="480" r="18" fill="#0a0a0a" stroke="#f0c674" stroke-width="1.2"/>
    <text x="20" y="487" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="18" fill="#f0c674">5</text>
    <text x="60" y="475" font-family="Cormorant Garamond, serif" font-size="22" fill="#e8dcc4" letter-spacing="2">THE FORM CROSSING</text>
    <text x="60" y="505" font-family="Cormorant Garamond, serif" font-size="16" font-style="italic" fill="#9a8d76">The lens in transit. What travels.</text>

    <!-- 6 -->
    <circle cx="20" cy="580" r="18" fill="#0a0a0a" stroke="#f0c674" stroke-width="1.2"/>
    <text x="20" y="587" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="18" fill="#f0c674">6</text>
    <text x="60" y="575" font-family="Cormorant Garamond, serif" font-size="22" fill="#e8dcc4" letter-spacing="2">RECOGNITION</text>
    <text x="60" y="605" font-family="Cormorant Garamond, serif" font-size="16" font-style="italic" fill="#9a8d76">The event. The form, received, used.</text>

    <!-- Reading order note -->
    <line x1="0" y1="680" x2="500" y2="680" stroke="#3a3a3a" stroke-width="1"/>
    <text x="0" y="720" font-family="Cormorant Garamond, serif" font-size="16" font-style="italic" fill="#7a6d56">Read 1 → 6: the apparatus, rooted to your ground,</text>
    <text x="0" y="745" font-family="Cormorant Garamond, serif" font-size="16" font-style="italic" fill="#7a6d56">emits the form, which crosses the threshold</text>
    <text x="0" y="770" font-family="Cormorant Garamond, serif" font-size="16" font-style="italic" fill="#7a6d56">and is recognized on another ground.</text>
  </g>

  <!-- Subtitle -->
  <text x="900" y="1050" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="22" font-style="italic" font-weight="300"
        fill="#9a8d76">the form is portable; the ground is yours</text>

  <!-- Finishing layers -->
  <rect width="1800" height="1100" filter="url(#grain)" opacity="0.55"/>
</svg>
