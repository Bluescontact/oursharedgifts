<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- Deep atmospheric field -->
    <radialGradient id="field" cx="50%" cy="50%" r="85%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="45%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>

    <!-- Threshold line gradient -->
    <linearGradient id="threshold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0"/>
      <stop offset="10%" stop-color="#d4af6a" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#f0c674" stop-opacity="0.85"/>
      <stop offset="90%" stop-color="#d4af6a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </linearGradient>

    <!-- Ground lines: muted but readable -->
    <linearGradient id="ground_left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a3a3a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8a7d66" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3a3a3a" stop-opacity="0"/>
    </linearGradient>

    <!-- Source bloom — deep, steady, warm -->
    <radialGradient id="source" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#d4af6a" stop-opacity="0.45"/>
      <stop offset="75%" stop-color="#8a6f3f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- Reception flash — brighter at center, sharper falloff (the event quality) -->
    <radialGradient id="reception" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="15%" stop-color="#f0c674" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- Crossing-point luminance -->
    <radialGradient id="crossing" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#f0c674" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- Atmospheric mist drift -->
    <filter id="mist" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="11" result="m"/>
      <feColorMatrix in="m" type="matrix"
        values="0 0 0 0 0.5
                0 0 0 0 0.42
                0 0 0 0 0.28
                0 0 0 0.14 0"/>
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <!-- Film grain -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="5" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.06
                0 0 0 0 0.052
                0 0 0 0 0.04
                0 0 0 0.07 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <!-- ============================================ -->
  <!-- BASE FIELD                                   -->
  <!-- ============================================ -->
  <rect width="1600" height="900" fill="url(#field)"/>
  <rect width="1600" height="900" filter="url(#mist)" opacity="0.45"/>

  <!-- ============================================ -->
  <!-- TITLE                                        -->
  <!-- ============================================ -->
  <text x="800" y="105" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="48" font-weight="400" letter-spacing="8"
        fill="#e8dcc4">THE RECOGNITION THRESHOLD</text>

  <!-- ============================================ -->
  <!-- TWO GROUNDS                                  -->
  <!-- Author's ground: lower-left                  -->
  <!-- Recipient's ground: upper-right              -->
  <!-- ============================================ -->

  <!-- Author's ground line — lower-left -->
  <line x1="80" y1="720" x2="640" y2="720" stroke="url(#ground_left)" stroke-width="1.2"/>
  <text x="92" y="710"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="14" font-style="italic" letter-spacing="4"
        fill="#8a7d66">YOUR GROUND</text>

  <!-- Recipient's ground line — upper-right -->
  <line x1="960" y1="220" x2="1520" y2="220" stroke="url(#ground_left)" stroke-width="1.2"/>
  <text x="1508" y="210" text-anchor="end"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="14" font-style="italic" letter-spacing="4"
        fill="#8a7d66">ANOTHER GROUND</text>

  <!-- ============================================ -->
  <!-- THE THRESHOLD                                -->
  <!-- ============================================ -->
  <line x1="80" y1="470" x2="1520" y2="470" stroke="url(#threshold)" stroke-width="1.2"/>
  <text x="80" y="455"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="13" font-style="italic" letter-spacing="4"
        fill="#7a6d56">— the threshold —</text>

  <!-- ============================================ -->
  <!-- THE SOURCE (apparatus / capacity)            -->
  <!-- Rooted to the author's ground, burns steady  -->
  <!-- ============================================ -->

  <!-- Source bloom -->
  <circle cx="360" cy="720" r="180" fill="url(#source)"/>
  <circle cx="360" cy="720" r="9" fill="#fff4d6"/>

  <!-- Source rooting line: a faint vertical anchor into the ground -->
  <line x1="360" y1="720" x2="360" y2="730" stroke="#d4af6a" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Source label -->
  <text x="360" y="635" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="24" font-weight="400" letter-spacing="5"
        fill="#e8dcc4">THE APPARATUS</text>
  <text x="360" y="660" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="16" font-style="italic" letter-spacing="2"
        fill="#9a8d76">stays where it was built</text>

  <!-- ============================================ -->
  <!-- THE TRAVELING ARC (the lens, the form)       -->
  <!-- Curves up from source, crosses threshold,    -->
  <!-- lands on the other ground.                   -->
  <!-- ============================================ -->

  <!-- Faint ghost arcs (other instances of crossing, propagation) -->
  <path d="M 360 720 C 800 720, 800 220, 1240 220"
        fill="none" stroke="#d4af6a" stroke-opacity="0.08"
        stroke-width="0.8" stroke-dasharray="2,4" transform="translate(-30,15)"/>
  <path d="M 360 720 C 800 720, 800 220, 1240 220"
        fill="none" stroke="#d4af6a" stroke-opacity="0.08"
        stroke-width="0.8" stroke-dasharray="2,4" transform="translate(20,-10)"/>

  <!-- Primary arc -->
  <path d="M 360 720 C 800 720, 800 220, 1240 220"
        fill="none" stroke="#d4af6a" stroke-opacity="0.55"
        stroke-width="1.3"/>

  <!-- ============================================ -->
  <!-- THE CROSSING POINT                           -->
  <!-- Where the arc meets the threshold —          -->
  <!-- recognition in transit                       -->
  <!-- ============================================ -->
  <circle cx="800" cy="470" r="65" fill="url(#crossing)"/>
  <circle cx="800" cy="470" r="4" fill="#fff4d6"/>
  <text x="800" y="555" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="14" font-style="italic" letter-spacing="3"
        fill="#9a8d76">the form crossing</text>

  <!-- ============================================ -->
  <!-- THE RECEPTION (recognition event)            -->
  <!-- Lands on another ground; brighter, sharper,  -->
  <!-- the freshness of an event                    -->
  <!-- ============================================ -->

  <!-- Reception flash -->
  <circle cx="1240" cy="220" r="110" fill="url(#reception)"/>
  <circle cx="1240" cy="220" r="7" fill="#fff4d6"/>

  <!-- Reception rooting line -->
  <line x1="1240" y1="220" x2="1240" y2="218" stroke="#fff4d6" stroke-opacity="0.6" stroke-width="1"/>

  <!-- Reception label -->
  <text x="1240" y="320" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="24" font-weight="400" letter-spacing="5"
        fill="#e8dcc4">RECOGNITION</text>
  <text x="1240" y="345" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="16" font-style="italic" letter-spacing="2"
        fill="#9a8d76">the form, used</text>

  <!-- ============================================ -->
  <!-- SUBTITLE                                     -->
  <!-- ============================================ -->
  <text x="800" y="855" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="22" font-style="italic" font-weight="300"
        fill="#9a8d76">the form is portable; the ground is yours</text>

  <!-- ============================================ -->
  <!-- FINISHING LAYERS                             -->
  <!-- ============================================ -->
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.55"/>
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
