<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="field" cx="50%" cy="38%" r="85%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <!-- faint visible surface line -->
    <linearGradient id="surface" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4af6a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </linearGradient>
    <!-- substrate strata -->
    <linearGradient id="substrate" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0"/>
      <stop offset="15%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#f0c674" stop-opacity="0.9"/>
      <stop offset="85%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo_wide" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.55"/>
      <stop offset="25%" stop-color="#d4af6a" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#8a6f3f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="mist" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="3" result="mist"/>
      <feColorMatrix in="mist" type="matrix"
        values="0 0 0 0 0.55
                0 0 0 0 0.45
                0 0 0 0 0.3
                0 0 0 0.18 0"/>
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.05
                0 0 0 0 0.045
                0 0 0 0 0.035
                0 0 0 0.08 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>
    <radialGradient id="substratewash" cx="50%" cy="95%" r="75%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#field)"/>
  <rect width="1600" height="900" fill="url(#mist)"/>
  <rect x="0" y="420" width="1600" height="480" fill="url(#substratewash)"/>

  <!-- broad halo over the substrate band -->
  <ellipse cx="800" cy="560" rx="620" ry="300" fill="url(#halo_wide)"/>

  <!-- faint visible surface line, high -->
  <line x1="300" y1="350" x2="1300" y2="350" stroke="url(#surface)" stroke-width="1"/>

  <!-- luminous substrate strata below -->
  <line x1="200" y1="470" x2="1400" y2="470" stroke="url(#substrate)" stroke-width="1.4"/>
  <line x1="200" y1="560" x2="1400" y2="560" stroke="url(#substrate)" stroke-width="1.8"/>
  <line x1="200" y1="650" x2="1400" y2="650" stroke="url(#substrate)" stroke-width="1.4"/>
  <line x1="200" y1="740" x2="1400" y2="740" stroke="url(#substrate)" stroke-width="1.1" stroke-opacity="0.7"/>

  <rect width="1600" height="900" fill="url(#vignette)"/>
  <rect width="1600" height="900" filter="url(#grain)"/>
</svg>
