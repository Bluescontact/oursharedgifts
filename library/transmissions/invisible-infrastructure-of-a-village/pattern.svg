<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="field_flat" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <!-- visible line: faint, thin, fades at the edges -->
    <linearGradient id="surface" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#d4af6a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0.12"/>
    </linearGradient>
    <!-- substrate lines: brighter, peak at center -->
    <linearGradient id="substrate" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0.18"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="depthwash" cx="50%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#field_flat)"/>

  <!-- Title -->
  <text x="800" y="120" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="50" font-weight="400" letter-spacing="8"
        fill="#e8dcc4">THE INVISIBLE INFRASTRUCTURE</text>

  <!-- soft warm wash rising from the depths -->
  <rect x="100" y="380" width="1400" height="380" fill="url(#depthwash)"/>

  <!-- VISIBLE: a single thin surface line, faint, with its label above -->
  <text x="800" y="290" text-anchor="middle"
        font-family="Inter, Helvetica, sans-serif" font-size="18" font-weight="300"
        letter-spacing="5" fill="#9a8d76">VISIBLE</text>
  <line x1="280" y1="330" x2="1320" y2="330" stroke="url(#surface)" stroke-width="1"/>

  <!-- the boundary between surface and substrate -->
  <text x="1320" y="372" text-anchor="end"
        font-family="Inter, Helvetica, sans-serif" font-size="13" font-style="italic"
        letter-spacing="2" fill="#6f6452">— the line of the map —</text>

  <!-- INVISIBLE: the substrate — denser, brighter strata below -->
  <line x1="240" y1="440" x2="1360" y2="440" stroke="url(#substrate)" stroke-width="1.6" stroke-opacity="0.95"/>
  <line x1="220" y1="520" x2="1380" y2="520" stroke="url(#substrate)" stroke-width="1.8"/>
  <line x1="240" y1="600" x2="1360" y2="600" stroke="url(#substrate)" stroke-width="1.6" stroke-opacity="0.9"/>
  <line x1="280" y1="680" x2="1320" y2="680" stroke="url(#substrate)" stroke-width="1.4" stroke-opacity="0.8"/>

  <!-- luminous vertices where the substrate concentrates (the signature move) -->
  <circle cx="800" cy="440" r="46" fill="url(#glow)"/>
  <circle cx="800" cy="440" r="5" fill="#f0c674"/>
  <circle cx="800" cy="520" r="64" fill="url(#glow)"/>
  <circle cx="800" cy="520" r="6" fill="#f0c674"/>
  <circle cx="800" cy="600" r="46" fill="url(#glow)"/>
  <circle cx="800" cy="600" r="5" fill="#f0c674"/>
  <circle cx="800" cy="680" r="34" fill="url(#glow)"/>
  <circle cx="800" cy="680" r="4" fill="#f0c674"/>

  <!-- INVISIBLE label, set into the substrate -->
  <text x="800" y="770" text-anchor="middle"
        font-family="Inter, Helvetica, sans-serif" font-size="18" font-weight="300"
        letter-spacing="5" fill="#e8dcc4">INVISIBLE</text>

  <!-- Subtitle -->
  <text x="800" y="845" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="22" font-style="italic" font-weight="300"
        fill="#9a8d76">What carries the place is below the line.</text>
</svg>
