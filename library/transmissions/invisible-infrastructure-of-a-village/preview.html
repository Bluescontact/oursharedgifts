<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transmission Preview — The Invisible Infrastructure of a Village</title>
<style>
  body {
    margin: 0;
    background: #0a0a0a;

    font-weight: 300;
    padding: 3rem 1.5rem;
  }
  h1 {
    color: #e8dcc4;

  }
  .sub {
    text-align: center;
    font-style: italic;

  }
