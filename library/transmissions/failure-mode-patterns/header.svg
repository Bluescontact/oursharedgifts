<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- inlined from assets/defs.svg -->
    <radialGradient id="field" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="halo_wide" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.55"/>
      <stop offset="25%" stop-color="#d4af6a" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#8a6f3f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow_dim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <filter id="mist" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="3" result="mist"/>
      <feColorMatrix in="mist" type="matrix"
        values="0 0 0 0 0.55
                0 0 0 0 0.45
                0 0 0 0 0.3
                0 0 0 0.18 0"/>
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.05
                0 0 0 0 0.045
                0 0 0 0 0.035
                0 0 0 0.08 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#field)"/>
  <rect width="1600" height="900" fill="url(#mist)"/>

  <!-- Wide halo behind the form -->
  <circle cx="800" cy="470" r="430" fill="url(#halo_wide)"/>

  <!-- Tetrahedron suspended; one vertex faint -->
  <g transform="translate(800,470)">
    <!-- intact edges -->
    <line x1="0" y1="-180" x2="-220" y2="160" stroke="#d4af6a" stroke-width="1.6" stroke-opacity="0.85"/>
    <line x1="0" y1="-180" x2="220" y2="160" stroke="#d4af6a" stroke-width="1.6" stroke-opacity="0.85"/>
    <line x1="-220" y1="160" x2="220" y2="160" stroke="#d4af6a" stroke-width="1.6" stroke-opacity="0.85"/>
    <!-- faded edges to dimmed vertex -->
    <line x1="0" y1="-180" x2="0" y2="60" stroke="#7a6334" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="2,10"/>
    <line x1="-220" y1="160" x2="0" y2="60" stroke="#7a6334" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="2,10"/>
    <line x1="220" y1="160" x2="0" y2="60" stroke="#7a6334" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="2,10"/>

    <!-- luminous vertices -->
    <circle cx="0" cy="-180" r="50" fill="url(#glow)"/>
    <circle cx="0" cy="-180" r="5" fill="#fff4d6"/>
    <circle cx="-220" cy="160" r="50" fill="url(#glow)"/>
    <circle cx="-220" cy="160" r="5" fill="#fff4d6"/>
    <circle cx="220" cy="160" r="50" fill="url(#glow)"/>
    <circle cx="220" cy="160" r="5" fill="#fff4d6"/>

    <!-- faint dropped vertex -->
    <circle cx="0" cy="60" r="22" fill="url(#glow_dim)" opacity="0.18"/>
    <circle cx="0" cy="60" r="4" fill="#8a7a55"/>
  </g>

  <rect width="1600" height="900" fill="url(#vignette)"/>
  <rect width="1600" height="900" filter="url(#grain)"/>
</svg>
