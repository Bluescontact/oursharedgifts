<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- inlined from assets/defs.svg -->
    <radialGradient id="field_flat" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#field_flat)"/>

  <text x="800" y="120" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="50" font-weight="400" letter-spacing="6"
        fill="#e8dcc4">WHEN A VERTEX DROPS</text>

  <!-- Tetrahedron. Apex top, three-point base. One base vertex (rear/lower) has dropped. -->
  <!-- Holding vertices: APEX (800,300), FRONT-LEFT (540,720), FRONT-RIGHT (1060,720) -->
  <!-- Dropped vertex: REAR (800,590) — dim, edges to it broken -->

  <!-- Intact edges among the three remaining vertices (luminous) -->
  <line x1="800" y1="300" x2="540" y2="720" stroke="#d4af6a" stroke-width="1.8" stroke-opacity="0.95"/>
  <line x1="800" y1="300" x2="1060" y2="720" stroke="#d4af6a" stroke-width="1.8" stroke-opacity="0.95"/>
  <line x1="540" y1="720" x2="1060" y2="720" stroke="#d4af6a" stroke-width="1.8" stroke-opacity="0.95"/>

  <!-- Edges to the dropped vertex: faded, broken (dashed, low opacity) — the form failing -->
  <line x1="800" y1="300" x2="800" y2="590" stroke="#5a4a30" stroke-width="1" stroke-opacity="0.45" stroke-dasharray="2,12"/>
  <line x1="540" y1="720" x2="800" y2="590" stroke="#5a4a30" stroke-width="1" stroke-opacity="0.45" stroke-dasharray="2,12"/>
  <line x1="1060" y1="720" x2="800" y2="590" stroke="#5a4a30" stroke-width="1" stroke-opacity="0.45" stroke-dasharray="2,12"/>

  <!-- Holding vertices: luminous -->
  <circle cx="800" cy="300" r="44" fill="url(#glow)"/>
  <circle cx="800" cy="300" r="6" fill="#fff4d6"/>
  <text x="800" y="258" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" letter-spacing="4" fill="#e8dcc4">DIFFERENTIATION</text>

  <circle cx="540" cy="720" r="44" fill="url(#glow)"/>
  <circle cx="540" cy="720" r="6" fill="#fff4d6"/>
  <text x="490" y="770" text-anchor="end" font-family="Inter, sans-serif" font-size="20" letter-spacing="4" fill="#e8dcc4">CONNECTION</text>

  <circle cx="1060" cy="720" r="44" fill="url(#glow)"/>
  <circle cx="1060" cy="720" r="6" fill="#fff4d6"/>
  <text x="1110" y="770" text-anchor="start" font-family="Inter, sans-serif" font-size="20" letter-spacing="4" fill="#e8dcc4">BOUNDARIES</text>

  <!-- Dropped vertex: dim ghost, no glow, hollow ring -->
  <circle cx="800" cy="590" r="11" fill="none" stroke="#5a4a30" stroke-width="1" stroke-opacity="0.55"/>
  <text x="800" y="636" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" letter-spacing="4" fill="#6f6450">ARCHITECTURE</text>
  <text x="800" y="664" text-anchor="middle" font-family="Cormorant Garamond, Garamond, serif" font-style="italic" font-size="17" letter-spacing="1" fill="#6f6450">missing</text>

  <rect width="1600" height="900" fill="url(#vignette)"/>

  <text x="800" y="838" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="23" font-style="italic" font-weight="300"
        fill="#9a8d76">The recurring failure names which one.</text>
</svg>
