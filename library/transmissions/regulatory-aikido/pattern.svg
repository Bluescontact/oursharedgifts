<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <!-- small input node glow -->
    <radialGradient id="glow_small" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <!-- large output node glow — the amplified result -->
    <radialGradient id="glow_large" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <!-- pressure-point glow at the leverage vertex -->
    <radialGradient id="glow_point" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <!-- widening flow — input thin, output broad -->
    <linearGradient id="flow_out" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="800" y="150" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="54" font-weight="400" letter-spacing="8"
        fill="#e8dcc4">REGULATORY AIKIDO</text>

  <!-- Small precise input node (left) -->
  <circle cx="250" cy="500" r="36" fill="url(#glow_small)"/>
  <circle cx="250" cy="500" r="4" fill="#f0c674"/>
  <text x="250" y="430" text-anchor="middle"
        font-family="Inter, Helvetica, sans-serif" font-size="19" font-weight="300" letter-spacing="4"
        fill="#9a8d76">SMALL PRECISE INPUT</text>

  <!-- Thin flow line in -->
  <line x1="290" y1="500" x2="700" y2="500" stroke="#d4af6a" stroke-width="1.2" stroke-opacity="0.7"/>

  <!-- The system's own force structure — the structural band / leverage point -->
  <rect x="700" y="300" width="200" height="400" fill="none" stroke="#d4af6a" stroke-width="1.5" stroke-opacity="0.9"/>
  <text x="800" y="270" text-anchor="middle"
        font-family="Inter, Helvetica, sans-serif" font-size="20" font-weight="300" letter-spacing="4"
        fill="#e8dcc4">PRESSURE POINT</text>

  <!-- Luminous leverage vertex at the centre of the band -->
  <circle cx="800" cy="500" r="70" fill="url(#glow_point)"/>
  <circle cx="800" cy="500" r="6" fill="#f0c674"/>
  <text x="800" y="615" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif" font-style="italic" font-size="19" letter-spacing="2"
        fill="#9a8d76">the system's own force</text>

  <!-- Widening flow out — the change the system's momentum carries -->
  <polygon points="900,492 1280,372 1280,628 900,508" fill="url(#flow_out)" opacity="0.55"/>

  <!-- Large amplified output node (right) -->
  <circle cx="1300" cy="500" r="110" fill="url(#glow_large)"/>
  <circle cx="1300" cy="500" r="8" fill="#fff4d6"/>
  <text x="1300" y="370" text-anchor="middle"
        font-family="Inter, Helvetica, sans-serif" font-size="20" font-weight="300" letter-spacing="4"
        fill="#e8dcc4">STRUCTURAL CHANGE</text>

  <!-- Subtitle -->
  <text x="800" y="820" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="23" font-style="italic" font-weight="300" letter-spacing="1"
        fill="#9a8d76">Small precise input, carried by the system's own force.</text>
</svg>
