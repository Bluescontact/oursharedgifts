<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transmission Preview — Regulatory Aikido</title>
<style>
  body {
    margin: 0;
    background: #0a0a0a;
    color: #9a8d76;
    font-family: "Inter", Helvetica, sans-serif;
    padding: 3rem 2rem 5rem;
  }
  h1 {
    color: #e8dcc4;
    font-family: "Cormorant Garamond", Garamond, serif;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-align: center;
    font-size: 1.8rem;
    margin: 0 0 0.5rem;
  }
  .sub {
    text-align: center;
    font-style: italic;
    margin: 0 0 3rem;
    color: #7a6d56;
  }
  figure {
    max-width: 1200px;
    margin: 0 auto 4rem;
  }
  figcaption {
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 0.72rem;
    margin: 0 0 0.9rem;
    color: #7a6d56;
  }
  img {
    width: 100%;
    height: auto;
    display: block;
    border: 1px solid #2a2620;
  }
</style>
</head>
<body>
  <h1>Regulatory Aikido</h1>
  <p class="sub">Transmission artifacts — pattern and header</p>

  <figure>
    <figcaption>Recognition pattern</figcaption>
    <img src="pattern.svg" alt="Recognition pattern for Regulatory Aikido">
  </figure>

  <figure>
    <figcaption>Atmospheric header</figcaption>
    <img src="header.svg" alt="Atmospheric header for Regulatory Aikido">
  </figure>

<!-- Ko-fi floating support button -->
<script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
<script>
  kofiWidgetOverlay.draw('oursharedgifts', {
    'type': 'floating-chat',
    'floating-chat.donateButton.text': 'Support me',
    'floating-chat.donateButton.background-color': '#5cb85c',
    'floating-chat.donateButton.text-color': '#fff'
  });
</script>
</body>
</html>
