<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="field" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="halo_wide" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.55"/>
      <stop offset="25%" stop-color="#d4af6a" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#8a6f3f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <!-- the line of force: enters straight, is redirected at the bright point, sweeps wide -->
    <linearGradient id="incoming" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0"/>
      <stop offset="60%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f0c674" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="redirected" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </linearGradient>
    <filter id="softblur"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="mist" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="3" result="mist"/>
      <feColorMatrix in="mist" type="matrix"
        values="0 0 0 0 0.55  0 0 0 0 0.45  0 0 0 0 0.3  0 0 0 0.18 0"/>
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.05  0 0 0 0 0.045  0 0 0 0 0.035  0 0 0 0.08 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#field)"/>
  <rect width="1600" height="900" fill="url(#mist)"/>

  <!-- soft bloom behind the redirection point -->
  <circle cx="820" cy="470" r="360" fill="url(#halo_wide)"/>

  <!-- incoming line of force, low and straight -->
  <path d="M 120 600 Q 480 560 820 470" fill="none" stroke="url(#incoming)" stroke-width="3" filter="url(#softblur)"/>
  <path d="M 120 600 Q 480 560 820 470" fill="none" stroke="url(#incoming)" stroke-width="1.4"/>

  <!-- redirected line sweeping wide and upward — the system's momentum carrying the change -->
  <path d="M 820 470 Q 1180 380 1500 200" fill="none" stroke="url(#redirected)" stroke-width="3" filter="url(#softblur)"/>
  <path d="M 820 470 Q 1180 380 1500 200" fill="none" stroke="url(#redirected)" stroke-width="1.4"/>

  <!-- the leverage point where the redirection happens -->
  <circle cx="820" cy="470" r="150" fill="url(#point_bright)"/>
  <circle cx="820" cy="470" r="5" fill="#fff4d6"/>

  <rect width="1600" height="900" fill="url(#vignette)"/>
  <rect width="1600" height="900" filter="url(#grain)"/>
</svg>
