<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- inlined from assets/defs.svg -->
    <radialGradient id="field_flat" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="descent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#f0c674" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#field_flat)"/>

  <!-- Title -->
  <text x="800" y="120" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="52" font-weight="400" letter-spacing="8"
        fill="#e8dcc4">THE DRIFT CASCADE</text>

  <!-- Descending cascade: five coupling nodes, each opening the next.
       A single symmetric vertical descent through x=800 — the chain compounds
       as it falls, brightening toward the irreversible end. -->

  <!-- Connecting descent lines -->
  <line x1="800" y1="252" x2="800" y2="352" stroke="url(#descent)" stroke-width="2"/>
  <line x1="800" y1="352" x2="800" y2="452" stroke="url(#descent)" stroke-width="2"/>
  <line x1="800" y1="452" x2="800" y2="552" stroke="url(#descent)" stroke-width="2"/>
  <line x1="800" y1="552" x2="800" y2="652" stroke="url(#descent)" stroke-width="2"/>

  <!-- Node 1 (highest) -->
  <circle cx="800" cy="252" r="46" fill="url(#glow)"/>
  <circle cx="800" cy="252" r="5" fill="#f0c674"/>

  <!-- Node 2 -->
  <circle cx="800" cy="352" r="46" fill="url(#glow)"/>
  <circle cx="800" cy="352" r="5" fill="#f0c674"/>

  <!-- Node 3 -->
  <circle cx="800" cy="452" r="46" fill="url(#glow)"/>
  <circle cx="800" cy="452" r="5" fill="#f0c674"/>

  <!-- Node 4 -->
  <circle cx="800" cy="552" r="46" fill="url(#glow)"/>
  <circle cx="800" cy="552" r="5" fill="#f0c674"/>

  <!-- Node 5 (lowest, irreversible; brightest) -->
  <circle cx="800" cy="652" r="64" fill="url(#point_bright)"/>
  <circle cx="800" cy="652" r="6" fill="#f0c674"/>

  <!-- Subtitle -->
  <text x="800" y="848" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="23" font-style="italic" font-weight="300"
        fill="#9a8d76">Each slip opens the next. Catch the first.</text>
</svg>
