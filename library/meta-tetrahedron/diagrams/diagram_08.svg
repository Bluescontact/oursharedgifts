<text x="270.0" y="114" font-size="10" fill="#7a5a3a" text-anchor="middle" font-weight="500" font-style="italic">somatic ground</text>
<rect x="160.0" y="312" width="220" height="56" rx="6" fill="#f4f4ee" stroke="#2a2a30" stroke-width="1.4"/>
<text x="270.0" y="336" font-size="13" fill="#1a1a1f" text-anchor="middle" font-weight="600">SUBSTRATE</text>
<text x="270.0" y="354" font-size="10" fill="#5c5c66" text-anchor="middle" font-weight="500" font-style="italic">what marks have accumulated</text>
<line x1="210.0" y1="140" x2="210.0" y2="304" stroke="#2a2a30" stroke-width="1.6"/>
<polygon points="205.0,304 215.0,304 210.0,312" fill="#2a2a30"/>
<text x="198.0" y="218.0" font-size="12" fill="#2a2a30" text-anchor="end" font-weight="600">marks</text>
<text x="198.0" y="234.0" font-size="10" fill="#5c5c66" text-anchor="end" font-weight="500" font-style="italic">discrete · punctate</text>
<line x1="330.0" y1="304" x2="330.0" y2="144" stroke="#2a2a30" stroke-width="1.6"/>
<polygon points="325.0,144 335.0,144 330.0,136" fill="#2a2a30"/>
<text x="342.0" y="218.0" font-size="12" fill="#2a2a30" text-anchor="start" font-weight="600">organization</text>
<text x="342.0" y="234.0" font-size="10" fill="#5c5c66" text-anchor="start" font-weight="500" font-style="italic">continuous · conditioning</text>
<text x="270.0" y="410" font-size="11" fill="#1a1a1f" text-anchor="middle" font-weight="400" font-family="Garamond, 'EB Garamond', Georgia, serif" font-style="italic">The body marks; the substrate organizes the body's conditions.</text>
<text x="270.0" y="430" font-size="10" fill="#5c5c66" text-anchor="middle" font-weight="400" font-family="Garamond, 'EB Garamond', Georgia, serif" font-style="italic">The circuit is the form's transmission mechanism.</text>
