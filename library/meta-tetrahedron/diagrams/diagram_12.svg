<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 460" width="740" height="460" role="img" font-family="Inter, 'Source Sans 3', 'Helvetica Neue', Helvetica, system-ui, sans-serif">
<rect x="40" y="60" width="320" height="160" rx="6" fill="#f4f4ee" stroke="#8a7423" stroke-width="1.5"/>
<text x="56" y="94" font-size="24" fill="#8a7423" font-weight="600">1</text>
<text x="84" y="90" font-size="13" fill="#1a1a1f" text-anchor="start" font-weight="600">Recognition over invention</text>
<text x="56" y="118" font-size="9" fill="#88888f" font-weight="600" letter-spacing="1.5">PRACTICAL MOVE</text>
<text x="56" y="138" font-size="10" fill="#1a1a1f" text-anchor="start" font-weight="500" font-style="italic">When something feels missing in the</text>
<text x="56" y="152" font-size="10" fill="#1a1a1f" text-anchor="start" font-weight="500" font-style="italic">substrate, ask: what is already operating here</text>
<text x="56" y="166" font-size="10" fill="#1a1a1f" text-anchor="start" font-weight="500" font-style="italic">that I have not yet named?</text>
<rect x="380" y="60" width="320" height="160" rx="6" fill="#f4f4ee" stroke="#4a8a3a" stroke-width="1.5"/>
<text x="396" y="94" font-size="24" fill="#4a8a3a" font-weight="600">2</text>
<text x="424" y="90" font-size="13" fill="#1a1a1f" text-anchor="start" font-weight="600">Hold the center as productive emptiness</text>
<text x="396" y="118" font-size="9" fill="#88888f" font-weight="600" letter-spacing="1.5">PRACTICAL MOVE</text>
<text x="396" y="138" font-size="10" fill="#1a1a1f" text-anchor="start" font-weight="500" font-style="italic">When the integrating principle is operating</text>
<text x="396" y="152" font-size="10" fill="#1a1a1f" text-anchor="start" font-weight="500" font-style="italic">but not yet legible, write the 4·6·4 — let the</text>
<text x="396" y="166" font-size="10" fill="#1a1a1f" text-anchor="start" font-weight="500" font-style="italic">substrate accumulate around the held position</text>
<text x="396" y="180" font-size="10" fill="#1a1a1f" text-anchor="start" font-weight="500" font-style="italic">until the 1 lands.</text>
<rect x="40" y="240" width="320" height="160" rx="6" fill="#f4f4ee" stroke="#b06a3a" stroke-width="1.5"/>
<text x="56" y="274" font-size="24" fill="#b06a3a" font-weight="600">3</text>
<text x="84" y="270" font-size="13" fill="#1a1a1f" text-anchor="start" font-weight="600">Four modes of self-reference</text>
<text x="56" y="298" font-size="9" fill="#88888f" font-weight="600" letter-spacing="1.5">PRACTICAL MOVE</text>
<text x="56" y="318" font-size="10" fill="#1a1a1f" text-anchor="start" font-weight="500" font-style="italic">When uncertain how the substrate should work</text>
<text x="56" y="332" font-size="10" fill="#1a1a1f" text-anchor="start" font-weight="500" font-style="italic">on itself: which of the four modes applies</text>
<text x="56" y="346" font-size="10" fill="#1a1a1f" text-anchor="start" font-weight="500" font-style="italic">(self-recognition · self-reading ·</text>
<text x="56" y="360" font-size="10" fill="#1a1a1f" text-anchor="start" font-weight="500" font-style="italic">self-carrying · self-naming)?</text>
<rect x="380" y="240" width="320" height="160" rx="6" fill="#f4f4ee" stroke="#3a6fb0" stroke-width="1.5"/>
<text x="396" y="274" font-size="24" fill="#3a6fb0" font-weight="600">4</text>
<text x="424" y="270" font-size="13" fill="#1a1a1f" text-anchor="start" font-weight="600">Recognition unfolds as process</text>
<text x="396" y="298" font-size="9" fill="#88888f" font-weight="600" letter-spacing="1.5">PRACTICAL MOVE</text>
<text x="396" y="318" font-size="10" fill="#1a1a1f" text-anchor="start" font-weight="500" font-style="italic">When a previous recognition was partial, do</text>
<text x="396" y="332" font-size="10" fill="#1a1a1f" text-anchor="start" font-weight="500" font-style="italic">not delete or rewrite — add the correction as</text>
<text x="396" y="346" font-size="10" fill="#1a1a1f" text-anchor="start" font-weight="500" font-style="italic">a new layer that completes the earlier one.</text>
<text x="370.0" y="430" font-size="11" fill="#5c5c66" text-anchor="middle" font-weight="400" font-family="Garamond, 'EB Garamond', Georgia, serif" font-style="italic">Four principles by which the form operates on its own substrate.</text>
</svg>