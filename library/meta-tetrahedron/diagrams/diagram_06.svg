<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500" role="img" font-family="Inter, 'Source Sans 3', 'Helvetica Neue', Helvetica, system-ui, sans-serif">
<text x="160" y="60" font-size="10" fill="#88888f" text-anchor="middle" font-weight="600">VERTEX (RECOGNITION)</text>
<text x="540" y="60" font-size="10" fill="#88888f" text-anchor="middle" font-weight="600">SHADOW (EXTRACTION)</text>
<line x1="40" y1="70" x2="280" y2="70" stroke="#d8d8d0" stroke-width="0.6"/>
<line x1="420" y1="70" x2="660" y2="70" stroke="#d8d8d0" stroke-width="0.6"/>
<rect x="40" y="79" width="240" height="52" rx="4" fill="#f4f4ee" stroke="#3a6fb0" stroke-width="1.5"/>
<text x="160" y="101" font-size="14" fill="#3a6fb0" text-anchor="middle" font-weight="600">Connection</text>
<text x="160" y="119" font-size="10" fill="#5c5c66" text-anchor="middle" font-weight="500" font-style="italic">value flows between distinct elements</text>
<line x1="290" y1="105" x2="408" y2="105" stroke="#2a2a30" stroke-width="1.3"/>
<polygon points="403,101 412,105 403,109" fill="#2a2a30"/>
<text x="349" y="96" font-size="9" fill="#5c5c66" text-anchor="middle" font-weight="500" font-style="italic">reverses to</text>
<rect x="420" y="79" width="240" height="52" rx="4" fill="#f4f4ee" stroke="#a04040" stroke-width="1.2" stroke-dasharray="3 3"/>
<text x="540" y="101" font-size="14" fill="#a04040" text-anchor="middle" font-weight="600">Capture</text>
<text x="540" y="119" font-size="10" fill="#5c5c66" text-anchor="middle" font-weight="500" font-style="italic">flow becomes one-way taking</text>
<rect x="40" y="169" width="240" height="52" rx="4" fill="#f4f4ee" stroke="#b06a3a" stroke-width="1.5"/>
<text x="160" y="191" font-size="14" fill="#b06a3a" text-anchor="middle" font-weight="600">Differentiation</text>
<text x="160" y="209" font-size="10" fill="#5c5c66" text-anchor="middle" font-weight="500" font-style="italic">each element knows what it is</text>
<line x1="290" y1="195" x2="408" y2="195" stroke="#2a2a30" stroke-width="1.3"/>
<polygon points="403,191 412,195 403,199" fill="#2a2a30"/>
<text x="349" y="186" font-size="9" fill="#5c5c66" text-anchor="middle" font-weight="500" font-style="italic">reverses to</text>
<rect x="420" y="169" width="240" height="52" rx="4" fill="#f4f4ee" stroke="#a04040" stroke-width="1.2" stroke-dasharray="3 3"/>
<text x="540" y="191" font-size="14" fill="#a04040" text-anchor="middle" font-weight="600">Aggregation</text>
<text x="540" y="209" font-size="10" fill="#5c5c66" text-anchor="middle" font-weight="500" font-style="italic">distinctness collapses into score</text>
<rect x="40" y="259" width="240" height="52" rx="4" fill="#f4f4ee" stroke="#8a7423" stroke-width="1.5"/>
<text x="160" y="281" font-size="14" fill="#8a7423" text-anchor="middle" font-weight="600">Architecture</text>
<text x="160" y="299" font-size="10" fill="#5c5c66" text-anchor="middle" font-weight="500" font-style="italic">infrastructure outlasts the builders</text>
<line x1="290" y1="285" x2="408" y2="285" stroke="#2a2a30" stroke-width="1.3"/>
<polygon points="403,281 412,285 403,289" fill="#2a2a30"/>
<text x="349" y="276" font-size="9" fill="#5c5c66" text-anchor="middle" font-weight="500" font-style="italic">reverses to</text>
<rect x="420" y="259" width="240" height="52" rx="4" fill="#f4f4ee" stroke="#a04040" stroke-width="1.2" stroke-dasharray="3 3"/>
<text x="540" y="281" font-size="14" fill="#a04040" text-anchor="middle" font-weight="600">Scaling</text>
<text x="540" y="299" font-size="10" fill="#5c5c66" text-anchor="middle" font-weight="500" font-style="italic">persistence becomes growth</text>
<rect x="40" y="349" width="240" height="52" rx="4" fill="#f4f4ee" stroke="#4a8a3a" stroke-width="1.5"/>
<text x="160" y="371" font-size="14" fill="#4a8a3a" text-anchor="middle" font-weight="600">Boundaries</text>
<text x="160" y="389" font-size="10" fill="#5c5c66" text-anchor="middle" font-weight="500" font-style="italic">limits stated as information</text>
<line x1="290" y1="375" x2="408" y2="375" stroke="#2a2a30" stroke-width="1.3"/>
<polygon points="403,371 412,375 403,379" fill="#2a2a30"/>
<text x="349" y="366" font-size="9" fill="#5c5c66" text-anchor="middle" font-weight="500" font-style="italic">reverses to</text>
<rect x="420" y="349" width="240" height="52" rx="4" fill="#f4f4ee" stroke="#a04040" stroke-width="1.2" stroke-dasharray="3 3"/>
<text x="540" y="371" font-size="14" fill="#a04040" text-anchor="middle" font-weight="600">Performance</text>
<text x="540" y="389" font-size="10" fill="#5c5c66" text-anchor="middle" font-weight="500" font-style="italic">form replaced by visible performance</text>
<text x="350.0" y="482" font-size="11" fill="#5c5c66" text-anchor="middle" font-weight="400" font-family="Garamond, 'EB Garamond', Georgia, serif" font-style="italic">Form predicts its own shadow operations. Each axis refused at design stage.</text>
</svg>