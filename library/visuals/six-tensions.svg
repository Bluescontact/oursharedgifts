<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="vertex_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#f0c674" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="80" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="40" font-weight="400" letter-spacing="5"
        fill="#e8dcc4">SIX PRIMARY TENSIONS</text>

  <text x="800" y="115" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="17" font-style="italic" letter-spacing="2"
        fill="#9a8d76">The six edges of the framework's tetrahedron</text>

  <!-- Tetrahedron with six labeled edges -->
  <!-- Vertex positions -->
  <!-- A (apex top): 800, 220 -->
  <!-- D (base front-left): 470, 660 -->
  <!-- C (base front-right): 1130, 660 -->
  <!-- B (base rear): 800, 555 -->

  <!-- T1 (A↔D) edge -->
  <line x1="800" y1="220" x2="470" y2="660" stroke="#f0c674" stroke-width="2.2" stroke-opacity="0.85"/>
  <text x="540" y="395" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" letter-spacing="3" fill="#e8dcc4" transform="rotate(53, 540, 395)">T1 · Substrate-independent ↔ Instance-specific</text>

  <!-- T6 (A↔C) edge -->
  <line x1="800" y1="220" x2="1130" y2="660" stroke="#f0c674" stroke-width="2.2" stroke-opacity="0.85"/>
  <text x="1060" y="395" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" letter-spacing="3" fill="#e8dcc4" transform="rotate(-53, 1060, 395)">T6 · Architect ↔ Operator</text>

  <!-- T2 (A↔B) edge — dashed (rear) -->
  <line x1="800" y1="220" x2="800" y2="555" stroke="#f0c674" stroke-width="2" stroke-opacity="0.7" stroke-dasharray="4,4"/>
  <text x="822" y="390" text-anchor="start" font-family="Inter, sans-serif" font-size="13" letter-spacing="3" fill="#e8dcc4">T2 · Recognition ↔ Invention</text>

  <!-- T3 (D↔C) bottom edge -->
  <line x1="470" y1="660" x2="1130" y2="660" stroke="#f0c674" stroke-width="2.2" stroke-opacity="0.85"/>
  <text x="800" y="685" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" letter-spacing="3" fill="#e8dcc4">T3 · Gift ↔ Exchange</text>

  <!-- T4 (D↔B) edge — dashed (rear) -->
  <line x1="470" y1="660" x2="800" y2="555" stroke="#f0c674" stroke-width="2" stroke-opacity="0.7" stroke-dasharray="4,4"/>
  <text x="600" y="635" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" letter-spacing="3" fill="#e8dcc4" transform="rotate(-18, 600, 635)">T4 · Crystallization ↔ Holding</text>

  <!-- T5 (C↔B) edge — dashed (rear) -->
  <line x1="1130" y1="660" x2="800" y2="555" stroke="#f0c674" stroke-width="2" stroke-opacity="0.7" stroke-dasharray="4,4"/>
  <text x="1000" y="635" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" letter-spacing="3" fill="#e8dcc4" transform="rotate(18, 1000, 635)">T5 · Receiver-facing ↔ Substrate-aware</text>

  <!-- Vertices -->
  <circle cx="800" cy="220" r="36" fill="url(#vertex_glow)"/>
  <circle cx="800" cy="220" r="5" fill="#f0c674"/>
  <text x="800" y="178" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" letter-spacing="6" fill="#e8dcc4">A</text>

  <circle cx="470" cy="660" r="36" fill="url(#vertex_glow)"/>
  <circle cx="470" cy="660" r="5" fill="#f0c674"/>
  <text x="430" y="710" text-anchor="end" font-family="Inter, sans-serif" font-size="20" letter-spacing="6" fill="#e8dcc4">D</text>

  <circle cx="1130" cy="660" r="36" fill="url(#vertex_glow)"/>
  <circle cx="1130" cy="660" r="5" fill="#f0c674"/>
  <text x="1170" y="710" text-anchor="start" font-family="Inter, sans-serif" font-size="20" letter-spacing="6" fill="#e8dcc4">C</text>

  <circle cx="800" cy="555" r="30" fill="url(#vertex_glow)"/>
  <circle cx="800" cy="555" r="4" fill="#f0c674"/>
  <text x="848" y="552" text-anchor="start" font-family="Inter, sans-serif" font-size="20" letter-spacing="6" fill="#e8dcc4">B</text>

  <text x="800" y="800" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="15" font-style="italic" letter-spacing="2"
        fill="#9a8d76">Every group operates the same six tensions.</text>

  <text x="800" y="828" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="14" font-style="italic" letter-spacing="2"
        fill="#7a6f5e">Each anchor maps to one position.</text>

  <text x="800" y="878" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="11" letter-spacing="8" fill="#7a6f5e">4  ·  6  ·  4  ·  1</text>
</svg>
