<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="vertex_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5a4f3e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3a3328" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="95" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="42" font-weight="400" letter-spacing="5"
        fill="#e8dcc4">FOUR ANTI-EXTRACTION AXES</text>

  <text x="800" y="130" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="18" font-style="italic" letter-spacing="2"
        fill="#9a8d76">Each axis is the shadow operation of one vertex.</text>

  <!-- Center tetrahedron with vertices casting shadows outward -->

  <!-- Tetrahedron edges -->
  <line x1="800" y1="260" x2="540" y2="650" stroke="#d4af6a" stroke-width="1.8"/>
  <line x1="800" y1="260" x2="1060" y2="650" stroke="#d4af6a" stroke-width="1.8"/>
  <line x1="800" y1="260" x2="800" y2="560" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.55" stroke-dasharray="3,3"/>
  <line x1="540" y1="650" x2="1060" y2="650" stroke="#d4af6a" stroke-width="1.8"/>
  <line x1="540" y1="650" x2="800" y2="560" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.55" stroke-dasharray="3,3"/>
  <line x1="1060" y1="650" x2="800" y2="560" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.55" stroke-dasharray="3,3"/>

  <!-- A · Architecture → shadow: SCALING (upward shadow) -->
  <line x1="800" y1="260" x2="800" y2="180" stroke="#5a4f3e" stroke-width="1.2" stroke-dasharray="4,4" stroke-opacity="0.7"/>
  <circle cx="800" cy="170" r="30" fill="url(#shadow_glow)"/>
  <text x="800" y="174" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" letter-spacing="5" fill="#9a8d76">SCALING</text>
  <text x="800" y="192" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="3" fill="#7a6f5e">shadow of Architecture</text>
  <circle cx="800" cy="260" r="42" fill="url(#vertex_glow)"/>
  <circle cx="800" cy="260" r="6" fill="#f0c674"/>
  <text x="800" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" letter-spacing="5" fill="#e8dcc4">A</text>
  <text x="800" y="312" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="3" fill="#9a8d76">Architecture</text>

  <!-- D · Differentiation → shadow: AGGREGATION (leftward-downward) -->
  <line x1="540" y1="650" x2="430" y2="740" stroke="#5a4f3e" stroke-width="1.2" stroke-dasharray="4,4" stroke-opacity="0.7"/>
  <circle cx="380" cy="775" r="50" fill="url(#shadow_glow)"/>
  <text x="380" y="772" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" letter-spacing="5" fill="#9a8d76">AGGREGATION</text>
  <text x="380" y="792" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="3" fill="#7a6f5e">shadow of Differentiation</text>
  <circle cx="540" cy="650" r="42" fill="url(#vertex_glow)"/>
  <circle cx="540" cy="650" r="6" fill="#f0c674"/>
  <text x="495" y="650" text-anchor="end" font-family="Inter, sans-serif" font-size="14" letter-spacing="5" fill="#e8dcc4">D</text>
  <text x="495" y="672" text-anchor="end" font-family="Inter, sans-serif" font-size="10" letter-spacing="3" fill="#9a8d76">Differentiation</text>

  <!-- C · Connection → shadow: CAPTURE (rightward-downward) -->
  <line x1="1060" y1="650" x2="1170" y2="740" stroke="#5a4f3e" stroke-width="1.2" stroke-dasharray="4,4" stroke-opacity="0.7"/>
  <circle cx="1220" cy="775" r="50" fill="url(#shadow_glow)"/>
  <text x="1220" y="772" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" letter-spacing="5" fill="#9a8d76">CAPTURE</text>
  <text x="1220" y="792" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="3" fill="#7a6f5e">shadow of Connection</text>
  <circle cx="1060" cy="650" r="42" fill="url(#vertex_glow)"/>
  <circle cx="1060" cy="650" r="6" fill="#f0c674"/>
  <text x="1105" y="650" text-anchor="start" font-family="Inter, sans-serif" font-size="14" letter-spacing="5" fill="#e8dcc4">C</text>
  <text x="1105" y="672" text-anchor="start" font-family="Inter, sans-serif" font-size="10" letter-spacing="3" fill="#9a8d76">Connection</text>

  <!-- B · Boundaries → shadow: PERFORMANCE (downward from rear) -->
  <line x1="800" y1="560" x2="800" y2="700" stroke="#5a4f3e" stroke-width="1.2" stroke-dasharray="4,4" stroke-opacity="0.7"/>
  <circle cx="800" cy="755" r="40" fill="url(#shadow_glow)"/>
  <text x="800" y="752" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" letter-spacing="5" fill="#9a8d76">PERFORMANCE</text>
  <text x="800" y="772" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="3" fill="#7a6f5e">shadow of Boundaries</text>
  <circle cx="800" cy="560" r="35" fill="url(#vertex_glow)"/>
  <circle cx="800" cy="560" r="5" fill="#f0c674"/>
  <text x="843" y="558" text-anchor="start" font-family="Inter, sans-serif" font-size="14" letter-spacing="5" fill="#e8dcc4">B</text>
  <text x="843" y="578" text-anchor="start" font-family="Inter, sans-serif" font-size="10" letter-spacing="3" fill="#9a8d76">Boundaries</text>

  <text x="800" y="858" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="16" font-style="italic" letter-spacing="2"
        fill="#9a8d76">The framework predicts its own shadow forms.</text>

  <text x="800" y="884" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="11" letter-spacing="8" fill="#7a6f5e">4  ·  6  ·  4  ·  1</text>
</svg>
