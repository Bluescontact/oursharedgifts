<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="vglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="held_center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ground_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#f0c674" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="80" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="40" font-weight="400" letter-spacing="5"
        fill="#e8dcc4">HELD CENTER · PRODUCTIVE EMPTINESS</text>

  <text x="800" y="115" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="17" font-style="italic" letter-spacing="2"
        fill="#9a8d76">The center stays empty by structure · surrounding tension holds the form</text>

  <!-- Outer tetrahedron with four vertices -->
  <line x1="800" y1="220" x2="430" y2="700" stroke="#d4af6a" stroke-width="1.8"/>
  <line x1="800" y1="220" x2="1170" y2="700" stroke="#d4af6a" stroke-width="1.8"/>
  <line x1="800" y1="220" x2="800" y2="600" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.55" stroke-dasharray="3,3"/>
  <line x1="430" y1="700" x2="1170" y2="700" stroke="#d4af6a" stroke-width="1.8"/>
  <line x1="430" y1="700" x2="800" y2="600" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.55" stroke-dasharray="3,3"/>
  <line x1="1170" y1="700" x2="800" y2="600" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.55" stroke-dasharray="3,3"/>

  <!-- Tension arrows from each vertex pulling outward (around the center, not through it) -->
  <g stroke="#d4af6a" stroke-width="1.2" stroke-opacity="0.5" fill="none" stroke-dasharray="4,4">
    <path d="M 800 280 Q 720 350, 720 450"/>
    <path d="M 800 280 Q 880 350, 880 450"/>
    <path d="M 490 660 Q 580 530, 680 510"/>
    <path d="M 1110 660 Q 1020 530, 920 510"/>
    <path d="M 800 555 Q 800 530, 800 510"/>
  </g>

  <!-- Held empty center · structurally unoccupied -->
  <circle cx="800" cy="490" r="120" fill="url(#ground_glow)"/>
  <circle cx="800" cy="490" r="78" fill="url(#held_center)"/>
  <circle cx="800" cy="490" r="60" fill="none" stroke="#9a8d76" stroke-width="0.8" stroke-opacity="0.45" stroke-dasharray="2,4"/>
  <text x="800" y="475" text-anchor="middle" font-family="Cormorant Garamond, serif" font-style="italic" font-size="16" letter-spacing="3" fill="#9a8d76">structurally</text>
  <text x="800" y="497" text-anchor="middle" font-family="Cormorant Garamond, serif" font-style="italic" font-size="16" letter-spacing="3" fill="#9a8d76">unoccupied</text>
  <text x="800" y="525" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" letter-spacing="4" fill="#7a6f5e">somatic ground</text>

  <!-- Vertices -->
  <circle cx="800" cy="220" r="36" fill="url(#vglow)"/>
  <circle cx="800" cy="220" r="5" fill="#f0c674"/>
  <circle cx="430" cy="700" r="36" fill="url(#vglow)"/>
  <circle cx="430" cy="700" r="5" fill="#f0c674"/>
  <circle cx="1170" cy="700" r="36" fill="url(#vglow)"/>
  <circle cx="1170" cy="700" r="5" fill="#f0c674"/>
  <circle cx="800" cy="600" r="30" fill="url(#vglow)"/>
  <circle cx="800" cy="600" r="4" fill="#f0c674"/>

  <text x="800" y="800" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="16" font-style="italic" letter-spacing="2"
        fill="#9a8d76">No anchor pattern claims the center. The form holds because of</text>

  <text x="800" y="826" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="16" font-style="italic" letter-spacing="2"
        fill="#9a8d76">surrounding tension, not because anyone sits there.</text>

  <text x="800" y="878" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="11" letter-spacing="8" fill="#7a6f5e">4  ·  6  ·  4  ·  1</text>
</svg>
