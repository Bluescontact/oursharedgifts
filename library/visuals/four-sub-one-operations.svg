<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="vglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="center_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#f0c674" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d4af6a"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="80" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="40" font-weight="400" letter-spacing="5"
        fill="#e8dcc4">FOUR SUB-1 OPERATIONS</text>

  <text x="800" y="115" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="17" font-style="italic" letter-spacing="2"
        fill="#9a8d76">Operations the somatic ground performs at the four vertices</text>

  <!-- Tetrahedron edges -->
  <line x1="800" y1="220" x2="430" y2="700" stroke="#d4af6a" stroke-width="1.8"/>
  <line x1="800" y1="220" x2="1170" y2="700" stroke="#d4af6a" stroke-width="1.8"/>
  <line x1="800" y1="220" x2="800" y2="600" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.55" stroke-dasharray="3,3"/>
  <line x1="430" y1="700" x2="1170" y2="700" stroke="#d4af6a" stroke-width="1.8"/>
  <line x1="430" y1="700" x2="800" y2="600" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.55" stroke-dasharray="3,3"/>
  <line x1="1170" y1="700" x2="800" y2="600" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.55" stroke-dasharray="3,3"/>

  <!-- Center: the 1 / somatic ground -->
  <circle cx="800" cy="510" r="58" fill="url(#center_glow)"/>
  <text x="800" y="508" text-anchor="middle" font-family="Cormorant Garamond, serif" font-style="italic" font-size="20" letter-spacing="3" fill="#9a8d76">the 1</text>
  <text x="800" y="528" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" letter-spacing="3" fill="#7a6f5e">somatic ground</text>

  <!-- Operation arrows from center to vertices -->
  <line x1="800" y1="452" x2="800" y2="262" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.55" marker-end="url(#arr)"/>
  <line x1="755" y1="540" x2="475" y2="675" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.55" marker-end="url(#arr)"/>
  <line x1="845" y1="540" x2="1125" y2="675" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.55" marker-end="url(#arr)"/>
  <line x1="800" y1="568" x2="800" y2="585" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.55" marker-end="url(#arr)"/>

  <!-- APEX: A · RECOGNIZE -->
  <circle cx="800" cy="220" r="44" fill="url(#vglow)"/>
  <circle cx="800" cy="220" r="6" fill="#f0c674"/>
  <text x="800" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" letter-spacing="6" fill="#e8dcc4">RECOGNIZE</text>
  <text x="800" y="192" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="4" fill="#9a8d76">A · self-recognition</text>

  <!-- BASE LEFT: D · READ -->
  <circle cx="430" cy="700" r="44" fill="url(#vglow)"/>
  <circle cx="430" cy="700" r="6" fill="#f0c674"/>
  <text x="380" y="760" text-anchor="end" font-family="Inter, sans-serif" font-size="22" letter-spacing="6" fill="#e8dcc4">READ</text>
  <text x="380" y="782" text-anchor="end" font-family="Inter, sans-serif" font-size="11" letter-spacing="4" fill="#9a8d76">D · self-reading</text>

  <!-- BASE RIGHT: C · CARRY -->
  <circle cx="1170" cy="700" r="44" fill="url(#vglow)"/>
  <circle cx="1170" cy="700" r="6" fill="#f0c674"/>
  <text x="1220" y="760" text-anchor="start" font-family="Inter, sans-serif" font-size="22" letter-spacing="6" fill="#e8dcc4">CARRY</text>
  <text x="1220" y="782" text-anchor="start" font-family="Inter, sans-serif" font-size="11" letter-spacing="4" fill="#9a8d76">C · self-carrying</text>

  <!-- BASE REAR: B · NAME -->
  <circle cx="800" cy="600" r="38" fill="url(#vglow)"/>
  <circle cx="800" cy="600" r="5" fill="#f0c674"/>
  <text x="800" y="660" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" letter-spacing="6" fill="#e8dcc4">NAME</text>
  <text x="800" y="682" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="4" fill="#9a8d76">B · self-naming</text>

  <text x="800" y="800" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="16" font-style="italic" letter-spacing="2"
        fill="#9a8d76">Four sub-1s · same ground · four expressions at four vertices.</text>

  <text x="800" y="826" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="14" font-style="italic" letter-spacing="2"
        fill="#7a6f5e">The form predicts its own modes of self-reference.</text>

  <text x="800" y="878" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="11" letter-spacing="8" fill="#7a6f5e">4  ·  6  ·  4  ·  1</text>
</svg>
