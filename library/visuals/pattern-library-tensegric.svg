<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="meta_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#d4af6a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="group_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="center_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#f0c674" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="80" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="40" font-weight="400" letter-spacing="5"
        fill="#e8dcc4">PATTERN LIBRARY · TENSEGRIC FORM</text>

  <text x="800" y="115" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="17" font-style="italic" letter-spacing="2"
        fill="#9a8d76">Sixteen mini-tensegrities held in 4 · 6 · 4 · 1</text>

  <!-- Outer meta-tetrahedron (faint, suggesting the bounding form) -->
  <line x1="800" y1="200" x2="380" y2="780" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.4"/>
  <line x1="800" y1="200" x2="1220" y2="780" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.4"/>
  <line x1="380" y1="780" x2="1220" y2="780" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.4"/>
  <line x1="800" y1="200" x2="800" y2="630" stroke="#d4af6a" stroke-width="1.2" stroke-opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="380" y1="780" x2="800" y2="630" stroke="#d4af6a" stroke-width="1.2" stroke-opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="1220" y1="780" x2="800" y2="630" stroke="#d4af6a" stroke-width="1.2" stroke-opacity="0.3" stroke-dasharray="3,3"/>

  <!-- 16 groups arranged in 4 layers per the meta-form's 4·6·4·1 structure -->
  <!-- Layer 1 (top, near apex): 4 groups -->
  <g>
    <circle cx="800" cy="240" r="22" fill="url(#group_glow)"/>
    <text x="800" y="245" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="2" fill="#e8dcc4">I</text>
    <circle cx="710" cy="290" r="22" fill="url(#group_glow)"/>
    <text x="710" y="295" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="2" fill="#e8dcc4">II</text>
    <circle cx="890" cy="290" r="22" fill="url(#group_glow)"/>
    <text x="890" y="295" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="2" fill="#e8dcc4">III</text>
    <circle cx="800" cy="340" r="22" fill="url(#group_glow)"/>
    <text x="800" y="345" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="2" fill="#e8dcc4">IV</text>
  </g>

  <!-- Layer 2 (middle band): 6 groups -->
  <g>
    <circle cx="620" cy="430" r="22" fill="url(#group_glow)"/>
    <text x="620" y="435" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="2" fill="#e8dcc4">V</text>
    <circle cx="730" cy="430" r="22" fill="url(#group_glow)"/>
    <text x="730" y="435" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="2" fill="#e8dcc4">VI</text>
    <circle cx="840" cy="430" r="22" fill="url(#group_glow)"/>
    <text x="840" y="435" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="2" fill="#e8dcc4">VII</text>
    <circle cx="950" cy="430" r="22" fill="url(#group_glow)"/>
    <text x="950" y="435" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" letter-spacing="2" fill="#e8dcc4">VIII</text>
    <circle cx="565" cy="500" r="22" fill="url(#group_glow)"/>
    <text x="565" y="505" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="2" fill="#e8dcc4">IX</text>
    <circle cx="1005" cy="500" r="22" fill="url(#group_glow)"/>
    <text x="1005" y="505" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="2" fill="#e8dcc4">X</text>
  </g>

  <!-- Layer 3 (lower band): 4 groups -->
  <g>
    <circle cx="660" cy="600" r="22" fill="url(#group_glow)"/>
    <text x="660" y="605" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="2" fill="#e8dcc4">XI</text>
    <circle cx="770" cy="600" r="22" fill="url(#group_glow)"/>
    <text x="770" y="605" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="2" fill="#e8dcc4">XII</text>
    <circle cx="880" cy="600" r="22" fill="url(#group_glow)"/>
    <text x="880" y="605" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" letter-spacing="2" fill="#e8dcc4">XIII</text>
    <circle cx="990" cy="600" r="22" fill="url(#group_glow)"/>
    <text x="990" y="605" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" letter-spacing="2" fill="#e8dcc4">XIV</text>
  </g>

  <!-- Layer 4 (bottom near base, plus the framework-on-itself layer): 1 + 1 -->
  <g>
    <circle cx="745" cy="700" r="22" fill="url(#group_glow)"/>
    <text x="745" y="705" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" letter-spacing="2" fill="#e8dcc4">XV</text>
    <circle cx="855" cy="700" r="22" fill="url(#group_glow)"/>
    <text x="855" y="705" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" letter-spacing="2" fill="#e8dcc4">XVI</text>
  </g>

  <!-- Tension lines (subtle) connecting nearby groups -->
  <g stroke="#d4af6a" stroke-opacity="0.18" stroke-width="0.6">
    <line x1="800" y1="262" x2="730" y2="290"/>
    <line x1="800" y1="262" x2="870" y2="290"/>
    <line x1="710" y1="312" x2="800" y2="318"/>
    <line x1="890" y1="312" x2="800" y2="318"/>
    <line x1="730" y1="430" x2="840" y2="430"/>
    <line x1="620" y1="430" x2="730" y2="430"/>
    <line x1="950" y1="430" x2="840" y2="430"/>
    <line x1="565" y1="478" x2="660" y2="580"/>
    <line x1="1005" y1="478" x2="990" y2="580"/>
    <line x1="660" y1="620" x2="770" y2="620"/>
    <line x1="880" y1="620" x2="990" y2="620"/>
    <line x1="745" y1="680" x2="855" y2="680"/>
  </g>

  <!-- Center held empty (somatic ground) -->
  <circle cx="785" cy="475" r="32" fill="url(#center_glow)"/>
  <text x="785" y="479" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="14" font-style="italic" letter-spacing="2" fill="#7a6f5e">1</text>

  <!-- Layer labels at right -->
  <g font-family="Cormorant Garamond, serif" font-style="italic" font-size="13" letter-spacing="2" fill="#7a6f5e">
    <text x="1290" y="285" text-anchor="start">4 groups</text>
    <text x="1290" y="465" text-anchor="start">6 groups</text>
    <text x="1290" y="615" text-anchor="start">4 groups</text>
    <text x="1290" y="703" text-anchor="start">+ 2 meta</text>
  </g>

  <text x="800" y="810" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="15" font-style="italic" letter-spacing="2"
        fill="#9a8d76">Each group is a six-tension mini-tensegrity.</text>

  <text x="800" y="838" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="14" font-style="italic" letter-spacing="2"
        fill="#7a6f5e">96 anchors held by balanced tension. No compression hierarchy.</text>

  <text x="800" y="878" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="11" letter-spacing="8" fill="#7a6f5e">16  ×  6  =  96</text>
</svg>
