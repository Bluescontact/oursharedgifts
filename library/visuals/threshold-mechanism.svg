<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <linearGradient id="threshold_band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0"/>
      <stop offset="20%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="80%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="below_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8a6f3f" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5a4f3e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="above_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow_up" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f0c674"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="80" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="40" font-weight="400" letter-spacing="5"
        fill="#e8dcc4">THRESHOLD MECHANISM</text>

  <text x="800" y="115" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="17" font-style="italic" letter-spacing="2"
        fill="#9a8d76">Four preconditions · all must cross simultaneously</text>

  <!-- Above-threshold label (right) -->
  <text x="100" y="380" text-anchor="start" font-family="Inter, sans-serif" font-size="11" letter-spacing="4" fill="#9a8d76">CRYSTALLIZED</text>
  <text x="100" y="600" text-anchor="start" font-family="Inter, sans-serif" font-size="11" letter-spacing="4" fill="#7a6f5e">PRE-THRESHOLD</text>

  <!-- Threshold band (luminous horizontal line at y=490) -->
  <rect x="200" y="475" width="1200" height="30" fill="url(#threshold_band)" opacity="0.45"/>
  <line x1="200" y1="490" x2="1400" y2="490" stroke="url(#threshold_band)" stroke-width="2.5"/>
  <text x="1450" y="495" text-anchor="start" font-family="Cormorant Garamond, serif" font-style="italic" font-size="14" letter-spacing="3" fill="#9a8d76">threshold</text>

  <!-- Four parallel crossings · each precondition -->
  <!-- 1: Readiness (leftmost) -->
  <g>
    <circle cx="380" cy="680" r="38" fill="url(#below_glow)"/>
    <path d="M 380 660 L 380 380" stroke="#f0c674" stroke-width="2.4" marker-end="url(#arrow_up)"/>
    <circle cx="380" cy="350" r="38" fill="url(#above_glow)"/>
    <circle cx="380" cy="350" r="5" fill="#f0c674"/>
    <text x="380" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" letter-spacing="5" fill="#e8dcc4">READINESS</text>
    <text x="380" y="304" text-anchor="middle" font-family="Cormorant Garamond, serif" font-style="italic" font-size="12" letter-spacing="2" fill="#9a8d76">substrate density</text>
    <text x="380" y="745" text-anchor="middle" font-family="Cormorant Garamond, serif" font-style="italic" font-size="11" letter-spacing="2" fill="#7a6f5e">precondition 1</text>
  </g>

  <!-- 2: Precision -->
  <g>
    <circle cx="660" cy="680" r="38" fill="url(#below_glow)"/>
    <path d="M 660 660 L 660 380" stroke="#f0c674" stroke-width="2.4" marker-end="url(#arrow_up)"/>
    <circle cx="660" cy="350" r="38" fill="url(#above_glow)"/>
    <circle cx="660" cy="350" r="5" fill="#f0c674"/>
    <text x="660" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" letter-spacing="5" fill="#e8dcc4">PRECISION</text>
    <text x="660" y="304" text-anchor="middle" font-family="Cormorant Garamond, serif" font-style="italic" font-size="12" letter-spacing="2" fill="#9a8d76">vocabulary discipline</text>
    <text x="660" y="745" text-anchor="middle" font-family="Cormorant Garamond, serif" font-style="italic" font-size="11" letter-spacing="2" fill="#7a6f5e">precondition 2</text>
  </g>

  <!-- 3: Novelty -->
  <g>
    <circle cx="940" cy="680" r="38" fill="url(#below_glow)"/>
    <path d="M 940 660 L 940 380" stroke="#f0c674" stroke-width="2.4" marker-end="url(#arrow_up)"/>
    <circle cx="940" cy="350" r="38" fill="url(#above_glow)"/>
    <circle cx="940" cy="350" r="5" fill="#f0c674"/>
    <text x="940" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" letter-spacing="5" fill="#e8dcc4">NOVELTY</text>
    <text x="940" y="304" text-anchor="middle" font-family="Cormorant Garamond, serif" font-style="italic" font-size="12" letter-spacing="2" fill="#9a8d76">structural recognition</text>
    <text x="940" y="745" text-anchor="middle" font-family="Cormorant Garamond, serif" font-style="italic" font-size="11" letter-spacing="2" fill="#7a6f5e">precondition 3</text>
  </g>

  <!-- 4: Bidirectionality (rightmost) -->
  <g>
    <circle cx="1220" cy="680" r="38" fill="url(#below_glow)"/>
    <path d="M 1220 660 L 1220 380" stroke="#f0c674" stroke-width="2.4" marker-end="url(#arrow_up)"/>
    <circle cx="1220" cy="350" r="38" fill="url(#above_glow)"/>
    <circle cx="1220" cy="350" r="5" fill="#f0c674"/>
    <text x="1220" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" letter-spacing="4" fill="#e8dcc4">BIDIRECTIONALITY</text>
    <text x="1220" y="304" text-anchor="middle" font-family="Cormorant Garamond, serif" font-style="italic" font-size="12" letter-spacing="2" fill="#9a8d76">body ↔ substrate loop</text>
    <text x="1220" y="745" text-anchor="middle" font-family="Cormorant Garamond, serif" font-style="italic" font-size="11" letter-spacing="2" fill="#7a6f5e">precondition 4</text>
  </g>

  <text x="800" y="820" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="16" font-style="italic" letter-spacing="2"
        fill="#9a8d76">Crystallization happens when all four cross simultaneously.</text>

  <text x="800" y="846" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="14" font-style="italic" letter-spacing="2"
        fill="#7a6f5e">Three crossed is not enough. The mark closes the arc.</text>

  <text x="800" y="884" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="11" letter-spacing="8" fill="#7a6f5e">4  ·  6  ·  4  ·  1</text>
</svg>
