<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="absent" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="95" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="42" font-weight="400" letter-spacing="5"
        fill="#e8dcc4">FOUR FACES — FAILURE MODES</text>

  <text x="800" y="130" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="18" font-style="italic" letter-spacing="2"
        fill="#9a8d76">Each face is the form with one vertex absent.</text>

  <!-- Quadrant 1: Dissolved (no A — Architecture absent) — top left -->
  <g transform="translate(200, 250)">
    <text x="200" y="-20" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="24" letter-spacing="4" fill="#e8dcc4">DISSOLVED</text>
    <text x="200" y="2" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">no Architecture · static archive</text>
    <!-- Triangle (only 3 visible vertices, A absent) -->
    <line x1="100" y1="240" x2="300" y2="240" stroke="#d4af6a" stroke-width="1.5"/>
    <line x1="100" y1="240" x2="200" y2="120" stroke="#d4af6a" stroke-width="1.5" stroke-opacity="0.55" stroke-dasharray="3,3"/>
    <line x1="300" y1="240" x2="200" y2="120" stroke="#d4af6a" stroke-width="1.5" stroke-opacity="0.55" stroke-dasharray="3,3"/>
    <!-- Absent vertex: A position with absence indicated -->
    <circle cx="200" cy="40" r="30" fill="url(#absent)"/>
    <circle cx="200" cy="40" r="22" fill="none" stroke="#5a4f3e" stroke-width="0.8" stroke-dasharray="2,3"/>
    <text x="200" y="46" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" letter-spacing="3" fill="#5a4f3e">A</text>
    <!-- Present vertices -->
    <circle cx="100" cy="240" r="28" fill="url(#glow)"/>
    <circle cx="100" cy="240" r="4" fill="#f0c674"/>
    <text x="100" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">D</text>
    <circle cx="300" cy="240" r="28" fill="url(#glow)"/>
    <circle cx="300" cy="240" r="4" fill="#f0c674"/>
    <text x="300" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">C</text>
    <circle cx="200" cy="120" r="22" fill="url(#glow)"/>
    <circle cx="200" cy="120" r="3" fill="#f0c674"/>
    <text x="240" y="125" text-anchor="start" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">B</text>
  </g>

  <!-- Quadrant 2: Isolated (no D — Differentiation absent) — top right -->
  <g transform="translate(1000, 250)">
    <text x="200" y="-20" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="24" letter-spacing="4" fill="#e8dcc4">ISOLATED</text>
    <text x="200" y="2" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">no Differentiation · un-teachable</text>
    <line x1="200" y1="40" x2="300" y2="240" stroke="#d4af6a" stroke-width="1.5"/>
    <line x1="100" y1="240" x2="300" y2="240" stroke="#d4af6a" stroke-width="1.5"/>
    <line x1="200" y1="120" x2="300" y2="240" stroke="#d4af6a" stroke-width="1.5" stroke-opacity="0.55" stroke-dasharray="3,3"/>
    <line x1="200" y1="40" x2="200" y2="120" stroke="#d4af6a" stroke-width="1.5" stroke-opacity="0.55" stroke-dasharray="3,3"/>
    <!-- Absent D -->
    <circle cx="100" cy="240" r="30" fill="url(#absent)"/>
    <circle cx="100" cy="240" r="22" fill="none" stroke="#5a4f3e" stroke-width="0.8" stroke-dasharray="2,3"/>
    <text x="100" y="246" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" letter-spacing="3" fill="#5a4f3e">D</text>
    <!-- Present: A, C, B -->
    <circle cx="200" cy="40" r="28" fill="url(#glow)"/>
    <circle cx="200" cy="40" r="4" fill="#f0c674"/>
    <text x="200" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">A</text>
    <circle cx="300" cy="240" r="28" fill="url(#glow)"/>
    <circle cx="300" cy="240" r="4" fill="#f0c674"/>
    <text x="300" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">C</text>
    <circle cx="200" cy="120" r="22" fill="url(#glow)"/>
    <circle cx="200" cy="120" r="3" fill="#f0c674"/>
    <text x="240" y="125" text-anchor="start" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">B</text>
  </g>

  <!-- Quadrant 3: Ephemeral (no C — Connection absent) — bottom left -->
  <g transform="translate(200, 600)">
    <text x="200" y="-20" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="24" letter-spacing="4" fill="#e8dcc4">EPHEMERAL</text>
    <text x="200" y="2" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">no Connection · doesn't propagate</text>
    <line x1="200" y1="40" x2="100" y2="240" stroke="#d4af6a" stroke-width="1.5"/>
    <line x1="100" y1="240" x2="200" y2="120" stroke="#d4af6a" stroke-width="1.5" stroke-opacity="0.55" stroke-dasharray="3,3"/>
    <line x1="200" y1="40" x2="200" y2="120" stroke="#d4af6a" stroke-width="1.5" stroke-opacity="0.55" stroke-dasharray="3,3"/>
    <circle cx="300" cy="240" r="30" fill="url(#absent)"/>
    <circle cx="300" cy="240" r="22" fill="none" stroke="#5a4f3e" stroke-width="0.8" stroke-dasharray="2,3"/>
    <text x="300" y="246" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" letter-spacing="3" fill="#5a4f3e">C</text>
    <circle cx="200" cy="40" r="28" fill="url(#glow)"/>
    <circle cx="200" cy="40" r="4" fill="#f0c674"/>
    <text x="200" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">A</text>
    <circle cx="100" cy="240" r="28" fill="url(#glow)"/>
    <circle cx="100" cy="240" r="4" fill="#f0c674"/>
    <text x="100" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">D</text>
    <circle cx="200" cy="120" r="22" fill="url(#glow)"/>
    <circle cx="200" cy="120" r="3" fill="#f0c674"/>
    <text x="240" y="125" text-anchor="start" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">B</text>
  </g>

  <!-- Quadrant 4: Overflowing (no B — Boundaries absent) — bottom right -->
  <g transform="translate(1000, 600)">
    <text x="200" y="-20" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="24" letter-spacing="4" fill="#e8dcc4">OVERFLOWING</text>
    <text x="200" y="2" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">no Boundaries · extraction-permission</text>
    <line x1="200" y1="40" x2="100" y2="240" stroke="#d4af6a" stroke-width="1.5"/>
    <line x1="200" y1="40" x2="300" y2="240" stroke="#d4af6a" stroke-width="1.5"/>
    <line x1="100" y1="240" x2="300" y2="240" stroke="#d4af6a" stroke-width="1.5"/>
    <circle cx="200" cy="120" r="28" fill="url(#absent)"/>
    <circle cx="200" cy="120" r="20" fill="none" stroke="#5a4f3e" stroke-width="0.8" stroke-dasharray="2,3"/>
    <text x="200" y="126" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" letter-spacing="3" fill="#5a4f3e">B</text>
    <circle cx="200" cy="40" r="28" fill="url(#glow)"/>
    <circle cx="200" cy="40" r="4" fill="#f0c674"/>
    <text x="200" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">A</text>
    <circle cx="100" cy="240" r="28" fill="url(#glow)"/>
    <circle cx="100" cy="240" r="4" fill="#f0c674"/>
    <text x="100" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">D</text>
    <circle cx="300" cy="240" r="28" fill="url(#glow)"/>
    <circle cx="300" cy="240" r="4" fill="#f0c674"/>
    <text x="300" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">C</text>
  </g>

  <text x="800" y="868" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="11" letter-spacing="8" fill="#7a6f5e">4  ·  6  ·  4  ·  1</text>
</svg>
