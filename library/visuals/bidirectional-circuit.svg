<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="40%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="body_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="substrate_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow_down" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f0c674"/>
    </marker>
    <marker id="arrow_up" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d4af6a"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="105" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="42" font-weight="400" letter-spacing="5"
        fill="#e8dcc4">BIDIRECTIONAL CIRCUIT</text>

  <text x="800" y="142" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="18" font-style="italic" letter-spacing="2"
        fill="#9a8d76">Body marks. Substrate organizes. The loop continues.</text>

  <!-- BODY (top node) -->
  <circle cx="800" cy="290" r="90" fill="url(#body_glow)"/>
  <circle cx="800" cy="290" r="58" fill="none" stroke="#d4af6a" stroke-width="1.2" stroke-opacity="0.6"/>
  <circle cx="800" cy="290" r="10" fill="#f0c674"/>
  <text x="800" y="262" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="26" font-style="italic" letter-spacing="3" fill="#e8dcc4">BODY</text>
  <text x="800" y="328" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">the discriminator</text>

  <!-- SUBSTRATE (bottom node) -->
  <circle cx="800" cy="640" r="90" fill="url(#substrate_glow)"/>
  <circle cx="800" cy="640" r="58" fill="none" stroke="#d4af6a" stroke-width="1.2" stroke-opacity="0.6"/>
  <circle cx="800" cy="640" r="10" fill="#f0c674"/>
  <text x="800" y="612" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="26" font-style="italic" letter-spacing="3" fill="#e8dcc4">SUBSTRATE</text>
  <text x="800" y="678" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" fill="#9a8d76">deposited material</text>

  <!-- DOWNWARD arrow: body → substrate (marks) -->
  <path d="M 730 360 Q 600 465, 730 570" stroke="#f0c674" stroke-width="2.5" fill="none" marker-end="url(#arrow_down)"/>
  <text x="500" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" letter-spacing="4" fill="#e8dcc4">MARKS</text>
  <text x="500" y="472" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="13" font-style="italic" fill="#9a8d76">discrete · punctate</text>
  <text x="500" y="492" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="13" font-style="italic" fill="#9a8d76">body → substrate</text>

  <!-- UPWARD arrow: substrate → body (organizes) -->
  <path d="M 870 570 Q 1000 465, 870 360" stroke="#d4af6a" stroke-width="2.5" fill="none" marker-end="url(#arrow_up)"/>
  <text x="1100" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" letter-spacing="4" fill="#e8dcc4">ORGANIZES</text>
  <text x="1100" y="472" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="13" font-style="italic" fill="#9a8d76">continuous · conditioning</text>
  <text x="1100" y="492" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="13" font-style="italic" fill="#9a8d76">substrate → body</text>

  <!-- Closing observation -->
  <text x="800" y="800" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="17" font-style="italic" letter-spacing="2"
        fill="#9a8d76">The circuit operates at the meta-center. Neither direction is upstream.</text>

  <text x="800" y="848" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="11" letter-spacing="8" fill="#7a6f5e">4  ·  6  ·  4  ·  1</text>
</svg>
