<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" width="680" height="520">
  <defs>
    <filter id="c10-paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" seed="9" result="noise"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.99  0 0 0 0 0.98  0 0 0 0 0.95  0 0 0 -2.8 3.4"
        in="noise" result="paper-tone"/>
      <feBlend in="SourceGraphic" in2="paper-tone" mode="multiply"/>
    </filter>
    <filter id="c10-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.6" dy="1.4" stdDeviation="2" flood-color="#1A0E04" flood-opacity="0.15"/>
    </filter>
    <radialGradient id="c10-body" cx="36%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#F4EDD4"/>
      <stop offset="100%" stop-color="#D8C898"/>
    </radialGradient>
    <radialGradient id="c10-node" cx="34%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#F5F1E7"/>
      <stop offset="60%" stop-color="#EAE4D6"/>
      <stop offset="100%" stop-color="#D8D0BF"/>
    </radialGradient>
    <radialGradient id="c10-outer-fill" cx="50%" cy="50%" r="50%">
      <stop offset="75%" stop-color="#F6F3EC" stop-opacity="0"/>
      <stop offset="100%" stop-color="#EDE7D8" stop-opacity="0.45"/>
    </radialGradient>
    <linearGradient id="c10-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAE5D8"/>
      <stop offset="100%" stop-color="#E0D9CB"/>
    </linearGradient>
    <marker id="c10-ag" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#7A5C10"/>
    </marker>
  </defs>

  <rect width="680" height="520" fill="#F6F3EC" filter="url(#c10-paper)"/>

  <!-- Header -->
  <rect x="0" y="0" width="680" height="48" fill="url(#c10-band)"/>
  <line x1="0" y1="48" x2="680" y2="48" stroke="#AFA898" stroke-width="0.8"/>
  <text x="340" y="24" font-size="16" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.025em">The Origin Floor</text>
  <text x="340" y="41" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" letter-spacing="0.09em">BODY AS ZERO · WITNESS AS ORIGIN · DOMAIN TERM NAMES STANCE</text>

  <!-- Outer language boundary ring -->
  <circle cx="340" cy="234" r="152" fill="url(#c10-outer-fill)" stroke="#B8B0A0" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- Middle geometry ring -->
  <circle cx="340" cy="234" r="100" fill="none" stroke="#CEC8B8" stroke-width="0.7" stroke-dasharray="2,5"/>

  <!-- CRAFT-NAME at outer ring top -->
  <line x1="340" y1="82" x2="340" y2="90" stroke="#7A5C10" stroke-width="1.5"/>
  <text x="340" y="78" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.06em">CRAFT-NAME</text>
  <text x="340" y="104" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">arrives as recognition · zero translation distance</text>
  <text x="340" y="118" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Domain Term Names Stance</text>

  <!-- Divergence arc between WITNESS and WITNESSED -->
  <path d="M 242 200 C 280 148, 400 148, 438 200"
    stroke="#7A5C10" stroke-width="1.4" fill="none" stroke-dasharray="4,2.5" marker-end="url(#c10-ag)"/>
  <path d="M 438 208 C 400 158, 280 158, 242 208"
    stroke="#7A5C10" stroke-width="1.4" fill="none" stroke-dasharray="4,2.5" marker-end="url(#c10-ag)"/>
  <text x="340" y="156" font-size="8" fill="#7A5C10" font-family="Georgia,serif" text-anchor="middle" font-style="italic">read for divergence</text>

  <!-- Witness as Origin label (between arc and nodes) -->
  <text x="340" y="176" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Witness as Origin</text>

  <!-- WITNESS node -->
  <circle cx="212" cy="234" r="42" fill="url(#c10-node)" stroke="#1A1005" stroke-width="1.5" filter="url(#c10-shadow)"/>
  <text x="212" y="228" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.03em">WITNESS</text>
  <text x="212" y="242" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">trusted or fail-closed</text>

  <!-- WITNESSED node -->
  <circle cx="468" cy="234" r="42" fill="url(#c10-node)" stroke="#1A1005" stroke-width="1.5" filter="url(#c10-shadow)"/>
  <text x="468" y="228" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.03em">WITNESSED</text>
  <text x="468" y="242" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">trusted or fail-closed</text>

  <!-- BODY at center -->
  <circle cx="340" cy="234" r="54" fill="url(#c10-body)" stroke="#1A1005" stroke-width="2" filter="url(#c10-shadow)"/>
  <text x="340" y="225" font-size="13" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.02em">BODY</text>
  <text x="340" y="240" font-size="9" fill="#3A2808" font-family="Georgia,serif" text-anchor="middle">as zero</text>
  <text x="340" y="255" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">fail-closed</text>

  <!-- Body as Zero label -->
  <text x="340" y="304" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Body as Zero</text>

  <!-- SYSTEM FALSIFIER -->
  <line x1="20" y1="430" x2="660" y2="430" stroke="#AFA898" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="340" y="450" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.09em">SYSTEM FALSIFIER</text>
  <text x="340" y="468" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">Is the next check being measured from the body —</text>
  <text x="340" y="482" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">or from a proxy that replaced the body without being noticed?</text>

  <!-- Footer -->
  <rect x="0" y="502" width="680" height="18" fill="url(#c10-band)"/>
  <line x1="0" y1="502" x2="680" y2="502" stroke="#AFA898" stroke-width="0.8"/>
  <text x="20" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif">Our Shared Gifts · oursharedgifts.org</text>
  <text x="660" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif" text-anchor="end">c10 · the-origin-floor</text>
</svg>
