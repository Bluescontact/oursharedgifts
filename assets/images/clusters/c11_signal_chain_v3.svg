<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" width="680" height="520">
  <defs>
    <filter id="c11-paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" seed="11" result="noise"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.99  0 0 0 0 0.98  0 0 0 0 0.95  0 0 0 -2.8 3.4"
        in="noise" result="paper-tone"/>
      <feBlend in="SourceGraphic" in2="paper-tone" mode="multiply"/>
    </filter>
    <filter id="c11-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.6" dy="1.4" stdDeviation="2" flood-color="#1A0E04" flood-opacity="0.15"/>
    </filter>
    <radialGradient id="c11-node" cx="34%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#F5F1E7"/>
      <stop offset="60%" stop-color="#EAE4D6"/>
      <stop offset="100%" stop-color="#D8D0BF"/>
    </radialGradient>
    <linearGradient id="c11-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAE5D8"/>
      <stop offset="100%" stop-color="#E0D9CB"/>
    </linearGradient>
    <marker id="c11-ar-dark" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#4A3828"/>
    </marker>
    <marker id="c11-ar-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#7A5C10"/>
    </marker>
    <marker id="c11-ar-muted" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#AFA898"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#F6F3EC" filter="url(#c11-paper)"/>

  <!-- Header -->
  <rect x="0" y="0" width="680" height="48" fill="url(#c11-band)"/>
  <line x1="0" y1="48" x2="680" y2="48" stroke="#AFA898" stroke-width="0.8"/>
  <text x="340" y="24" font-size="16" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.025em">The Signal Chain</text>
  <text x="340" y="41" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" letter-spacing="0.09em">BILATERAL ROUTE FORMATION · RECEPTION AS TERRITORY MAP · DELIVERABLE AS SELF-DISCLOSURE</text>

  <!-- ====== SENDER node (left) ====== -->
  <rect x="56" y="168" width="104" height="46" rx="2.5" fill="url(#c11-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c11-shadow)"/>
  <line x1="56" y1="184" x2="160" y2="184" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="108" y="185" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">SENDER</text>
  <text x="108" y="200" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">on own ground</text>
  <!-- Sender ground line -->
  <line x1="44" y1="224" x2="168" y2="224" stroke="#4A3828" stroke-width="1.5"/>
  <text x="106" y="236" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">own ground</text>

  <!-- ====== RECEIVER node (right) ====== -->
  <rect x="520" y="168" width="104" height="46" rx="2.5" fill="url(#c11-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c11-shadow)"/>
  <line x1="520" y1="184" x2="624" y2="184" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="572" y="185" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">RECEIVER</text>
  <text x="572" y="200" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">on own ground</text>
  <!-- Receiver ground line -->
  <line x1="508" y1="224" x2="632" y2="224" stroke="#4A3828" stroke-width="1.5"/>
  <text x="570" y="236" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">own ground</text>

  <!-- ====== BILATERAL ROUTE ====== -->
  <!-- Route labels above -->
  <text x="340" y="156" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">two own-ground participations intersecting</text>
  <text x="340" y="170" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.06em">ROUTE</text>
  <!-- Main route arrow -->
  <line x1="160" y1="191" x2="520" y2="191" stroke="#4A3828" stroke-width="1.5" marker-end="url(#c11-ar-dark)"/>
  <!-- Mid-route gold direction marker -->
  <polygon points="334,185 346,191 334,197" fill="#7A5C10"/>

  <!-- Contrast: unilateral projection (dashed, dissolves) -->
  <line x1="160" y1="207" x2="390" y2="207" stroke="#CEC8B8" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Dissolution: fade to nothing (no marker) -->
  <text x="268" y="220" font-size="8" fill="#9A8878" font-family="Georgia,serif" text-anchor="middle" font-style="italic">unilateral projection — dissolves</text>

  <!-- Pattern label -->
  <text x="340" y="248" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Bilateral Route Formation</text>

  <!-- ====== DELIVERABLE STACK (left zone, below sender) ====== -->
  <!-- gift 1 -->
  <rect x="52" y="258" width="112" height="22" rx="2" fill="#F5F2EC" stroke="#AFA898" stroke-width="0.9"/>
  <text x="108" y="274" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">gift 1</text>
  <!-- gift 2 -->
  <rect x="52" y="284" width="112" height="22" rx="2" fill="#EFEAE0" stroke="#9A8878" stroke-width="0.9"/>
  <text x="108" y="300" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">gift 2</text>
  <!-- gift 3 (gold border — trajectory becomes legible) -->
  <rect x="52" y="310" width="112" height="34" rx="2" fill="url(#c11-node)" stroke="#7A5C10" stroke-width="1.3" filter="url(c11-shadow)"/>
  <line x1="52" y1="326" x2="164" y2="326" stroke="#7A5C10" stroke-width="0.4" opacity="0.3"/>
  <text x="108" y="327" font-size="10" fill="#4A3828" font-family="Georgia,serif" font-weight="bold" text-anchor="middle">gift 3</text>
  <text x="108" y="339" font-size="8" fill="#7A5C10" font-family="Georgia,serif" text-anchor="middle" font-style="italic">trajectory legible</text>

  <!-- Trajectory arc (C-bracket on right side of stack) -->
  <path d="M 164 269 C 188 269 188 310 188 310 C 188 344 164 344 164 344"
    stroke="#7A5C10" stroke-width="1.2" fill="none" stroke-dasharray="3,2" marker-end="url(#c11-ar-gold)"/>
  <text x="196" y="299" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-style="italic">arc emerges</text>
  <text x="196" y="312" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-style="italic">at 3rd</text>

  <!-- Pattern label -->
  <text x="108" y="362" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Deliverable as Self-Disclosure</text>

  <!-- ====== FOLD PATTERN / TERRITORY MAP (right zone) ====== -->
  <!-- Signal arriving and folding at receiver boundary -->
  <path d="M 460 185 L 488 168 L 504 190 L 520 172"
    stroke="#7A5C10" stroke-width="1.3" fill="none"/>
  <text x="490" y="228" font-size="8" fill="#7A5C10" font-family="Georgia,serif" text-anchor="middle" font-style="italic">fold pattern</text>

  <!-- Topographic contour lines (what the fold reveals about receiving environment) -->
  <path d="M 460 248 C 480 243 502 254 524 246" stroke="#AFA898" stroke-width="0.9" fill="none" stroke-dasharray="3,2"/>
  <path d="M 456 262 C 476 257 500 268 526 260" stroke="#AFA898" stroke-width="0.7" fill="none" stroke-dasharray="3,2"/>
  <path d="M 460 276 C 480 271 500 280 522 273" stroke="#AFA898" stroke-width="0.5" fill="none" stroke-dasharray="3,2"/>
  <text x="490" y="294" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">topographic data</text>
  <text x="490" y="307" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">on receiving environment</text>

  <!-- Pattern label -->
  <text x="490" y="326" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Reception as Territory Map</text>

  <!-- ====== SYSTEM FALSIFIER ====== -->
  <line x1="20" y1="382" x2="660" y2="382" stroke="#AFA898" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="340" y="398" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.09em">SYSTEM FALSIFIER</text>
  <text x="340" y="414" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">Is the route bilateral — or is one node projecting into an unresponsive substrate?</text>
  <text x="340" y="429" font-size="9" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">If no fold pattern returns: the route does not exist yet.</text>

  <!-- Footer -->
  <rect x="0" y="502" width="680" height="18" fill="url(#c11-band)"/>
  <line x1="0" y1="502" x2="680" y2="502" stroke="#AFA898" stroke-width="0.8"/>
  <text x="20" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif">Our Shared Gifts · oursharedgifts.org</text>
  <text x="660" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif" text-anchor="end">c11 · the-signal-chain</text>
</svg>
