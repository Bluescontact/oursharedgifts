<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" width="680" height="520">
  <defs>
    <filter id="c12-paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" seed="11" result="noise"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.99  0 0 0 0 0.98  0 0 0 0 0.95  0 0 0 -2.8 3.4"
        in="noise" result="paper-tone"/>
      <feBlend in="SourceGraphic" in2="paper-tone" mode="multiply"/>
    </filter>
    <filter id="c12-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.6" dy="1.4" stdDeviation="2" flood-color="#1A0E04" flood-opacity="0.16"/>
    </filter>
    <radialGradient id="c12-node" cx="34%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#F5F1E7"/>
      <stop offset="60%" stop-color="#EAE4D6"/>
      <stop offset="100%" stop-color="#D8D0BF"/>
    </radialGradient>
    <radialGradient id="c12-center" cx="38%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#F3EDD8"/>
      <stop offset="100%" stop-color="#D4C8A8"/>
    </radialGradient>
    <linearGradient id="c12-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAE5D8"/>
      <stop offset="100%" stop-color="#E0D9CB"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#F6F3EC" filter="url(#c12-paper)"/>

  <!-- Header -->
  <rect x="0" y="0" width="680" height="48" fill="url(#c12-band)"/>
  <line x1="0" y1="48" x2="680" y2="48" stroke="#AFA898" stroke-width="0.8"/>
  <text x="340" y="24" font-size="16" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.025em">The Protocol</text>
  <text x="340" y="41" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" letter-spacing="0.09em">TETRAHEDRAL AGENT PROTOCOL — SEPARATION IS THE WHOLE POINT</text>

  <!-- ====== TETRAHEDRON EDGES ====== -->

  <!-- Primary outer triangle (heavy ink) -->
  <line x1="312" y1="115" x2="196" y2="244" stroke="#1A1005" stroke-width="2"/>
  <line x1="368" y1="115" x2="484" y2="244" stroke="#1A1005" stroke-width="2"/>
  <line x1="196" y1="256" x2="484" y2="256" stroke="#1A1005" stroke-width="2"/>

  <!-- Inner edges to SHAPER (secondary ink, vertical dashed) -->
  <line x1="340" y1="115" x2="340" y2="370" stroke="#4A3828" stroke-width="1.3" stroke-dasharray="5,3"/>
  <line x1="196" y1="268" x2="306" y2="370" stroke="#4A3828" stroke-width="1.3"/>
  <line x1="484" y1="268" x2="374" y2="370" stroke="#4A3828" stroke-width="1.3"/>

  <!-- ====== TENSION LABELS (horizontal, clear of nodes) ====== -->
  <text x="230" y="164" font-size="7.5" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">ground / brake</text>
  <text x="450" y="164" font-size="7.5" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">possibility / cost</text>
  <text x="340" y="278" font-size="7.5" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">what is / what could be</text>
  <text x="358" y="245" font-size="7" fill="#6A5848" font-family="Georgia,serif" font-style="italic">brake / form</text>
  <text x="218" y="326" font-size="7.5" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">fact / form</text>
  <text x="462" y="326" font-size="7.5" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">vision / expression</text>

  <!-- ====== VERTEX NODES ====== -->

  <!-- GOVERNOR (top) — center (340, 90) -->
  <rect x="288" y="68" width="104" height="46" rx="2.5" fill="url(#c12-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c12-shadow)"/>
  <line x1="288" y1="84" x2="392" y2="84" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="340" y="83" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">GOVERNOR</text>
  <text x="340" y="98" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">what it costs</text>
  <text x="340" y="109" font-size="6.5" fill="#9A8878" font-family="Georgia,serif" text-anchor="middle" font-style="italic">rate · brake · fail-closed</text>

  <!-- GROUNDER (left) — center (145, 250) -->
  <rect x="93" y="228" width="104" height="46" rx="2.5" fill="url(#c12-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c12-shadow)"/>
  <line x1="93" y1="244" x2="197" y2="244" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="145" y="243" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">GROUNDER</text>
  <text x="145" y="258" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">what is real</text>
  <text x="145" y="269" font-size="6.5" fill="#9A8878" font-family="Georgia,serif" text-anchor="middle" font-style="italic">facts · constraints · ground</text>

  <!-- DREAMER (right) — center (535, 250) -->
  <rect x="483" y="228" width="104" height="46" rx="2.5" fill="url(#c12-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c12-shadow)"/>
  <line x1="483" y1="244" x2="587" y2="244" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="535" y="243" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">DREAMER</text>
  <text x="535" y="258" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">what could be</text>
  <text x="535" y="269" font-size="6.5" fill="#9A8878" font-family="Georgia,serif" text-anchor="middle" font-style="italic">possibility · generative</text>

  <!-- SHAPER (bottom) — center (340, 393) -->
  <rect x="288" y="370" width="104" height="46" rx="2.5" fill="url(#c12-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c12-shadow)"/>
  <line x1="288" y1="386" x2="392" y2="386" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="340" y="385" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">SHAPER</text>
  <text x="340" y="400" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">what form it takes</text>
  <text x="340" y="411" font-size="6.5" fill="#9A8878" font-family="Georgia,serif" text-anchor="middle" font-style="italic">expression · craft · output</text>

  <!-- CENTER — SYNTHESIS -->
  <circle cx="340" cy="248" r="28" fill="url(#c12-center)" stroke="#7A5C10" stroke-width="1.8" stroke-dasharray="4,2.5" filter="url(#c12-shadow)"/>
  <text x="340" y="243" font-size="7.5" fill="#3A2808" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.05em">CENTER</text>
  <text x="340" y="255" font-size="6.5" fill="#7A5C10" font-family="Georgia,serif" text-anchor="middle" font-style="italic">synthesis</text>
  <text x="340" y="265" font-size="6" fill="#9A8878" font-family="Georgia,serif" text-anchor="middle">separate step</text>

  <!-- Pattern label -->
  <text x="340" y="432" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Tetrahedral Agent Protocol</text>

  <!-- ====== SYSTEM FALSIFIER ====== -->
  <line x1="20" y1="448" x2="660" y2="448" stroke="#AFA898" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="340" y="466" font-size="7.5" fill="#7A5C10" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.09em">SYSTEM FALSIFIER</text>
  <text x="340" y="483" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">Is each vertex doing only its job — or has the Grounder started filling gaps,</text>
  <text x="340" y="496" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">or the Shaper started judging what things cost?</text>

  <!-- Footer -->
  <rect x="0" y="502" width="680" height="18" fill="url(#c12-band)"/>
  <line x1="0" y1="502" x2="680" y2="502" stroke="#AFA898" stroke-width="0.8"/>
  <text x="20" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif">Our Shared Gifts · oursharedgifts.org</text>
  <text x="660" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif" text-anchor="end">c12 · the-protocol</text>
</svg>
