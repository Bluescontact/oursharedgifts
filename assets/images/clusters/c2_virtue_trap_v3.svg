<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" width="680" height="520">
  <defs>
    <filter id="c2-paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" seed="2" result="noise"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.99  0 0 0 0 0.98  0 0 0 0 0.95  0 0 0 -2.8 3.4"
        in="noise" result="paper-tone"/>
      <feBlend in="SourceGraphic" in2="paper-tone" mode="multiply"/>
    </filter>
    <filter id="c2-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.6" dy="1.4" stdDeviation="2" flood-color="#1A0E04" flood-opacity="0.15"/>
    </filter>
    <radialGradient id="c2-node" cx="34%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#F5F1E7"/>
      <stop offset="60%" stop-color="#EAE4D6"/>
      <stop offset="100%" stop-color="#D8D0BF"/>
    </radialGradient>
    <linearGradient id="c2-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAE5D8"/>
      <stop offset="100%" stop-color="#E0D9CB"/>
    </linearGradient>
    <marker id="c2-ar-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#7A5C10"/>
    </marker>
    <marker id="c2-ar-muted" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#AFA898"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#F6F3EC" filter="url(#c2-paper)"/>

  <!-- Header -->
  <rect x="0" y="0" width="680" height="48" fill="url(#c2-band)"/>
  <line x1="0" y1="48" x2="680" y2="48" stroke="#AFA898" stroke-width="0.8"/>
  <text x="340" y="24" font-size="16" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.025em">The Virtue Trap</text>
  <text x="340" y="41" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" letter-spacing="0.09em">NON-INQUIRY AS FELT VIRTUE · SUBSIDIZED CLARITY · VETO PATTERN DRIFT</text>

  <!-- ====== HOLDER node (left) ====== -->
  <rect x="66" y="162" width="104" height="46" rx="2.5" fill="url(#c2-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c2-shadow)"/>
  <line x1="66" y1="178" x2="170" y2="178" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="118" y="179" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">HOLDER</text>
  <text x="118" y="194" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">reads boundary as gift</text>

  <!-- ====== DELEGATE node (right) ====== -->
  <rect x="510" y="162" width="104" height="46" rx="2.5" fill="url(#c2-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c2-shadow)"/>
  <line x1="510" y1="178" x2="614" y2="178" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="562" y="179" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">DELEGATE</text>
  <text x="562" y="194" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">meets wall</text>

  <!-- ====== NON-INQUIRY: asymmetric arc ====== -->
  <!-- Pattern label above -->
  <text x="340" y="63" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Non-Inquiry as Felt Virtue</text>
  <!-- Left arc: dashed gold (gift / felt open from holder side) -->
  <path d="M 170 185 C 218 112 292 72 340 70"
    stroke="#7A5C10" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <!-- Right arc: solid dark heavy (wall / structural from delegate side) -->
  <path d="M 340 70 C 388 72 462 112 510 185"
    stroke="#1A1005" stroke-width="2" fill="none"/>
  <!-- Wall bar at delegate approach -->
  <line x1="508" y1="172" x2="508" y2="198" stroke="#1A1005" stroke-width="3"/>
  <!-- Side labels -->
  <text x="228" y="104" font-size="8" fill="#7A5C10" font-family="Georgia,serif" text-anchor="middle" font-style="italic">gift — felt open</text>
  <text x="452" y="104" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">wall — structural</text>

  <!-- ====== SUBSIDIZED CLARITY: parallel vertical flows (centered) ====== -->
  <!-- Labor DOWN (invisible, muted) -->
  <line x1="316" y1="248" x2="316" y2="328" stroke="#AFA898" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#c2-ar-muted)"/>
  <!-- Clarity UP (visible, gold) -->
  <line x1="364" y1="328" x2="364" y2="248" stroke="#7A5C10" stroke-width="1.8" marker-end="url(#c2-ar-gold)"/>
  <!-- Labels under arrows -->
  <text x="316" y="345" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">labor — unseen</text>
  <text x="364" y="345" font-size="8" fill="#7A5C10" font-family="Georgia,serif" text-anchor="middle" font-style="italic">clarity — visible</text>
  <!-- Bracket showing the asymmetry -->
  <line x1="295" y1="288" x2="385" y2="288" stroke="#CEC8B8" stroke-width="0.7" stroke-dasharray="2,3"/>
  <!-- Pattern label -->
  <text x="340" y="363" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Subsidized Clarity Signal</text>

  <!-- ====== VETO PATTERN DRIFT ====== -->
  <!-- STATED CRITERIA — straight dashed line -->
  <text x="148" y="390" font-size="8" fill="#6A5848" font-family="Georgia,serif" font-weight="bold">STATED CRITERIA</text>
  <line x1="136" y1="400" x2="450" y2="400" stroke="#AFA898" stroke-width="1.3" stroke-dasharray="5,2"/>
  <!-- ACTUAL VETO HISTORY — wavy, drifting below -->
  <text x="148" y="420" font-size="8" fill="#4A3828" font-family="Georgia,serif" font-weight="bold">ACTUAL VETO HISTORY</text>
  <path d="M 136 432 C 185 428 215 442 265 436 C 308 430 338 445 390 438 C 420 434 438 442 450 438"
    stroke="#4A3828" stroke-width="1.5" fill="none"/>
  <!-- Gap indicators (drift made visible) -->
  <line x1="230" y1="400" x2="230" y2="436" stroke="#CEC8B8" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="360" y1="400" x2="360" y2="438" stroke="#CEC8B8" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Pattern label -->
  <text x="293" y="446" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Veto Pattern Drift Detection</text>

  <!-- ====== SYSTEM FALSIFIER ====== -->
  <line x1="20" y1="456" x2="660" y2="456" stroke="#AFA898" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="340" y="470" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.09em">SYSTEM FALSIFIER</text>
  <text x="340" y="484" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">Can the delegate state what would count as passage —</text>
  <text x="340" y="498" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">and would that survive the holder's unannounced veto history?</text>

  <!-- Footer -->
  <rect x="0" y="502" width="680" height="18" fill="url(#c2-band)"/>
  <line x1="0" y1="502" x2="680" y2="502" stroke="#AFA898" stroke-width="0.8"/>
  <text x="20" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif">Our Shared Gifts · oursharedgifts.org</text>
  <text x="660" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif" text-anchor="end">c2 · the-virtue-trap</text>
</svg>
