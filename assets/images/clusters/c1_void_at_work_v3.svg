<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" width="680" height="520">
  <defs>
    <filter id="c1-paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" seed="1" result="noise"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.99  0 0 0 0 0.98  0 0 0 0 0.95  0 0 0 -2.8 3.4"
        in="noise" result="paper-tone"/>
      <feBlend in="SourceGraphic" in2="paper-tone" mode="multiply"/>
    </filter>
    <filter id="c1-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.6" dy="1.4" stdDeviation="2" flood-color="#1A0E04" flood-opacity="0.15"/>
    </filter>
    <radialGradient id="c1-node" cx="34%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#F5F1E7"/>
      <stop offset="60%" stop-color="#EAE4D6"/>
      <stop offset="100%" stop-color="#D8D0BF"/>
    </radialGradient>
    <radialGradient id="c1-gate" cx="36%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#F4EDD4"/>
      <stop offset="100%" stop-color="#D8C898"/>
    </radialGradient>
    <linearGradient id="c1-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAE5D8"/>
      <stop offset="100%" stop-color="#E0D9CB"/>
    </linearGradient>
    <marker id="c1-ar-muted" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#AFA898"/>
    </marker>
    <marker id="c1-ar-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#7A5C10"/>
    </marker>
    <marker id="c1-ar-dark" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#4A3828"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#F6F3EC" filter="url(#c1-paper)"/>

  <!-- Header -->
  <rect x="0" y="0" width="680" height="48" fill="url(#c1-band)"/>
  <line x1="0" y1="48" x2="680" y2="48" stroke="#AFA898" stroke-width="0.8"/>
  <text x="340" y="24" font-size="16" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.025em">The Void at Work</text>
  <text x="340" y="41" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" letter-spacing="0.09em">MANUFACTURED DEFICIT · DREAD OF SUFFICIENCY · GOVERNANCE PUMP · GATE AS F4</text>

  <!-- ====== HOLDER node (left) ====== -->
  <rect x="66" y="118" width="104" height="46" rx="2.5" fill="url(#c1-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c1-shadow)"/>
  <line x1="66" y1="134" x2="170" y2="134" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="118" y="136" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">HOLDER</text>
  <text x="118" y="151" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">retains authority</text>

  <!-- ====== DELEGATE node (right) ====== -->
  <rect x="510" y="118" width="104" height="46" rx="2.5" fill="url(#c1-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c1-shadow)"/>
  <line x1="510" y1="134" x2="614" y2="134" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="562" y="136" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">DELEGATE</text>
  <text x="562" y="151" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">carries undefined load</text>

  <!-- ====== DREAD threshold alarm — midpoint of channels ====== -->
  <!-- Pattern name above triangle -->
  <text x="340" y="65" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Dread of Sufficiency</text>
  <!-- Warning triangle -->
  <polygon points="340,76 330,94 350,94" fill="#F6F3EC" stroke="#9A8878" stroke-width="1.3" filter="url(#c1-shadow)"/>
  <text x="340" y="90" font-size="9" fill="#6A5848" font-family="Georgia,serif" font-weight="bold" text-anchor="middle">!</text>
  <!-- Vertical separator connecting triangle to channels -->
  <line x1="340" y1="94" x2="340" y2="158" stroke="#AFA898" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- ====== Two-channel flow (HOLDER ↔ DELEGATE) ====== -->
  <!-- Upper: obligation/void flowing right (dashed, muted) -->
  <line x1="170" y1="130" x2="510" y2="130" stroke="#AFA898" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#c1-ar-muted)"/>
  <text x="255" y="123" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">obligation — undefined →</text>

  <!-- Lower: failure/yield flowing left (solid gold, primary) -->
  <line x1="510" y1="150" x2="170" y2="150" stroke="#7A5C10" stroke-width="2" marker-end="url(#c1-ar-gold)"/>
  <text x="430" y="165" font-size="8" fill="#7A5C10" font-family="Georgia,serif" text-anchor="middle" font-style="italic">← failure / yield</text>

  <!-- Pattern label: Manufactured Deficit Loop -->
  <text x="340" y="184" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Manufactured Deficit Loop</text>

  <!-- ====== HOLDER → APPARATUS vertical connection ====== -->
  <line x1="118" y1="164" x2="118" y2="284" stroke="#4A3828" stroke-width="1.3" marker-end="url(#c1-ar-dark)"/>

  <!-- ====== APPARATUS node (below HOLDER) ====== -->
  <rect x="66" y="284" width="104" height="46" rx="2.5" fill="url(#c1-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c1-shadow)"/>
  <line x1="66" y1="300" x2="170" y2="300" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="118" y="300" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">APPARATUS</text>
  <text x="118" y="315" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">no exit condition</text>

  <!-- ====== Self-loop on APPARATUS (governance pump) ====== -->
  <path d="M 90 330 C 36 358 36 412 118 404 C 200 412 200 358 146 330"
    stroke="#7A5C10" stroke-width="1.5" fill="none"/>
  <!-- Block terminator (no exit — not an arrowhead) -->
  <rect x="141" y="322" width="9" height="9" rx="1" fill="#9A8878"/>

  <!-- Pattern label -->
  <text x="118" y="428" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Governance as Cost Pump</text>

  <!-- ====== GATE F4 correction (the fix — gold accent) ====== -->
  <rect x="188" y="290" width="164" height="28" rx="2" fill="url(#c1-gate)" stroke="#7A5C10" stroke-width="1.3" stroke-dasharray="4,2" filter="url(#c1-shadow)"/>
  <text x="270" y="308" font-size="8" fill="#3A2808" font-family="Georgia,serif" text-anchor="middle" letter-spacing="0.02em">discharge condition required</text>
  <!-- Connector from gate to apparatus right edge -->
  <line x1="188" y1="303" x2="170" y2="303" stroke="#7A5C10" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Pattern label -->
  <text x="270" y="332" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Gate as F4 — the correction</text>

  <!-- ====== SYSTEM FALSIFIER ====== -->
  <line x1="20" y1="440" x2="660" y2="440" stroke="#AFA898" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="340" y="458" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.09em">SYSTEM FALSIFIER</text>
  <text x="340" y="474" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">Can the holder state, in terms the delegate can verify,</text>
  <text x="340" y="489" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">what would close any active track?</text>

  <!-- Footer -->
  <rect x="0" y="502" width="680" height="18" fill="url(#c1-band)"/>
  <line x1="0" y1="502" x2="680" y2="502" stroke="#AFA898" stroke-width="0.8"/>
  <text x="20" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif">Our Shared Gifts · oursharedgifts.org</text>
  <text x="660" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif" text-anchor="end">c1 · the-void-at-work</text>
</svg>
