<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" width="680" height="520">
  <defs>
    <filter id="c7-paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" seed="7" result="noise"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.99  0 0 0 0 0.98  0 0 0 0 0.95  0 0 0 -2.8 3.4"
        in="noise" result="paper-tone"/>
      <feBlend in="SourceGraphic" in2="paper-tone" mode="multiply"/>
    </filter>
    <filter id="c7-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.6" dy="1.4" stdDeviation="2" flood-color="#1A0E04" flood-opacity="0.15"/>
    </filter>
    <radialGradient id="c7-node" cx="34%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#F5F1E7"/>
      <stop offset="60%" stop-color="#EAE4D6"/>
      <stop offset="100%" stop-color="#D8D0BF"/>
    </radialGradient>
    <linearGradient id="c7-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAE5D8"/>
      <stop offset="100%" stop-color="#E0D9CB"/>
    </linearGradient>
    <marker id="c7-ar-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#7A5C10"/>
    </marker>
    <marker id="c7-ar-dark" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#4A3828"/>
    </marker>
    <marker id="c7-ar-muted" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#AFA898"/>
    </marker>
    <marker id="c7-ar-timeline" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0 0 L7 3.5 L0 7Z" fill="#1A1005"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#F6F3EC" filter="url(#c7-paper)"/>

  <!-- Header -->
  <rect x="0" y="0" width="680" height="48" fill="url(#c7-band)"/>
  <line x1="0" y1="48" x2="680" y2="48" stroke="#AFA898" stroke-width="0.8"/>
  <text x="340" y="24" font-size="16" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.025em">The Record Moves</text>
  <text x="340" y="41" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" letter-spacing="0.09em">WRITTEN RECORD AS COALITION · UNSCORABLE TEST AS PEER LOCK · THE DAYLIGHT TEST</text>

  <!-- ====== TIMELINE ====== -->
  <line x1="38" y1="210" x2="646" y2="210" stroke="#1A1005" stroke-width="1.5" marker-end="url(#c7-ar-timeline)"/>
  <!-- Timeline zone labels -->
  <text x="38" y="226" font-size="8" fill="#6A5848" font-family="Georgia,serif">BEFORE</text>
  <text x="320" y="226" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">AT THE GATE</text>
  <text x="548" y="226" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">THE DEMAND</text>

  <!-- ====== EVENT 1: WRITTEN POSITION (x=130) ====== -->
  <!-- Node -->
  <rect x="72" y="62" width="116" height="46" rx="2.5" fill="url(#c7-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c7-shadow)"/>
  <line x1="72" y1="78" x2="188" y2="78" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="130" y="79" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">WRITTEN POSITION</text>
  <text x="130" y="93" font-size="8" fill="#7A5C10" font-family="Georgia,serif" text-anchor="middle" font-style="italic">fixed in shared medium</text>
  <!-- Below node label + drop -->
  <text x="130" y="116" font-size="8" fill="#7A5C10" font-family="Georgia,serif" text-anchor="middle" font-style="italic">before meeting</text>
  <text x="130" y="130" font-size="8" fill="#9A8878" font-family="Georgia,serif" text-anchor="middle" font-style="italic">isolation geometry collapses</text>
  <line x1="130" y1="134" x2="130" y2="206" stroke="#AFA898" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Pattern label below timeline -->
  <text x="130" y="244" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Written Record as</text>
  <text x="130" y="257" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Pre-Meeting Coalition</text>

  <!-- ====== EVENT 2: GATE / UNSCORABLE TEST (x=320) ====== -->
  <!-- "criteria undefined" above box -->
  <text x="320" y="66" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">criteria undefined · performance irrelevant</text>
  <!-- SUCCESS CRITERIA box (dashed) -->
  <rect x="268" y="70" width="104" height="50" rx="2" fill="#F0EDE4" stroke="#AFA898" stroke-width="0.9" stroke-dasharray="3,2"/>
  <text x="320" y="88" font-size="8" fill="#6A5848" font-family="Georgia,serif" font-weight="bold" text-anchor="middle">SUCCESS CRITERIA:</text>
  <text x="320" y="112" font-size="14" fill="#9A8878" font-family="Georgia,serif" font-weight="bold" text-anchor="middle">?</text>
  <!-- Drop from box to gate -->
  <line x1="320" y1="120" x2="320" y2="192" stroke="#AFA898" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Gate bars crossing timeline -->
  <rect x="294" y="192" width="52" height="36" rx="0" fill="#F0EDE4" stroke="#4A3828" stroke-width="1.3"/>
  <line x1="306" y1="192" x2="306" y2="228" stroke="#4A3828" stroke-width="2.2"/>
  <line x1="320" y1="192" x2="320" y2="228" stroke="#4A3828" stroke-width="2.2"/>
  <line x1="334" y1="192" x2="334" y2="228" stroke="#4A3828" stroke-width="2.2"/>
  <!-- Pattern label below timeline -->
  <text x="320" y="244" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Unscorable Test as</text>
  <text x="320" y="257" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Peer Lock</text>

  <!-- ====== EVENT 3: DEMAND CRITERIA / DAYLIGHT TEST (x=548) ====== -->
  <!-- Node -->
  <rect x="488" y="62" width="120" height="56" rx="2.5" fill="url(#c7-node)" stroke="#7A5C10" stroke-width="1.4" filter="url(#c7-shadow)"/>
  <line x1="488" y1="78" x2="608" y2="78" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="548" y="79" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">DEMAND CRITERIA</text>
  <text x="548" y="93" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">state passage criteria</text>
  <text x="548" y="107" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">read what returns</text>
  <!-- The Daylight Test label below node -->
  <text x="548" y="131" font-size="8" fill="#7A5C10" font-family="Georgia,serif" text-anchor="middle" font-style="italic">The Daylight Test</text>
  <!-- Drop line from node to timeline -->
  <line x1="548" y1="135" x2="548" y2="206" stroke="#AFA898" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- ====== TWO OUTCOME BRANCHES (below timeline from x=548) ====== -->
  <!-- ANSWERED (right, gold) -->
  <path d="M 548 216 L 602 274" stroke="#7A5C10" stroke-width="1.3" fill="none" marker-end="url(#c7-ar-gold)"/>
  <rect x="562" y="274" width="82" height="36" rx="2.5" fill="url(#c7-node)" stroke="#7A5C10" stroke-width="1.3" filter="url(#c7-shadow)"/>
  <line x1="562" y1="290" x2="644" y2="290" stroke="#7A5C10" stroke-width="0.4" opacity="0.3"/>
  <text x="603" y="291" font-size="10" fill="#7A5C10" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">ANSWERED</text>
  <text x="603" y="304" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">omitter — correctable</text>

  <!-- RE-ROUTED (left, dark dashed) -->
  <path d="M 548 216 L 492 274" stroke="#4A3828" stroke-width="1.5" fill="none" stroke-dasharray="3,2" marker-end="url(#c7-ar-dark)"/>
  <rect x="450" y="274" width="82" height="36" rx="2.5" fill="url(#c7-node)" stroke="#AFA898" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="491" y="291" font-size="10" fill="#4A3828" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">RE-ROUTED</text>
  <text x="491" y="304" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">withholder — structural</text>

  <!-- ====== SYSTEM FALSIFIER ====== -->
  <line x1="20" y1="370" x2="660" y2="370" stroke="#AFA898" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="340" y="386" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.09em">SYSTEM FALSIFIER</text>
  <text x="340" y="402" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">Demand the success criterion — was it answered (the omitter, correctable)</text>
  <text x="340" y="417" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">or re-routed (the withholder, structural)?</text>

  <!-- Footer -->
  <rect x="0" y="502" width="680" height="18" fill="url(#c7-band)"/>
  <line x1="0" y1="502" x2="680" y2="502" stroke="#AFA898" stroke-width="0.8"/>
  <text x="20" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif">Our Shared Gifts · oursharedgifts.org</text>
  <text x="660" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif" text-anchor="end">c7 · the-record-moves</text>
</svg>
