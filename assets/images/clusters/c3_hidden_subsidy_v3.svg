<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" width="680" height="520">
  <defs>
    <filter id="c3-paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" seed="3" result="noise"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.99  0 0 0 0 0.98  0 0 0 0 0.95  0 0 0 -2.8 3.4"
        in="noise" result="paper-tone"/>
      <feBlend in="SourceGraphic" in2="paper-tone" mode="multiply"/>
    </filter>
    <filter id="c3-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.6" dy="1.4" stdDeviation="2" flood-color="#1A0E04" flood-opacity="0.15"/>
    </filter>
    <radialGradient id="c3-node" cx="34%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#F5F1E7"/>
      <stop offset="60%" stop-color="#EAE4D6"/>
      <stop offset="100%" stop-color="#D8D0BF"/>
    </radialGradient>
    <radialGradient id="c3-ledger" cx="36%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#F4EDD4"/>
      <stop offset="100%" stop-color="#D8C898"/>
    </radialGradient>
    <linearGradient id="c3-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAE5D8"/>
      <stop offset="100%" stop-color="#E0D9CB"/>
    </linearGradient>
    <marker id="c3-ar-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#7A5C10"/>
    </marker>
    <marker id="c3-ar-muted" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#AFA898"/>
    </marker>
    <marker id="c3-ar-dark" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#4A3828"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#F6F3EC" filter="url(#c3-paper)"/>

  <!-- Header -->
  <rect x="0" y="0" width="680" height="48" fill="url(#c3-band)"/>
  <line x1="0" y1="48" x2="680" y2="48" stroke="#AFA898" stroke-width="0.8"/>
  <text x="340" y="24" font-size="16" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.025em">The Hidden Subsidy</text>
  <text x="340" y="41" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" letter-spacing="0.09em">COST EXTERNALIZED · HOLDER'S CONSENTED LEDGER · RELOCATION RELEASE AMNESTY</text>

  <!-- ====== AUTHORITY node (top center) ====== -->
  <rect x="236" y="72" width="104" height="46" rx="2.5" fill="url(#c3-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c3-shadow)"/>
  <line x1="236" y1="88" x2="340" y2="88" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="288" y="89" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">AUTHORITY</text>
  <text x="288" y="104" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">retains control</text>

  <!-- ====== DELEGATE node (bottom center) ====== -->
  <rect x="236" y="312" width="104" height="46" rx="2.5" fill="url(#c3-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c3-shadow)"/>
  <line x1="236" y1="328" x2="340" y2="328" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="288" y="329" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">DELEGATE</text>
  <text x="288" y="344" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">bears cost</text>

  <!-- ====== Two vertical channels (AUTHORITY → DELEGATE) ====== -->
  <!-- Left: cost migrating down (dashed muted) -->
  <line x1="258" y1="118" x2="258" y2="312" stroke="#AFA898" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#c3-ar-muted)"/>
  <text x="218" y="225" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">cost</text>
  <text x="218" y="237" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">migrates ↓</text>
  <!-- Right: authority staying up (faint dotted) -->
  <line x1="318" y1="118" x2="318" y2="312" stroke="#CEC8B8" stroke-width="1" stroke-dasharray="2,4"/>
  <text x="356" y="225" font-size="8" fill="#6A5848" font-family="Georgia,serif" font-style="italic">authority</text>
  <text x="356" y="237" font-size="8" fill="#6A5848" font-family="Georgia,serif" font-style="italic">stays up</text>

  <!-- ====== LEDGER bridge (left zone) ====== -->
  <rect x="60" y="192" width="138" height="50" rx="2" fill="url(#c3-ledger)" stroke="#7A5C10" stroke-width="1.3" stroke-dasharray="4,2" filter="url(#c3-shadow)"/>
  <text x="129" y="212" font-size="10" fill="#3A2808" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">LEDGER</text>
  <text x="129" y="228" font-size="8" fill="#7A5C10" font-family="Georgia,serif" text-anchor="middle">Col 1: costs generated</text>
  <!-- Bridge arrow from ledger to cost channel -->
  <line x1="198" y1="215" x2="250" y2="215" stroke="#7A5C10" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#c3-ar-gold)"/>
  <text x="224" y="210" font-size="8" fill="#7A5C10" font-family="Georgia,serif" text-anchor="middle" font-style="italic">delegate confirms</text>
  <!-- Pattern label -->
  <text x="129" y="260" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Holder's Consented Ledger</text>

  <!-- ====== FUNCTION node (right zone — mislocated) ====== -->
  <rect x="476" y="158" width="104" height="46" rx="2.5" fill="url(#c3-node)" stroke="#AFA898" stroke-width="1.3" stroke-dasharray="5,3"/>
  <line x1="476" y1="174" x2="580" y2="174" stroke="#AFA898" stroke-width="0.4" opacity="0.3"/>
  <text x="528" y="175" font-size="10" fill="#6A5848" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">FUNCTION</text>
  <text x="528" y="190" font-size="8" fill="#9A8878" font-family="Georgia,serif" text-anchor="middle" font-style="italic">mislocated</text>

  <!-- Relocation arrow: FUNCTION → AUTHORITY -->
  <path d="M 476 172 Q 420 130 340 95"
    stroke="#4A3828" stroke-width="1.8" fill="none" marker-end="url(#c3-ar-dark)"/>
  <text x="415" y="126" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">relocated home →</text>

  <!-- Amnesty byproduct (below FUNCTION) -->
  <line x1="528" y1="204" x2="528" y2="228" stroke="#AFA898" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#c3-ar-muted)"/>
  <text x="528" y="244" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">amnesty falls out</text>
  <text x="528" y="258" font-size="8" fill="#9A8878" font-family="Georgia,serif" text-anchor="middle" font-style="italic">structure issues it</text>
  <!-- Pattern label -->
  <text x="528" y="275" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Relocation Release Amnesty</text>

  <!-- Pattern label: Cost Externalized (below delegate) -->
  <text x="288" y="376" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Cost Externalized Through Delegation</text>

  <!-- ====== SYSTEM FALSIFIER ====== -->
  <line x1="20" y1="396" x2="660" y2="396" stroke="#AFA898" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="340" y="412" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.09em">SYSTEM FALSIFIER</text>
  <text x="340" y="428" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">Can the holder produce a Column 1 the delegate would confirm as complete —</text>
  <text x="340" y="443" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">without the delegate adding significant entries the holder hadn't named?</text>

  <!-- Footer -->
  <rect x="0" y="502" width="680" height="18" fill="url(#c3-band)"/>
  <line x1="0" y1="502" x2="680" y2="502" stroke="#AFA898" stroke-width="0.8"/>
  <text x="20" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif">Our Shared Gifts · oursharedgifts.org</text>
  <text x="660" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif" text-anchor="end">c3 · the-hidden-subsidy</text>
</svg>
