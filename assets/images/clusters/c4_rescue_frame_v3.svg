<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" width="680" height="520">
  <defs>
    <filter id="c4-paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" seed="4" result="noise"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.99  0 0 0 0 0.98  0 0 0 0 0.95  0 0 0 -2.8 3.4"
        in="noise" result="paper-tone"/>
      <feBlend in="SourceGraphic" in2="paper-tone" mode="multiply"/>
    </filter>
    <filter id="c4-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.6" dy="1.4" stdDeviation="2" flood-color="#1A0E04" flood-opacity="0.15"/>
    </filter>
    <radialGradient id="c4-node" cx="34%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#F5F1E7"/>
      <stop offset="60%" stop-color="#EAE4D6"/>
      <stop offset="100%" stop-color="#D8D0BF"/>
    </radialGradient>
    <linearGradient id="c4-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAE5D8"/>
      <stop offset="100%" stop-color="#E0D9CB"/>
    </linearGradient>
    <marker id="c4-ar-muted" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#AFA898"/>
    </marker>
    <marker id="c4-ar-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#7A5C10"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#F6F3EC" filter="url(#c4-paper)"/>

  <!-- Header -->
  <rect x="0" y="0" width="680" height="48" fill="url(#c4-band)"/>
  <line x1="0" y1="48" x2="680" y2="48" stroke="#AFA898" stroke-width="0.8"/>
  <text x="340" y="24" font-size="16" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.025em">The Rescue Frame</text>
  <text x="340" y="41" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" letter-spacing="0.09em">SCARCITY LOOP · RESCUE FRAME OCCLUSION · EXPERTISE CONSCRIPTED AS RESCUE FUEL</text>

  <!-- ====== MAIN LOOP (ellipse) ====== -->
  <ellipse cx="265" cy="218" rx="165" ry="108" fill="none" stroke="#AFA898" stroke-width="1.8"/>

  <!-- Loop direction arrows (clockwise) -->
  <line x1="230" y1="112" x2="282" y2="110" stroke="#AFA898" stroke-width="1.3" marker-end="url(#c4-ar-muted)"/>
  <line x1="300" y1="326" x2="248" y2="326" stroke="#AFA898" stroke-width="1.3" marker-end="url(#c4-ar-muted)"/>

  <!-- Loop interior labels -->
  <text x="242" y="205" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">RESCUE FRAME</text>
  <text x="242" y="221" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">attempt → sunk cost → next attempt</text>

  <!-- ====== EXPERT node (top left, outside loop) ====== -->
  <rect x="40" y="64" width="104" height="46" rx="2.5" fill="url(#c4-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c4-shadow)"/>
  <line x1="40" y1="80" x2="144" y2="80" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="92" y="81" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">EXPERT</text>
  <text x="92" y="96" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">accurate verdict</text>

  <!-- Expert → loop arrow (enters as fuel) -->
  <path d="M 144 87 Q 162 106 178 124" stroke="#7A5C10" stroke-width="1.5" fill="none" marker-end="url(#c4-ar-gold)"/>
  <text x="155" y="104" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-style="italic">enters as fuel</text>

  <!-- Stop-signal (the structural exit) -->
  <text x="62" y="148" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-style="italic">the exit:</text>
  <text x="62" y="162" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-style="italic">verdict + silence</text>
  <text x="62" y="182" font-size="8" fill="#4A3828" font-family="Georgia,serif" font-style="italic">Expertise as Rescue Fuel</text>

  <!-- ====== FRAME BARRIER (vertical wall inside loop, right side) ====== -->
  <line x1="400" y1="130" x2="400" y2="306" stroke="#4A3828" stroke-width="2"/>
  <!-- Rightward notch (pressure against barrier) -->
  <polygon points="412,218 400,210 400,226" fill="#4A3828"/>
  <!-- Labels to the right of barrier, inside ellipse zone -->
  <text x="412" y="148" font-size="8" fill="#4A3828" font-family="Georgia,serif" font-style="italic">frame barrier</text>
  <text x="412" y="162" font-size="8" fill="#9A8878" font-family="Georgia,serif" font-style="italic">query not generated</text>

  <!-- ====== REPLACEMENT node (outside barrier, crossed out) ====== -->
  <rect x="458" y="186" width="112" height="46" rx="2.5" fill="url(#c4-node)" stroke="#CEC8B8" stroke-width="1.3"/>
  <!-- Cross-out lines -->
  <line x1="458" y1="186" x2="570" y2="232" stroke="#CEC8B8" stroke-width="1.2"/>
  <line x1="570" y1="186" x2="458" y2="232" stroke="#CEC8B8" stroke-width="1.2"/>
  <text x="514" y="213" font-size="10" fill="#9A8878" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">REPLACEMENT</text>
  <!-- Labels below -->
  <text x="514" y="248" font-size="8" fill="#9A8878" font-family="Georgia,serif" text-anchor="middle" font-style="italic">in-frame, out-of-reach</text>
  <text x="514" y="265" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Rescue Frame Occlusion</text>

  <!-- Pattern label: Scarcity Loop (below ellipse) -->
  <text x="265" y="345" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Scarcity Loop Generates Rescue Frame</text>

  <!-- ====== SYSTEM FALSIFIER ====== -->
  <line x1="20" y1="380" x2="660" y2="380" stroke="#AFA898" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="340" y="396" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.09em">SYSTEM FALSIFIER</text>
  <text x="340" y="412" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">Can the replacement-cost comparison be generated at all —</text>
  <text x="340" y="427" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">or does the query not form inside the current frame?</text>

  <!-- Footer -->
  <rect x="0" y="502" width="680" height="18" fill="url(#c4-band)"/>
  <line x1="0" y1="502" x2="680" y2="502" stroke="#AFA898" stroke-width="0.8"/>
  <text x="20" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif">Our Shared Gifts · oursharedgifts.org</text>
  <text x="660" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif" text-anchor="end">c4 · the-rescue-frame</text>
</svg>
