<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" width="680" height="520">
  <defs>
    <filter id="c5-paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" seed="5" result="noise"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.99  0 0 0 0 0.98  0 0 0 0 0.95  0 0 0 -2.8 3.4"
        in="noise" result="paper-tone"/>
      <feBlend in="SourceGraphic" in2="paper-tone" mode="multiply"/>
    </filter>
    <filter id="c5-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.6" dy="1.4" stdDeviation="2" flood-color="#1A0E04" flood-opacity="0.15"/>
    </filter>
    <radialGradient id="c5-node" cx="34%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#F5F1E7"/>
      <stop offset="60%" stop-color="#EAE4D6"/>
      <stop offset="100%" stop-color="#D8D0BF"/>
    </radialGradient>
    <linearGradient id="c5-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAE5D8"/>
      <stop offset="100%" stop-color="#E0D9CB"/>
    </linearGradient>
    <marker id="c5-ar-dark" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#4A3828"/>
    </marker>
    <marker id="c5-ar-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#7A5C10"/>
    </marker>
    <marker id="c5-ar-muted" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#AFA898"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#F6F3EC" filter="url(#c5-paper)"/>

  <!-- Header -->
  <rect x="0" y="0" width="680" height="48" fill="url(#c5-band)"/>
  <line x1="0" y1="48" x2="680" y2="48" stroke="#AFA898" stroke-width="0.8"/>
  <text x="340" y="24" font-size="16" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.025em">The Commission Structure</text>
  <text x="340" y="41" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" letter-spacing="0.09em">COMMISSION GRAMMAR SCREEN · EXPERTISE AS MIRROR · TRANSLATED ORIGIN FAILURE MODE</text>

  <!-- ====== MANDATE node ====== -->
  <rect x="18" y="187" width="80" height="46" rx="2.5" fill="url(#c5-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c5-shadow)"/>
  <line x1="18" y1="203" x2="98" y2="203" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="58" y="205" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">MANDATE</text>
  <text x="58" y="220" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">arrives for review</text>
  <!-- Arrow mandate → gate -->
  <line x1="98" y1="210" x2="116" y2="210" stroke="#4A3828" stroke-width="1.3" marker-end="url(#c5-ar-dark)"/>

  <!-- ====== GATE: commission grammar screen ====== -->
  <!-- Diamond center (152, 210) -->
  <polygon points="152,173 189,210 152,247 115,210" fill="#F6F3EC" stroke="#4A3828" stroke-width="1.5" filter="url(#c5-shadow)"/>
  <text x="152" y="206" font-size="8" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">divergent</text>
  <text x="152" y="218" font-size="8" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">verdict ok?</text>
  <!-- Gate label above -->
  <text x="152" y="160" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Commission Grammar Screen</text>

  <!-- YES exit (down → open commission, grayed) -->
  <line x1="152" y1="247" x2="152" y2="283" stroke="#AFA898" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#c5-ar-muted)"/>
  <text x="162" y="266" font-size="8" fill="#AFA898" font-family="Georgia,serif">YES</text>
  <!-- OPEN COMMISSION (muted — the unavailable path) -->
  <rect x="102" y="283" width="100" height="40" rx="2.5" fill="url(#c5-node)" stroke="#AFA898" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="152" y="307" font-size="9" fill="#9A8878" font-family="Georgia,serif" font-weight="bold" text-anchor="middle">OPEN</text>
  <text x="152" y="318" font-size="8" fill="#9A8878" font-family="Georgia,serif" text-anchor="middle">verdicts close it</text>

  <!-- NO exit (right → mirror room) -->
  <line x1="189" y1="210" x2="210" y2="210" stroke="#4A3828" stroke-width="1.3" marker-end="url(#c5-ar-dark)"/>
  <text x="197" y="204" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle">NO</text>

  <!-- ====== MIRROR ROOM ====== -->
  <rect x="210" y="165" width="234" height="92" rx="2" fill="none" stroke="#4A3828" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="327" y="159" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">mirror room</text>

  <!-- PRINCIPAL node -->
  <rect x="218" y="183" width="90" height="46" rx="2.5" fill="url(#c5-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c5-shadow)"/>
  <line x1="218" y1="199" x2="308" y2="199" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="263" y="200" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">PRINCIPAL</text>
  <text x="263" y="215" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">holds belief</text>

  <!-- EXPERT (mirror position) node -->
  <rect x="336" y="183" width="90" height="46" rx="2.5" fill="url(#c5-node)" stroke="#1A1005" stroke-width="1.4" filter="url(#c5-shadow)"/>
  <line x1="336" y1="199" x2="426" y2="199" stroke="#1A1005" stroke-width="0.4" opacity="0.2"/>
  <text x="381" y="200" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em">EXPERT</text>
  <text x="381" y="215" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle">mirror position</text>

  <!-- Echo arrows (gap x=308–336) -->
  <!-- Belief → (top arc) -->
  <path d="M 308 196 C 320 180 324 180 336 196"
    stroke="#7A5C10" stroke-width="1.3" fill="none" stroke-dasharray="4,2" marker-end="url(#c5-ar-gold)"/>
  <text x="322" y="175" font-size="8" fill="#7A5C10" font-family="Georgia,serif" text-anchor="middle" font-style="italic">belief →</text>
  <!-- ← Permission (bottom arc) -->
  <path d="M 336 222 C 324 238 320 238 308 222"
    stroke="#4A3828" stroke-width="1.3" fill="none" marker-end="url(#c5-ar-dark)"/>
  <text x="322" y="250" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">← permission</text>

  <!-- Pattern label below mirror room -->
  <text x="327" y="272" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Expertise Conscripted as Mirror</text>

  <!-- Arrow mirror room → sensor -->
  <line x1="444" y1="210" x2="462" y2="210" stroke="#4A3828" stroke-width="1.3" marker-end="url(#c5-ar-dark)"/>

  <!-- ====== SENSOR: translated zero gauge ====== -->
  <circle cx="522" cy="210" r="56" fill="#F6F3EC" stroke="#AFA898" stroke-width="1.5"/>
  <!-- True zero tick (9 o'clock, left) -->
  <line x1="466" y1="210" x2="478" y2="210" stroke="#9A8878" stroke-width="1.5"/>
  <text x="460" y="214" font-size="8" fill="#9A8878" font-family="Georgia,serif" text-anchor="end">0</text>
  <!-- Translated zero tick (upper-left, ~25° above 9 o'clock) -->
  <line x1="482" y1="183" x2="490" y2="190" stroke="#4A3828" stroke-width="1.5"/>
  <text x="476" y="176" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="end">0′</text>
  <!-- Needle from center to translated zero -->
  <line x1="522" y1="210" x2="483" y2="184" stroke="#7A5C10" stroke-width="1.5"/>
  <circle cx="522" cy="210" r="4" fill="#7A5C10" filter="url(#c5-shadow)"/>
  <!-- Labels below gauge -->
  <text x="522" y="278" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" font-style="italic">zero translated · reading internally coherent</text>
  <text x="522" y="295" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Translated Origin Failure Mode</text>

  <!-- ====== SYSTEM FALSIFIER ====== -->
  <line x1="20" y1="390" x2="660" y2="390" stroke="#AFA898" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="340" y="406" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.09em">SYSTEM FALSIFIER</text>
  <text x="340" y="422" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">Can the expert return a verdict the principal does not want —</text>
  <text x="340" y="437" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">and would that verdict close the conversation, or produce re-routing?</text>

  <!-- Footer -->
  <rect x="0" y="502" width="680" height="18" fill="url(#c5-band)"/>
  <line x1="0" y1="502" x2="680" y2="502" stroke="#AFA898" stroke-width="0.8"/>
  <text x="20" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif">Our Shared Gifts · oursharedgifts.org</text>
  <text x="660" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif" text-anchor="end">c5 · the-commission-structure</text>
</svg>
