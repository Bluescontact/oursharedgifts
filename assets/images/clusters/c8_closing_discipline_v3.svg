<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" width="680" height="520">
  <defs>
    <filter id="c8-paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" seed="8" result="noise"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.99  0 0 0 0 0.98  0 0 0 0 0.95  0 0 0 -2.8 3.4"
        in="noise" result="paper-tone"/>
      <feBlend in="SourceGraphic" in2="paper-tone" mode="multiply"/>
    </filter>
    <filter id="c8-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.6" dy="1.4" stdDeviation="2" flood-color="#1A0E04" flood-opacity="0.15"/>
    </filter>
    <radialGradient id="c8-node" cx="34%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#F5F1E7"/>
      <stop offset="60%" stop-color="#EAE4D6"/>
      <stop offset="100%" stop-color="#D8D0BF"/>
    </radialGradient>
    <linearGradient id="c8-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAE5D8"/>
      <stop offset="100%" stop-color="#E0D9CB"/>
    </linearGradient>
    <marker id="c8-ar-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#7A5C10"/>
    </marker>
    <marker id="c8-ar-dark" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#4A3828"/>
    </marker>
    <marker id="c8-ar-muted" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="#AFA898"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#F6F3EC" filter="url(#c8-paper)"/>

  <!-- Header -->
  <rect x="0" y="0" width="680" height="48" fill="url(#c8-band)"/>
  <line x1="0" y1="48" x2="680" y2="48" stroke="#AFA898" stroke-width="0.8"/>
  <text x="340" y="24" font-size="16" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.025em">The Closing Discipline</text>
  <text x="340" y="41" font-size="8" fill="#6A5848" font-family="Georgia,serif" text-anchor="middle" letter-spacing="0.09em">THE SILENT CLOSE · LIMIT AS COORDINATE · EXTEND, DON'T INVENT — NAME THE WALL</text>

  <!-- ====== ACTOR node (spans all 3 tracks) ====== -->
  <rect x="38" y="98" width="54" height="228" rx="3" fill="url(#c8-node)" stroke="#AFA898" stroke-width="1.2" filter="url(#c8-shadow)"/>
  <text x="65" y="212" font-size="10" fill="#1A1005" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.04em" transform="rotate(-90 65 212)">ACTOR</text>

  <!-- Track labels -->
  <text x="96" y="104" font-size="8" fill="#6A5848" font-family="Georgia,serif" font-style="italic">track 1</text>
  <text x="96" y="200" font-size="8" fill="#6A5848" font-family="Georgia,serif" font-style="italic">track 2</text>
  <text x="96" y="293" font-size="8" fill="#6A5848" font-family="Georgia,serif" font-style="italic">track 3</text>

  <!-- ================================================================ -->
  <!-- TRACK 1 — THE SILENT CLOSE (y=130) -->
  <!-- ================================================================ -->

  <!-- Channel baseline -->
  <line x1="96" y1="130" x2="580" y2="130" stroke="#AFA898" stroke-width="1"/>

  <!-- ACTION mark -->
  <circle cx="224" cy="130" r="5" fill="#4A3828"/>
  <text x="224" y="118" font-size="8" fill="#4A3828" font-family="Georgia,serif" font-weight="bold" text-anchor="middle">ACTION</text>

  <!-- Silence zone -->
  <rect x="232" y="120" width="200" height="20" rx="2" fill="#F0EDE4"/>
  <text x="330" y="134" font-size="8" fill="#9A8878" font-family="Georgia,serif" text-anchor="middle" font-style="italic">silence</text>

  <!-- HOLDS seal -->
  <line x1="434" y1="118" x2="434" y2="142" stroke="#7A5C10" stroke-width="2"/>
  <text x="448" y="134" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-weight="bold">HOLDS</text>

  <!-- Second-move arc (the wrong path — dashed, above) -->
  <path d="M 224 122 C 272 106 310 106 350 122" stroke="#AFA898" stroke-width="1" stroke-dasharray="3,2" fill="none" marker-end="url(#c8-ar-muted)"/>
  <text x="287" y="101" font-size="8" fill="#9A8878" font-family="Georgia,serif" text-anchor="middle" font-style="italic">second move → reopens</text>

  <!-- Pattern label -->
  <text x="340" y="158" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">The Silent Close</text>

  <!-- ================================================================ -->
  <!-- TRACK 2 — LIMIT AS COORDINATE (y=225) -->
  <!-- ================================================================ -->

  <!-- Shared work zone -->
  <rect x="96" y="208" width="382" height="34" rx="2" fill="#EBE7DC" stroke="#AFA898" stroke-width="0.8"/>
  <text x="195" y="222" font-size="8" fill="#6A5848" font-family="Georgia,serif" font-style="italic">shared epistemic work zone</text>

  <!-- LIMIT coordinate marker -->
  <line x1="340" y1="204" x2="340" y2="246" stroke="#4A3828" stroke-width="1.5"/>
  <circle cx="340" cy="225" r="3.5" fill="#7A5C10" filter="url(#c8-shadow)"/>
  <text x="350" y="220" font-size="8" fill="#4A3828" font-family="Georgia,serif" font-weight="bold">LIMIT</text>
  <text x="350" y="233" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-style="italic">coordinate</text>

  <!-- Zone edge — open, not a wall -->
  <line x1="480" y1="208" x2="480" y2="242" stroke="#AFA898" stroke-width="0.8" stroke-dasharray="2,3"/>
  <text x="492" y="228" font-size="8" fill="#9A8878" font-family="Georgia,serif" font-style="italic">edge open</text>

  <!-- Pattern label -->
  <text x="286" y="258" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Limit as Coordinate, Not Wall</text>

  <!-- ================================================================ -->
  <!-- TRACK 3 — EXTEND, DON'T INVENT — NAME THE WALL (y=315) -->
  <!-- ================================================================ -->

  <!-- Authorized extension arrow -->
  <line x1="96" y1="315" x2="356" y2="315" stroke="#4A3828" stroke-width="1.5" marker-end="url(#c8-ar-dark)"/>
  <text x="218" y="307" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">ride what's authorized →</text>

  <!-- TRUE WALL (named at true height) -->
  <line x1="362" y1="298" x2="362" y2="334" stroke="#4A3828" stroke-width="2.5"/>
  <text x="372" y="311" font-size="8" fill="#4A3828" font-family="Georgia,serif" font-weight="bold">TRUE WALL</text>
  <text x="372" y="325" font-size="8" fill="#6A5848" font-family="Georgia,serif" font-style="italic">named at true height</text>

  <!-- FALSE FLOOR (where next party starts from wrong zero) -->
  <line x1="362" y1="334" x2="534" y2="334" stroke="#9A8878" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="450" y="328" font-size="8" fill="#9A8878" font-family="Georgia,serif" text-anchor="middle" font-style="italic">false floor</text>
  <text x="572" y="325" font-size="8" fill="#9A8878" font-family="Georgia,serif" font-style="italic">next party</text>
  <text x="572" y="338" font-size="8" fill="#9A8878" font-family="Georgia,serif" font-style="italic">wrong zero</text>

  <!-- Pattern label -->
  <text x="226" y="353" font-size="8" fill="#4A3828" font-family="Georgia,serif" text-anchor="middle" font-style="italic">Extend, Don't Invent — Name the Wall</text>

  <!-- ====== SYSTEM FALSIFIER ====== -->
  <line x1="20" y1="376" x2="660" y2="376" stroke="#AFA898" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="340" y="392" font-size="8" fill="#7A5C10" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" letter-spacing="0.09em">SYSTEM FALSIFIER</text>
  <text x="340" y="408" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">After the closing move — did anything enter the channel</text>
  <text x="340" y="423" font-size="9" fill="#1A1005" font-family="Georgia,serif" text-anchor="middle">to explain, announce, or contextualize what closed?</text>

  <!-- Footer -->
  <rect x="0" y="502" width="680" height="18" fill="url(#c8-band)"/>
  <line x1="0" y1="502" x2="680" y2="502" stroke="#AFA898" stroke-width="0.8"/>
  <text x="20" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif">Our Shared Gifts · oursharedgifts.org</text>
  <text x="660" y="515" font-size="7.5" fill="#6A5848" font-family="Georgia,serif" text-anchor="end">c8 · the-closing-discipline</text>
</svg>
