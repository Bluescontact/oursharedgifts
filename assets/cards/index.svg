<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <radialGradient id="field_flat" cx="50%" cy="42%" r="80%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow_dim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- field -->
  <rect width="1200" height="675" fill="#0a0a0a"/>
  <rect width="1200" height="675" fill="url(#field_flat)"/>

  <!-- ============================================ -->
  <!-- FIGURE: four outer vertices converging on one -->
  <!-- luminous central node — connection / shared   -->
  <!-- gift gathered to a common point.               -->
  <!-- center (600, 250)                               -->
  <!-- ============================================ -->
  <g stroke="#d4af6a" stroke-width="1.1" fill="none" opacity="0.9">
    <line x1="600" y1="250" x2="600" y2="120"/>
    <line x1="600" y1="250" x2="724" y2="290"/>
    <line x1="600" y1="250" x2="476" y2="290"/>
    <line x1="600" y1="250" x2="676" y2="362"/>
    <line x1="600" y1="250" x2="524" y2="362"/>
  </g>

  <!-- faint enclosing ring -->
  <circle cx="600" cy="250" r="148" fill="none" stroke="#4a4a4a" stroke-width="0.8" opacity="0.55"/>

  <!-- outer vertices: soft dim glows + small gold points -->
  <g>
    <circle cx="600" cy="120" r="34" fill="url(#glow_dim)" opacity="0.6"/>
    <circle cx="724" cy="290" r="34" fill="url(#glow_dim)" opacity="0.6"/>
    <circle cx="476" cy="290" r="34" fill="url(#glow_dim)" opacity="0.6"/>
    <circle cx="676" cy="362" r="34" fill="url(#glow_dim)" opacity="0.6"/>
    <circle cx="524" cy="362" r="34" fill="url(#glow_dim)" opacity="0.6"/>

    <circle cx="600" cy="120" r="3.4" fill="#f0c674"/>
    <circle cx="724" cy="290" r="3.4" fill="#f0c674"/>
    <circle cx="476" cy="290" r="3.4" fill="#f0c674"/>
    <circle cx="676" cy="362" r="3.4" fill="#f0c674"/>
    <circle cx="524" cy="362" r="3.4" fill="#f0c674"/>
  </g>

  <!-- central luminous vertex — the signature glow -->
  <circle cx="600" cy="250" r="90" fill="url(#glow)" opacity="0.85"/>
  <circle cx="600" cy="250" r="46" fill="url(#point_bright)"/>
  <circle cx="600" cy="250" r="4.6" fill="#fff4d6"/>

  <!-- vertex marker -->
  <text x="600" y="452" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="300" font-size="17" letter-spacing="4"
        fill="#9a8d76">CONNECTION &#183; PUBLIC FACE</text>

  <!-- title: the one concept -->
  <text x="600" y="520" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Cinzel', Georgia, 'Times New Roman', serif"
        font-weight="500" font-size="62" letter-spacing="9"
        fill="#e8dcc4">OUR SHARED GIFTS</text>

  <!-- subtitle -->
  <text x="600" y="566" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-style="italic" font-weight="400" font-size="26" letter-spacing="1"
        fill="#9a8d76">The personal practice made legible.</text>

  <!-- domain -->
  <text x="600" y="640" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="300" font-size="14" letter-spacing="3"
        fill="#9a8d76">oursharedgifts.org</text>

  <!-- vignette -->
  <rect width="1200" height="675" fill="url(#vignette)"/>
</svg>
