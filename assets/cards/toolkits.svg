<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <!-- field: subtle warm radial center on near-black -->
    <radialGradient id="field" cx="50%" cy="46%" r="80%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="42%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>

    <!-- standard vertex glow — warm gold to transparent -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- bright central point for the load-bearing Architecture vertex -->
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- dim emanation for secondary vertices -->
    <radialGradient id="glow_dim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- vignette to settle the edges -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- background field -->
  <rect width="1200" height="675" fill="url(#field)"/>

  <!-- ============ VERTEX MARKER ============ -->
  <text x="600" y="120" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="300" font-size="20" letter-spacing="6"
        fill="#9a8d76">ARCHITECTURE &#183; TOOLKITS</text>

  <!-- ============ TITLE ============ -->
  <text x="600" y="200" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Cinzel', Georgia, 'Times New Roman', serif"
        font-weight="500" font-size="76" letter-spacing="16"
        fill="#e8dcc4">TOOLKITS</text>

  <!-- thin gold page-rule beneath the title -->
  <line x1="540" y1="232" x2="660" y2="232" stroke="#d4af6a" stroke-width="1" stroke-opacity="0.7"/>

  <!-- ============ FIGURE: tetrahedron, Architecture vertex luminous ============ -->
  <!-- vertices:
       apex (Differentiation)  600,300
       left (Connection)       470,470
       right (Boundaries)      730,470
       base/front (Architecture) 600,535  -> the load-bearing, luminous one -->

  <!-- back / structural edges (muted, the inner lines to apex) -->
  <g stroke-linecap="round" fill="none">
    <line x1="600" y1="300" x2="600" y2="535" stroke="#d4af6a" stroke-width="1.1" stroke-opacity="0.55"/>
    <line x1="470" y1="470" x2="600" y2="535" stroke="#d4af6a" stroke-width="1.1" stroke-opacity="0.55"/>
    <line x1="730" y1="470" x2="600" y2="535" stroke="#d4af6a" stroke-width="1.1" stroke-opacity="0.55"/>
  </g>

  <!-- outer frame edges (brighter gold) -->
  <g stroke-linecap="round" fill="none">
    <line x1="600" y1="300" x2="470" y2="470" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.85"/>
    <line x1="600" y1="300" x2="730" y2="470" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.85"/>
    <line x1="470" y1="470" x2="730" y2="470" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.85"/>
  </g>

  <!-- secondary vertices: soft dim glow + small node -->
  <g>
    <circle cx="600" cy="300" r="34" fill="url(#glow_dim)"/>
    <circle cx="600" cy="300" r="3.2" fill="#f0c674"/>

    <circle cx="470" cy="470" r="34" fill="url(#glow_dim)"/>
    <circle cx="470" cy="470" r="3.2" fill="#f0c674"/>

    <circle cx="730" cy="470" r="34" fill="url(#glow_dim)"/>
    <circle cx="730" cy="470" r="3.2" fill="#f0c674"/>
  </g>

  <!-- ARCHITECTURE vertex: the luminous signature point -->
  <circle cx="600" cy="535" r="62" fill="url(#point_bright)"/>
  <circle cx="600" cy="535" r="30" fill="url(#glow)"/>
  <circle cx="600" cy="535" r="4.6" fill="#f0c674"/>

  <!-- ============ SUBTITLE ============ -->
  <text x="600" y="612" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="26" letter-spacing="1"
        fill="#9a8d76">What persists without Kevin.</text>

  <!-- ============ FOOTER WORDMARK ============ -->
  <text x="600" y="652" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="300" font-size="15" letter-spacing="3"
        fill="#9a8d76" fill-opacity="0.8">oursharedgifts.org</text>

  <!-- vignette overlay -->
  <rect width="1200" height="675" fill="url(#vignette)"/>
</svg>
