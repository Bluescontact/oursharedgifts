<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <radialGradient id="field" cx="50%" cy="42%" r="80%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="55%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line_in" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f0c674" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <!-- Field -->
  <rect width="1200" height="675" fill="url(#field)"/>
  <rect width="1200" height="675" fill="url(#vignette)"/>

  <!-- Vertex marker -->
  <text x="600" y="138" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300"
        font-size="19" letter-spacing="6" fill="#9a8d76">CONNECTION &#183; REQUEST</text>

  <!-- ============================================ -->
  <!-- Mark: a single line arriving cleanly at one  -->
  <!-- luminous vertex — the ask received.          -->
  <!-- ============================================ -->
  <g transform="translate(600,320)">
    <!-- arriving line: open at left, fades in, meets the point -->
    <line x1="-150" y1="0" x2="0" y2="0" stroke="url(#line_in)" stroke-width="1.6"/>
    <!-- the open ring — the shape of the ask, not closed into a form -->
    <circle cx="0" cy="0" r="62" fill="none" stroke="#d4af6a" stroke-width="1.4"
            stroke-opacity="0.85" stroke-dasharray="333 56" transform="rotate(150)"/>
    <!-- luminous vertex where the line meets the threshold (the signature glow) -->
    <circle cx="0" cy="0" r="78" fill="url(#glow)"/>
    <circle cx="0" cy="0" r="30" fill="url(#point_bright)"/>
    <circle cx="0" cy="0" r="2.6" fill="#fff4d6"/>
  </g>

  <!-- Title -->
  <text x="600" y="500" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Cinzel', Georgia, serif"
        font-size="92" letter-spacing="16" fill="#e8dcc4">REQUEST</text>

  <!-- Subtitle -->
  <text x="600" y="548" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, serif" font-style="italic"
        font-size="27" letter-spacing="2" fill="#9a8d76">An ask, not a booking.</text>

  <!-- Footer -->
  <text x="600" y="635" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300"
        font-size="15" letter-spacing="3" fill="#9a8d76">oursharedgifts.org</text>
</svg>
