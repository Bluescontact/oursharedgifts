<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <radialGradient id="field" cx="50%" cy="42%" r="80%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="45%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow_dim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <!-- Field -->
  <rect width="1200" height="675" fill="#0a0a0a"/>
  <rect width="1200" height="675" fill="url(#field)"/>

  <!--
    Geometric mark: a single source vertex above, the gift, with two
    open lines descending and crossing a bounding threshold line below.
    The gift passes through the boundary and does not convert to ledger.
    The source point glows; the two points where the gift meets the
    boundary glow softly. Spare, centered, generous negative space.
  -->
  <g transform="translate(600,300)" fill="none" stroke="#d4af6a" stroke-width="1.4">

    <!-- soft halo behind source -->
    <circle cx="0" cy="-74" r="70" fill="url(#glow_dim)" stroke="none" opacity="0.55"/>

    <!-- descending gift lines from the source through the boundary -->
    <line x1="0" y1="-74" x2="-86" y2="58" stroke-opacity="0.85"/>
    <line x1="0" y1="-74" x2="86" y2="58" stroke-opacity="0.85"/>

    <!-- the bounding threshold the gift passes through -->
    <line x1="-150" y1="22" x2="150" y2="22" stroke="#d4af6a" stroke-opacity="0.55"/>

    <!-- inner triangle apex hint, kept faint -->
    <line x1="-62.5" y1="22" x2="62.5" y2="22" stroke="#f0c674" stroke-opacity="0.4"/>

    <!-- luminous vertices -->
    <!-- source vertex (brightest) -->
    <circle cx="0" cy="-74" r="44" fill="url(#point_bright)" stroke="none"/>
    <circle cx="0" cy="-74" r="3" fill="#fff4d6" stroke="none"/>

    <!-- crossing points on the boundary -->
    <circle cx="-62.5" cy="22" r="30" fill="url(#glow)" stroke="none"/>
    <circle cx="-62.5" cy="22" r="2.4" fill="#f0c674" stroke="none"/>
    <circle cx="62.5" cy="22" r="30" fill="url(#glow)" stroke="none"/>
    <circle cx="62.5" cy="22" r="2.4" fill="#f0c674" stroke="none"/>
  </g>

  <!-- vertex-marker label, light sans, letter-spaced -->
  <text x="600" y="120" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="20" font-weight="300" letter-spacing="6"
        fill="#9a8d76">BOUNDARIES &#183; DONATE</text>

  <!-- Title: the one concept, refined serif caps, warm bone -->
  <text x="600" y="490" text-anchor="middle"
        font-family="Cormorant Garamond, Cinzel, Georgia, serif"
        font-size="92" letter-spacing="20"
        fill="#e8dcc4">DONATE</text>

  <!-- Subtitle: one line, italic, muted khaki -->
  <text x="600" y="545" text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="27" font-style="italic" letter-spacing="1.5"
        fill="#9a8d76">If the substrate is useful to you and you want to support its continuation.</text>

  <!-- Footer wordmark -->
  <text x="600" y="640" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="15" font-weight="300" letter-spacing="3"
        fill="#9a8d76">oursharedgifts.org</text>

  <!-- vignette to settle the field -->
  <rect width="1200" height="675" fill="url(#vignette)"/>
</svg>
