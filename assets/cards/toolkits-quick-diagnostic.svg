<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Quick Diagnostic — Recognition Infrastructure">
  <defs>
    <!-- Dark warm field -->
    <radialGradient id="field" cx="50%" cy="44%" r="80%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="42%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>

    <!-- Standard vertex glow — warm gold radiating to transparent -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- Bright development-edge point -->
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- Dim emanation for secondary vertices -->
    <radialGradient id="glow_dim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- Field -->
  <rect width="1200" height="675" fill="url(#field)"/>

  <!--
    Figure: the four-vertex system (Differentiation, Connection,
    Boundaries, Architecture) as a diamond with crossing edges and a
    center node. One vertex burns brightest — the weakest answer, the
    development edge. Centered, generous negative space.
    Center of figure: (600, 300). Radius ~118.
  -->
  <g fill="none" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.78">
    <!-- Outer diamond edges -->
    <path d="M 600 182 L 718 300 L 600 418 L 482 300 Z"/>
    <!-- Diagonals through the center node -->
    <line x1="600" y1="182" x2="600" y2="418"/>
    <line x1="482" y1="300" x2="718" y2="300"/>
  </g>

  <!-- Center node -->
  <circle cx="600" cy="300" r="26" fill="url(#glow_dim)"/>
  <circle cx="600" cy="300" r="2.6" fill="#f0c674"/>

  <!-- Secondary vertices: top, right, bottom (dim) -->
  <g>
    <circle cx="600" cy="182" r="30" fill="url(#glow_dim)"/>
    <circle cx="600" cy="182" r="3.4" fill="#f0c674"/>

    <circle cx="718" cy="300" r="30" fill="url(#glow_dim)"/>
    <circle cx="718" cy="300" r="3.4" fill="#f0c674"/>

    <circle cx="600" cy="418" r="30" fill="url(#glow_dim)"/>
    <circle cx="600" cy="418" r="3.4" fill="#f0c674"/>
  </g>

  <!-- The development-edge vertex (left) — luminous, the signature glow -->
  <circle cx="482" cy="300" r="62" fill="url(#point_bright)"/>
  <circle cx="482" cy="300" r="30" fill="url(#glow)"/>
  <circle cx="482" cy="300" r="4.6" fill="#fff4d6"/>

  <!-- Kicker -->
  <text x="600" y="500" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="16" letter-spacing="4.5" fill="#9a8d76">
    RECOGNITION INFRASTRUCTURE &#183; DIAGNOSTIC
  </text>

  <!-- Title -->
  <text x="600" y="560" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="62" letter-spacing="9" fill="#e8dcc4">
    QUICK DIAGNOSTIC
  </text>

  <!-- Subtitle -->
  <text x="600" y="602" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-style="italic"
        font-size="22" letter-spacing="0.5" fill="#9a8d76">
    The weakest answer is your development edge.
  </text>

  <!-- Site mark -->
  <text x="600" y="652" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="14" letter-spacing="2.5" fill="#9a8d76" fill-opacity="0.82">
    oursharedgifts.org
  </text>

  <!-- Vignette on top -->
  <rect width="1200" height="675" fill="url(#vignette)"/>
</svg>
