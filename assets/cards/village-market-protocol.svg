<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <!-- Flat near-black field (figure carries everything) -->
    <radialGradient id="field_flat" cx="50%" cy="42%" r="80%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>

    <!-- Standard vertex glow — warm gold radiating to transparent -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- Bright central point — the held node -->
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- Dim emanation glow — for fabric nodes -->
    <radialGradient id="glow_dim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <!-- Field -->
  <rect width="1200" height="675" fill="#0a0a0a"/>
  <rect width="1200" height="675" fill="url(#field_flat)"/>

  <!-- ============================================ -->
  <!-- THE FIGURE: one held radius within the fabric -->
  <!-- centered on the practitioner's node           -->
  <!-- ============================================ -->
  <g transform="translate(600,272)">

    <!-- Faint surrounding fabric: distant nodes, mostly outside the radius -->
    <g fill="#9a8d76">
      <circle cx="-262" cy="-118" r="2.2" opacity="0.30"/>
      <circle cx="248" cy="-150" r="2.2" opacity="0.30"/>
      <circle cx="296" cy="86" r="2.2" opacity="0.28"/>
      <circle cx="-300" cy="64" r="2.2" opacity="0.26"/>
      <circle cx="-150" cy="178" r="2.2" opacity="0.24"/>
      <circle cx="190" cy="184" r="2.2" opacity="0.24"/>
      <circle cx="40" cy="-200" r="2.2" opacity="0.22"/>
    </g>

    <!-- The radius: a single bounded circle, gold, the geographic membrane -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="#d4af6a" stroke-width="1.4" opacity="0.85"/>

    <!-- Nodes living inside the radius — asks and offers within reach -->
    <g>
      <circle cx="-78" cy="-46" r="9" fill="url(#glow_dim)"/>
      <circle cx="-78" cy="-46" r="2.6" fill="#f0c674"/>

      <circle cx="86" cy="-58" r="9" fill="url(#glow_dim)"/>
      <circle cx="86" cy="-58" r="2.6" fill="#f0c674"/>

      <circle cx="94" cy="62" r="9" fill="url(#glow_dim)"/>
      <circle cx="94" cy="62" r="2.6" fill="#f0c674"/>

      <circle cx="-66" cy="78" r="9" fill="url(#glow_dim)"/>
      <circle cx="-66" cy="78" r="2.6" fill="#f0c674"/>
    </g>

    <!-- Quiet lines from the membrane's nodes toward the center node:
         each crossing is its own meeting; the practitioner holds the membrane only -->
    <g stroke="#d4af6a" stroke-width="0.9" opacity="0.45">
      <line x1="-78" y1="-46" x2="0" y2="0"/>
      <line x1="86" y1="-58" x2="0" y2="0"/>
      <line x1="94" y1="62" x2="0" y2="0"/>
      <line x1="-66" y1="78" x2="0" y2="0"/>
    </g>

    <!-- The held node at center — the practitioner, the luminous vertex (signature glow) -->
    <circle cx="0" cy="0" r="64" fill="url(#point_bright)"/>
    <circle cx="0" cy="0" r="46" fill="url(#glow)"/>
    <circle cx="0" cy="0" r="4.4" fill="#fff4d6"/>
  </g>

  <!-- Vignette to seat the figure -->
  <rect width="1200" height="675" fill="url(#vignette)"/>

  <!-- ============================================ -->
  <!-- TYPE                                          -->
  <!-- ============================================ -->

  <!-- Vertex marker / label -->
  <text x="600" y="498"
        font-family="'Inter','Helvetica Neue',sans-serif" font-weight="300"
        font-size="17" letter-spacing="4.5" text-anchor="middle"
        fill="#9a8d76">CONNECTION · VILLAGE MARKET PROTOCOL</text>

  <!-- Primary term — refined serif caps, warm bone -->
  <text x="600" y="556"
        font-family="'Cormorant Garamond','Cinzel','Crimson Text',serif" font-weight="500"
        font-size="60" letter-spacing="9" text-anchor="middle"
        fill="#e8dcc4">VILLAGE MARKET PROTOCOL</text>

  <!-- One-line italic khaki subtitle -->
  <text x="600" y="600"
        font-family="'Cormorant Garamond','Crimson Text',serif" font-style="italic"
        font-size="25" letter-spacing="1" text-anchor="middle"
        fill="#9a8d76">A local coordination fabric for asks and offers — one practitioner at a time.</text>

  <!-- Site mark -->
  <text x="600" y="648"
        font-family="'Inter','Helvetica Neue',sans-serif" font-weight="300"
        font-size="14" letter-spacing="2.5" text-anchor="middle"
        fill="#9a8d76" opacity="0.8">oursharedgifts.org</text>
</svg>
