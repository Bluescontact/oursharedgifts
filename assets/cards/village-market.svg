<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <radialGradient id="field_flat" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow_dim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="58%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- Field -->
  <rect width="1200" height="675" fill="url(#field_flat)"/>

  <!-- ============================================ -->
  <!-- FIGURE: a gathering radius.                  -->
  <!-- A bright center node (the bus / the holder)  -->
  <!-- ringed by a circle (the 45-mile radius),     -->
  <!-- with asks and offers meeting on the ring as  -->
  <!-- luminous vertices.                           -->
  <!-- ============================================ -->
  <g transform="translate(600,250)">

    <!-- the radius ring -->
    <circle r="118" fill="none" stroke="#d4af6a" stroke-width="1.1" stroke-opacity="0.55"/>

    <!-- spokes from center to the meeting points on the ring -->
    <g stroke="#d4af6a" stroke-width="1" stroke-opacity="0.4">
      <line x1="0" y1="0" x2="0" y2="-118"/>
      <line x1="0" y1="0" x2="112.2" y2="36.5"/>
      <line x1="0" y1="0" x2="69.4" y2="95.5"/>
      <line x1="0" y1="0" x2="-69.4" y2="95.5"/>
      <line x1="0" y1="0" x2="-112.2" y2="36.5"/>
    </g>

    <!-- luminous vertices where asks + offers meet on the ring -->
    <g>
      <circle cx="0" cy="-118" r="30" fill="url(#glow)"/>
      <circle cx="112.2" cy="36.5" r="24" fill="url(#glow_dim)"/>
      <circle cx="69.4" cy="95.5" r="24" fill="url(#glow_dim)"/>
      <circle cx="-69.4" cy="95.5" r="24" fill="url(#glow_dim)"/>
      <circle cx="-112.2" cy="36.5" r="24" fill="url(#glow_dim)"/>
    </g>
    <g fill="#f0c674">
      <circle cx="0" cy="-118" r="3.4"/>
      <circle cx="112.2" cy="36.5" r="2.8"/>
      <circle cx="69.4" cy="95.5" r="2.8"/>
      <circle cx="-69.4" cy="95.5" r="2.8"/>
      <circle cx="-112.2" cy="36.5" r="2.8"/>
    </g>

    <!-- the holding center -->
    <circle r="46" fill="url(#point_bright)"/>
    <circle r="4.5" fill="#fff4d6"/>
  </g>

  <!-- Vertex marker -->
  <text x="600" y="446" text-anchor="middle"
        font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="17" letter-spacing="4.5" fill="#9a8d76">CONNECTION · VILLAGE MARKET</text>

  <!-- Title -->
  <text x="600" y="512" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Cinzel', Georgia, 'Times New Roman', serif"
        font-size="74" letter-spacing="11" fill="#e8dcc4">VILLAGE MARKET</text>

  <!-- Subtitle -->
  <text x="600" y="558" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="25" letter-spacing="0.5" fill="#9a8d76">Asks and offers within 45 miles of wherever the bus is parked.</text>

  <!-- Wordmark -->
  <text x="600" y="640" text-anchor="middle"
        font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="14" letter-spacing="3" fill="#9a8d76">oursharedgifts.org</text>

  <!-- Vignette -->
  <rect width="1200" height="675" fill="url(#vignette)"/>
</svg>
