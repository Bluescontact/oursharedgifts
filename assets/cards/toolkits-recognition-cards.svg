<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <!-- Dark warm field -->
    <radialGradient id="field" cx="50%" cy="44%" r="78%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="42%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>

    <!-- Vertex glow — warm gold to transparent -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- Bright apex point -->
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- Field -->
  <rect width="1200" height="675" fill="url(#field)"/>

  <!-- ============================================ -->
  <!-- FOUR-VERTEX FIGURE                            -->
  <!-- A tetrahedral recognition mark: four vertices  -->
  <!-- (Differentiation, Connection, Boundaries,      -->
  <!-- Architecture) joined, each a luminous node.    -->
  <!-- Centered, spare, generous negative space.      -->
  <!-- ============================================ -->
  <!-- Vertices:  top apex (cx 600, cy 178)           -->
  <!--            left (478, 318)  right (722, 318)    -->
  <!--            base center (600, 392)               -->
  <g fill="none" stroke="#d4af6a" stroke-width="1.6" stroke-opacity="0.92" stroke-linecap="round">
    <!-- outer triangle -->
    <path d="M600 178 L478 318 L722 318 Z"/>
    <!-- inner edges to base node -->
    <path d="M600 178 L600 392"/>
    <path d="M478 318 L600 392"/>
    <path d="M722 318 L600 392"/>
    <!-- outer base edges to base node -->
    <path d="M478 318 L600 392 L722 318"/>
  </g>

  <!-- Luminous vertices (the signature move) -->
  <!-- soft glow halos -->
  <circle cx="600" cy="178" r="38" fill="url(#point_bright)"/>
  <circle cx="478" cy="318" r="30" fill="url(#glow)"/>
  <circle cx="722" cy="318" r="30" fill="url(#glow)"/>
  <circle cx="600" cy="392" r="30" fill="url(#glow)"/>

  <!-- crisp vertex cores -->
  <circle cx="600" cy="178" r="3.4" fill="#fff4d6"/>
  <circle cx="478" cy="318" r="2.8" fill="#f0c674"/>
  <circle cx="722" cy="318" r="2.8" fill="#f0c674"/>
  <circle cx="600" cy="392" r="2.8" fill="#f0c674"/>

  <!-- ============================================ -->
  <!-- TYPE                                          -->
  <!-- ============================================ -->

  <!-- Vertex marker / label -->
  <text x="600" y="468"
        font-family="'Inter','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="16" font-weight="300" letter-spacing="6"
        fill="#9a8d76" text-anchor="middle">FOUR-VERTEX RECOGNITION DECK</text>

  <!-- Primary concept -->
  <text x="600" y="540"
        font-family="'Cormorant Garamond','Cinzel',Georgia,'Times New Roman',serif"
        font-size="78" font-weight="500" letter-spacing="14"
        fill="#e8dcc4" text-anchor="middle">PRACTICE</text>

  <!-- Italic khaki subtitle (trimmed from page) -->
  <text x="600" y="586"
        font-family="'Cormorant Garamond',Georgia,'Times New Roman',serif"
        font-size="23" font-style="italic" letter-spacing="0.5"
        fill="#9a8d76" text-anchor="middle">They recognize what your body already knows.</text>

  <!-- Bottom margin attribution -->
  <text x="600" y="642"
        font-family="'Inter','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="13" font-weight="300" letter-spacing="3"
        fill="#9a8d76" fill-opacity="0.8" text-anchor="middle">oursharedgifts.org</text>

  <!-- Vignette on top -->
  <rect width="1200" height="675" fill="url(#vignette)"/>
</svg>
