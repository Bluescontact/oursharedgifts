<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <radialGradient id="field" cx="50%" cy="46%" r="78%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="42%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow_dim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="line_threshold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- field -->
  <rect width="1200" height="675" fill="url(#field)"/>

  <!-- ================================================ -->
  <!-- centered figure: tetrahedral form on its ground  -->
  <!-- one luminous apex; same form resting on a ground  -->
  <!-- ================================================ -->
  <g transform="translate(600, 300)">

    <!-- ground line: the substrate the form rests on -->
    <rect x="-150" y="62" width="300" height="2" fill="url(#line_threshold)"/>

    <!-- tetrahedron edges (spare gold linework) -->
    <!-- base vertices at (-92,62) and (92,62); back base at (0,30); apex at (0,-86) -->
    <g fill="none" stroke="#d4af6a" stroke-width="1.4" stroke-opacity="0.9">
      <!-- front base edge -->
      <line x1="-92" y1="62" x2="92" y2="62"/>
      <!-- front-left rising edge to apex -->
      <line x1="-92" y1="62" x2="0" y2="-86"/>
      <!-- front-right rising edge to apex -->
      <line x1="92" y1="62" x2="0" y2="-86"/>
    </g>
    <!-- back edges, dimmer -->
    <g fill="none" stroke="#d4af6a" stroke-width="1.1" stroke-opacity="0.42">
      <line x1="-92" y1="62" x2="0" y2="30"/>
      <line x1="92" y1="62" x2="0" y2="30"/>
      <line x1="0" y1="30" x2="0" y2="-86"/>
    </g>

    <!-- luminous apex: the signature glow where lines meet -->
    <circle cx="0" cy="-86" r="64" fill="url(#point_bright)"/>
    <circle cx="0" cy="-86" r="3.6" fill="#fff4d6"/>

    <!-- minor vertex glows where base edges meet -->
    <circle cx="-92" cy="62" r="26" fill="url(#glow_dim)"/>
    <circle cx="92" cy="62" r="26" fill="url(#glow_dim)"/>
    <circle cx="-92" cy="62" r="2.4" fill="#f0c674"/>
    <circle cx="92" cy="62" r="2.4" fill="#f0c674"/>
  </g>

  <!-- vignette -->
  <rect width="1200" height="675" fill="url(#vignette)"/>

  <!-- ================================================ -->
  <!-- type                                             -->
  <!-- ================================================ -->

  <!-- vertex label -->
  <text x="600" y="116"
    font-family="'Inter','Helvetica Neue',sans-serif" font-weight="300"
    font-size="17" letter-spacing="4" text-anchor="middle"
    fill="#9a8d76">CONNECTION · ABOUT</text>

  <!-- primary concept -->
  <text x="600" y="486"
    font-family="'Cormorant Garamond','Cinzel',Georgia,serif" font-weight="500"
    font-size="92" letter-spacing="20" text-anchor="middle"
    fill="#e8dcc4">ABOUT</text>

  <!-- subtitle -->
  <text x="600" y="540"
    font-family="'Cormorant Garamond',Georgia,serif" font-style="italic"
    font-size="27" letter-spacing="1.5" text-anchor="middle"
    fill="#9a8d76">Read as infrastructure spec, not biography.</text>

  <!-- domain -->
  <text x="600" y="636"
    font-family="'Inter','Helvetica Neue',sans-serif" font-weight="300"
    font-size="15" letter-spacing="3" text-anchor="middle"
    fill="#9a8d76">oursharedgifts.org</text>

</svg>
