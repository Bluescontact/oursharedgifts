<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <!-- Dark field with subtle warm radial center -->
    <radialGradient id="field" cx="50%" cy="46%" r="80%">
      <stop offset="0%" stop-color="#161009"/>
      <stop offset="42%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>

    <!-- Standard vertex glow — warm gold radiating to transparent -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d4af6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- Bright central point -->
    <radialGradient id="point_bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d6" stop-opacity="1"/>
      <stop offset="20%" stop-color="#f0c674" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d4af6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="58%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- Field -->
  <rect width="1200" height="675" fill="url(#field)"/>

  <!-- ============================================ -->
  <!-- FIGURE: a closed boundary that holds itself  -->
  <!-- A gold ring (the limit) sealed at one vertex -->
  <!-- ============================================ -->
  <g transform="translate(600,300)">

    <!-- soft halo behind the figure -->
    <circle cx="0" cy="0" r="150" fill="url(#glow)" opacity="0.16"/>

    <!-- the boundary ring — the limit, drawn as a near-complete circle -->
    <circle cx="0" cy="0" r="92" fill="none"
            stroke="#d4af6a" stroke-width="1.6" opacity="0.92"/>

    <!-- inner auxiliary arc — the limit operating without attention -->
    <circle cx="0" cy="0" r="58" fill="none"
            stroke="#9a8d76" stroke-width="0.8" opacity="0.35"
            stroke-dasharray="2 9"/>

    <!-- two converging lines meeting at the seal point (top of ring) -->
    <line x1="-92" y1="0" x2="0" y2="-92" stroke="#d4af6a" stroke-width="1.1" opacity="0.7"/>
    <line x1="92" y1="0" x2="0" y2="-92" stroke="#d4af6a" stroke-width="1.1" opacity="0.7"/>

    <!-- luminous vertex — where the limit seals and holds (signature glow) -->
    <circle cx="0" cy="-92" r="46" fill="url(#point_bright)"/>
    <circle cx="0" cy="-92" r="3.4" fill="#fff4d6"/>

    <!-- two quieter vertices where the converging lines anchor -->
    <circle cx="-92" cy="0" r="22" fill="url(#glow)" opacity="0.85"/>
    <circle cx="-92" cy="0" r="2.2" fill="#f0c674"/>
    <circle cx="92" cy="0" r="22" fill="url(#glow)" opacity="0.85"/>
    <circle cx="92" cy="0" r="2.2" fill="#f0c674"/>

  </g>

  <!-- ============================================ -->
  <!-- TYPE                                         -->
  <!-- ============================================ -->

  <!-- vertex marker -->
  <text x="600" y="118"
        font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="300"
        font-size="17" letter-spacing="5" text-anchor="middle"
        fill="#9a8d76">BOUNDARIES &#183; AUTOMATION</text>

  <!-- title -->
  <text x="600" y="500"
        font-family="'Cormorant Garamond', 'Cinzel', Georgia, serif" font-weight="500"
        font-size="92" letter-spacing="14" text-anchor="middle"
        fill="#e8dcc4">AUTOMATION</text>

  <!-- subtitle -->
  <text x="600" y="552"
        font-family="'Cormorant Garamond', Georgia, serif" font-style="italic"
        font-size="29" letter-spacing="1.5" text-anchor="middle"
        fill="#9a8d76">Limits made operational.</text>

  <!-- footer -->
  <text x="600" y="638"
        font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="300"
        font-size="15" letter-spacing="3" text-anchor="middle"
        fill="#9a8d76" opacity="0.8">oursharedgifts.org</text>

  <!-- vignette on top -->
  <rect width="1200" height="675" fill="url(#vignette)"/>
</svg>
