# netlify.toml — oursharedgifts-deploy
#
# Minimal config for the village-market build. Static site (default) plus
# the market-submit Function. Auto-detected from netlify/functions/.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect /village-market-protocol → the rendered HTML
[[redirects]]
  from = "/village-market-protocol"
  to = "/village-market-protocol.html"
  status = 301

# v1 manuscript retired 2026-06-10 — inbound links land on the June canon
[[redirects]]
  from = "/library/architecture-of-coherence.pdf"
  to = "/library/architecture-of-coherence-suite.pdf"
  status = 301
[[redirects]]
  from = "/library/architecture-of-coherence.md"
  to = "/library/architecture-of-coherence-suite.pdf"
  status = 301
